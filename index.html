<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>V+α 동사구조 카드</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Noto+Sans+KR:wght@400;500;700&display=swap');

:root{
  /* 고급 다크 팔레트 */
  --ink:#0f172a;
  --ink2:#1e293b;
  --ink3:#334155;
  --steel:#64748b;
  --mist:#94a3b8;
  --border:#e2e8f0;
  --bg:#f8fafc;
  --white:#ffffff;

  /* 포인트: 딥 인디고 + 앰버 */
  --indigo:#4f46e5;
  --indigo-light:#eef2ff;
  --indigo-mid:#6366f1;
  --amber:#b45309;
  --amber-bg:#fffbeb;
  --amber-border:#fcd34d;

  /* 헤더 */
  --hdr:#0f172a;
  --hdr2:#1e293b;

  --shadow-sm:0 1px 3px rgba(15,23,42,.06),0 1px 2px rgba(15,23,42,.04);
  --shadow-md:0 4px 16px rgba(15,23,42,.08),0 2px 6px rgba(15,23,42,.05);
  --shadow-lg:0 10px 30px rgba(15,23,42,.12);
}

*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Inter','Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* ── SETUP ── */
#setup{
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:48px 20px;
  background:linear-gradient(145deg,#0a0f1e 0%,#0f1f3d 40%,#162040 70%,#1a2850 100%);
  position:relative;overflow:hidden;
}
#setup::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 60% 30%,rgba(99,102,241,.12) 0%,transparent 70%);
}
.s-eyebrow{font-size:10px;font-weight:600;letter-spacing:.22em;color:rgba(255,255,255,.3);text-transform:uppercase;margin-bottom:20px;position:relative;}
.s-logo{font-size:clamp(52px,11vw,72px);font-weight:700;color:#fff;line-height:1;letter-spacing:-.04em;position:relative;}
.s-logo span{
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.s-tagline{font-size:15px;color:rgba(255,255,255,.45);margin-top:12px;position:relative;}
.s-stats{font-size:11px;color:rgba(255,255,255,.2);margin:8px 0 44px;position:relative;letter-spacing:.05em;}
.s-box{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.09);
  border-radius:24px;padding:36px 30px;
  width:100%;max-width:400px;
  display:flex;flex-direction:column;gap:18px;
  backdrop-filter:blur(16px);position:relative;
  box-shadow:0 24px 48px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.08);
}
.s-field{display:flex;flex-direction:column;gap:6px;}
.s-label{font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.3);}
.s-input{
  padding:12px 15px;border-radius:10px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);
  color:#fff;font-size:14px;font-family:inherit;
  outline:none;transition:border-color .2s,background .2s;
}
.s-input::placeholder{color:rgba(255,255,255,.18);}
.s-input:focus{border-color:rgba(251,191,36,.5);background:rgba(255,255,255,.09);}
.s-btn{
  padding:14px;border-radius:11px;border:none;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  color:#0f172a;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;letter-spacing:.02em;
  transition:filter .2s,transform .15s,box-shadow .2s;
  box-shadow:0 4px 14px rgba(245,158,11,.35);
}
.s-btn:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,158,11,.45);}
.s-btn:active{transform:translateY(0);}

/* ── APP ── */
#app{display:none;min-height:100vh;}

/* HEADER */
.hdr{
  background:var(--hdr);
  position:sticky;top:0;z-index:200;
  border-bottom:1px solid rgba(255,255,255,.05);
  box-shadow:0 2px 16px rgba(0,0,0,.3);
}
.hdr-top{display:flex;align-items:center;height:52px;padding:0 12px;gap:8px;}
.acad-ini{
  width:28px;height:28px;border-radius:6px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  color:#0f172a;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;flex-shrink:0;
}
.acad-name{font-size:11px;font-weight:700;color:#fff;line-height:1.2;white-space:nowrap;}
.acad-sub{font-size:8px;color:rgba(255,255,255,.28);letter-spacing:.04em;text-transform:uppercase;}
.hdr-mid{flex:1;text-align:center;min-width:0;}
.hdr-title{font-size:13px;font-weight:700;color:#fff;letter-spacing:-.01em;white-space:nowrap;}
.hdr-title span{
  background:linear-gradient(135deg,#fbbf24,#f59e0b);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hdr-sub{font-size:8px;color:rgba(255,255,255,.22);margin-top:1px;}
.pdf-btn{
  padding:5px 9px;border-radius:6px;
  border:1px solid rgba(255,255,255,.12);
  background:transparent;color:rgba(255,255,255,.45);
  font-size:10px;font-family:inherit;cursor:pointer;
  white-space:nowrap;flex-shrink:0;transition:all .15s;
}
.pdf-btn:hover{background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.2);}
.hdr-btns{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.share-hdr-btn{
  padding:5px 9px;border-radius:6px;
  border:1px solid rgba(251,191,36,.35);
  background:rgba(251,191,36,.1);color:#fbbf24;
  font-size:10px;font-family:inherit;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.share-hdr-btn:hover{background:rgba(251,191,36,.2);border-color:rgba(251,191,36,.6);}
.share-hdr-btn.copied{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:#4ade80;}

/* SEARCH */
.search-wrap{padding:8px 12px;background:var(--hdr2);border-bottom:1px solid rgba(255,255,255,.04);}
.sw{position:relative;max-width:360px;margin:0 auto;}
.si{
  width:100%;padding:8px 32px 8px 32px;border-radius:8px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.06);
  color:#fff;font-size:13px;font-family:inherit;outline:none;
  transition:border-color .2s,background .2s;
}
.si::placeholder{color:rgba(255,255,255,.2);}
.si:focus{border-color:rgba(251,191,36,.4);background:rgba(255,255,255,.09);}
.si-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;color:rgba(255,255,255,.25);pointer-events:none;}
.si-clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.28);font-size:14px;cursor:pointer;padding:3px 4px;display:none;line-height:1;}
.si-clr:hover{color:rgba(255,255,255,.55);}
.sd{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:#1e293b;border:1px solid rgba(255,255,255,.1);
  border-radius:10px;max-height:260px;overflow-y:auto;
  z-index:400;box-shadow:var(--shadow-lg);display:none;
}
.sd.open{display:block;}
.sd-item{padding:9px 13px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s;}
.sd-item:last-child{border-bottom:none;}
.sd-item:hover{background:rgba(255,255,255,.05);}
.sd-verb{font-size:12px;font-weight:700;color:#fbbf24;}
.sd-pat{font-size:12px;color:rgba(255,255,255,.65);margin-left:5px;}
.sd-mean{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px;}
.sd-none{padding:14px;text-align:center;color:rgba(255,255,255,.22);font-size:12px;}

/* ALPHA NAV */
.alpha-nav{background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.04);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.alpha-nav::-webkit-scrollbar{display:none;}
.alpha-inner{display:flex;padding:6px 12px;gap:2px;min-width:max-content;}
.ab{padding:4px 9px;border-radius:5px;border:none;background:transparent;color:rgba(255,255,255,.35);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .13s;}
.ab:hover{background:rgba(255,255,255,.07);color:#fff;}
.ab.active{background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#0f172a;}

/* CONTENT */
.content{max-width:720px;margin:0 auto;padding:28px 14px 72px;}

/* SHARE BTN */
.share-btn{
  display:inline-flex;align-items:center;gap:7px;
  margin-bottom:28px;padding:10px 18px;
  border-radius:10px;border:1px solid var(--indigo-light);
  background:var(--indigo-light);color:var(--indigo);
  font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;
  transition:all .18s;box-shadow:var(--shadow-sm);
}
.share-btn:hover{background:#e0e7ff;border-color:#c7d2fe;}
.share-chk{display:none;color:#16a34a;}

/* SECTION HEADER — 알파벳 */
.sec-hdr{
  display:flex;align-items:center;gap:12px;
  margin:8px 0 20px;scroll-margin-top:152px;
}
.sec-letter{
  font-size:30px;font-weight:700;
  background:linear-gradient(135deg,var(--ink),var(--ink3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;width:38px;flex-shrink:0;
}
.sec-line{flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}
.sec-info{font-size:11px;color:var(--mist);font-weight:500;white-space:nowrap;}

/* VERB GROUP — 동사 타이틀 */
.vg{margin-bottom:36px;}
.vg-title{
  display:flex;align-items:baseline;gap:10px;
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:2px solid var(--ink);
}
.vg-num{
  font-size:13px;font-weight:700;
  color:var(--indigo);
  font-variant-numeric:tabular-nums;
  min-width:28px;
}
.vg-name{
  font-size:22px;font-weight:700;
  color:var(--ink);letter-spacing:-.03em;
  font-style:italic;
}
.vg-tag{
  font-size:10px;font-weight:600;
  color:var(--mist);
  background:var(--bg);
  border:1px solid var(--border);
  padding:2px 8px;border-radius:20px;
  margin-left:auto;flex-shrink:0;
}

/* CARD */
.card{
  background:var(--white);
  border-radius:12px;
  border:1px solid var(--border);
  box-shadow:var(--shadow-sm);
  margin-bottom:8px;overflow:hidden;
  transition:box-shadow .2s,transform .2s,border-color .2s;
}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);border-color:#d1d9ee;}
.card.hl{outline:2px solid var(--indigo);outline-offset:1px;}

/* 카드 헤더 — 패턴 번호 + 패턴명 */
.c-head{
  padding:11px 16px;
  background:var(--ink);
  display:flex;align-items:center;gap:10px;
}
.c-pnum{
  font-size:10px;font-weight:700;
  color:rgba(255,255,255,.35);
  letter-spacing:.08em;
  background:rgba(255,255,255,.08);
  padding:2px 7px;border-radius:4px;
  white-space:nowrap;flex-shrink:0;
}
.c-pat{font-size:14px;font-weight:600;color:#fff;flex:1;line-height:1.35;letter-spacing:-.01em;}

/* 카드 바디 */
.c-body{padding:14px 16px;}
.m-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:11px;}
.m-badge{
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--indigo);background:var(--indigo-light);
  padding:3px 7px;border-radius:4px;
  white-space:nowrap;flex-shrink:0;margin-top:2px;
}
.m-text{font-size:14px;font-weight:600;color:var(--ink);line-height:1.55;}

/* 예문 박스 */
.ex-box{
  background:var(--amber-bg);
  border-left:3px solid var(--amber-border);
  border-radius:0 8px 8px 0;
  padding:11px 14px;
}
.ex-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#92400e;margin-bottom:6px;opacity:.7;}
.ex-en{font-size:13px;color:#78350f;line-height:1.7;font-style:italic;margin-bottom:5px;}
.ex-kr{font-size:12px;color:#92400e;line-height:1.7;}
.ex-kr .vh{color:var(--indigo);font-weight:700;}

/* 카드 풋터 */
.c-foot{
  padding:7px 16px;
  background:#fafbfd;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.f-acad{font-size:11px;font-weight:600;color:var(--steel);}
.f-contact{font-size:10px;color:var(--mist);}

/* PRINT */
@media print{
  .hdr,.search-wrap,.alpha-nav,.share-btn,.share-hdr-btn,.pdf-btn{display:none!important;}
  .content{padding:0;max-width:100%;}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ddd;transform:none!important;}
  .vg{break-inside:avoid;}
}
@media(max-width:480px){
  .hdr-title{font-size:13px;}
  .c-pat{font-size:13px;}
  .m-text{font-size:13px;}
  .vg-name{font-size:19px;}
}
</style>
</head>
<body>

<div id="setup">
  <div class="s-eyebrow">English Verb Structure Cards</div>
  <div class="s-logo">V<span>+α</span></div>
  <div class="s-tagline">동사 뒷구조 완전정복 카드</div>
  <div class="s-stats">1237개 패턴 · 388개 핵심동사</div>
  <div class="s-box">
    <div class="s-field">
      <div class="s-label">학원명</div>
      <input class="s-input" id="iname" type="text" placeholder="예) 필탑학원" maxlength="30"/>
    </div>
    <div class="s-field">
      <div class="s-label">연락처</div>
      <input class="s-input" id="itel" type="text" placeholder="예) 031-000-0000" maxlength="20"/>
    </div>
    <div class="s-field">
      <div class="s-label">블로그 / SNS (선택)</div>
      <input class="s-input" id="iblog" type="text" placeholder="예) blog.naver.com/myhakwon" maxlength="60"/>
    </div>
    <button class="s-btn" onclick="startApp()">카드 만들기 →</button>
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div class="acad-ini" id="hIni">필</div>
      <div>
        <div class="acad-name" id="hName">필탑학원</div>
        <div class="acad-sub">V+α ENGLISH</div>
      </div>
      <div class="hdr-mid">
        <div class="hdr-title">V<span>+α</span> 동사구조 카드</div>
        <div class="hdr-sub">1237개 패턴 · 388개 동사</div>
      </div>
      <div class="hdr-btns">
        <button class="pdf-btn" onclick="window.print()">PDF 저장</button>
        <button class="share-hdr-btn" id="shareHdrBtn" onclick="copyLink()">🔗 링크 복사</button>
      </div>
    </div>
    <div class="search-wrap">
      <div class="sw">
        <span class="si-ico">🔍</span>
        <input class="si" id="SI" type="text"
          placeholder="동사·패턴 검색"
          autocomplete="off" oninput="onSearch()" onfocus="showDrop()"/>
        <button class="si-clr" id="SC" onclick="clearSearch()">✕</button>
        <div class="sd" id="SD"></div>
      </div>
    </div>
    <div class="alpha-nav">
      <div class="alpha-inner" id="AN"></div>
    </div>
  </div>

  <div class="content" id="CT"></div>
</div>

<script>
const CARDS=[
  {id:1,vn:1,verb:"abide",pn:1,pattern:"abide + 전 짝",meaning:"머무르다(체재하다), 지속하다 abide here/ there: 여기, 거기서 살아가다.",example:"Abide with us.",trans:"우리와 **함께 머무소서**."},
  {id:2,vn:1,verb:"abide",pn:2,pattern:"abide in",meaning:"~에서 살다",example:"We abide in the same place.",trans:"우리는 같은 곳에 **머문다**."},
  {id:3,vn:1,verb:"abide",pn:3,pattern:"abide by",meaning:"(약속 규칙 등을) 지키다, 따르다",example:"Do your best and abide by the event.",trans:"최선을 다하고 결과에 **따르라**."},
  {id:4,vn:1,verb:"abide",pn:4,pattern:"abide + 명사/ abide + to VR",meaning:"(주로 부정구문으로)감수하다, 견디다",example:"A good housekeeper cannot abide dirt.",trans:"훌륭한 주부는 더러움을 **참지 못한다**."},
  {id:5,vn:2,verb:"accommodate",pn:1,pattern:"accommodate+명사/ A with B",meaning:"~에게 편의를 제공하다, A에게 B를 마련해주다",example:"Boats are specially equipped to accommodate the sailors.",trans:"보트는 선원들을 **수용할** 수 있도록 특별히 **갖추어져 있다**."},
  {id:6,vn:2,verb:"accommodate",pn:2,pattern:"accommodate+명사/ A to B",meaning:"①숙박(수용)시키다 ②A를 B에 적응시키다",example:"The hotel can accommodate 500 guests.",trans:"그 호텔은 손님 500명을 **수용할** 수 있다."},
  {id:7,vn:2,verb:"accommodate",pn:3,pattern:"be accommodated",meaning:"설비가 갖추어져 있다",example:"The hotel is well accommodated.",trans:"그 호텔은 시설이 잘 **갖추어져 있다**."},
  {id:8,vn:3,verb:"account",pn:1,pattern:"account+ 명사+(to be)보어",meaning:"~을 ~라고 생각하다, 간주하다",example:"I account him (to be) a man of sense.",trans:"나는 그를 분별 있는 사람으로 **여긴다**."},
  {id:9,vn:3,verb:"account",pn:2,pattern:"account for",meaning:"설명하다, 책임지다, 이유가 되다, (비율을)점하다, 상세히 보고하다",example:"He accounted for the accident.",trans:"그는 그 사고에 대해 **해명했다**."},
  {id:10,vn:4,verb:"accuse",pn:1,pattern:"accuse + 명사",meaning:"~를 비난, 고발하다.",example:"",trans:""},
  {id:11,vn:4,verb:"accuse",pn:2,pattern:"accuse +A of B",meaning:"A를 B의 혐의로 비난, 고발하다",example:"She accused him of stealing her car.",trans:"그녀는 그가 자신의 차를 훔쳤다고 그를 **고발했다**."},
  {id:12,vn:4,verb:"accuse",pn:3,pattern:"accuse +A as B",meaning:"A를 B로서 비난, 고발하다",example:"He accused his friend James as a murderer.",trans:"그는 친구 제임스를 살인자라고 **고발했다**."},
  {id:13,vn:4,verb:"accuse",pn:4,pattern:"accuse +명사+that S+ V",meaning:"명사를 that의 사실로 고발하다",example:"She accused him that he had stolen her car.",trans:"그녀는 그가 자신의 차를 훔쳤다고 그를 **고발했다**."},
  {id:14,vn:5,verb:"acknowledge",pn:1,pattern:"acknowledge +명사/ V-ing/ that S+ V",meaning:"인정하다, 마지못해 인정하다",example:"He acknowledged the truth of it.",trans:"그는 그것이 사실임을 **인정했다**."},
  {id:15,vn:5,verb:"acknowledge",pn:2,pattern:"acknowledge + A as B",meaning:"인정하다, 마지못해 인정하다",example:"He acknowledged it as (being) true.",trans:"그는 그것이 사실이라고 **인정했다**."},
  {id:16,vn:6,verb:"add",pn:1,pattern:"add+ 명사",meaning:"~를 더하다",example:"Residents in New York, please add 8% sales tax.",trans:"뉴욕 거주자는 판매세 8%를 **더하시기 바랍니다**."},
  {id:17,vn:6,verb:"add",pn:2,pattern:"add A to B",meaning:"A를 B에 더하다",example:"He added sugar to tea.",trans:"그는 차에 설탕을 **넣었다**."},
  {id:18,vn:6,verb:"add",pn:3,pattern:"add A to",meaning:"증가시키다",example:"This will add to our pleasure.",trans:"이것은 우리의 즐거움을 **더해 줄 것이다**."},
  {id:19,vn:6,verb:"add",pn:4,pattern:"add that S +V",meaning:"부연하여 말하다, 덧붙이다",example:"He said good bye and added that he had had a pleasant visit.",trans:"그는 작별 인사를 **하고** 즐거운 방문이었다고 **덧붙였다**."},
  {id:20,vn:7,verb:"address",pn:1,pattern:"address + 명사",meaning:"연설하다, 말 걸다, 주소 적다, 칭하다, 적극적으로 대처하다",example:"He stood up to address an assembly.",trans:"그는 일어서서 청중에게 **연설했다**."},
  {id:21,vn:7,verb:"address",pn:2,pattern:"address + A as B",meaning:"A를 B로 칭하다",example:"to address a person as ‘General’",trans:"어떤 사람을 '장군'이라고 **부르다**"},
  {id:22,vn:7,verb:"address",pn:3,pattern:"address A to B",meaning:"B에게 A를 전하다, 제출하다",example:"I addressed a letter to my grandfather.",trans:"나는 할아버지에게 편지를 **보냈다**."},
  {id:23,vn:8,verb:"admit",pn:1,pattern:"admit+ 명사",meaning:"~을 인정하다",example:"This ticket admits two persons.",trans:"이 티켓으로는 두 사람이 **입장할** 수 있다."},
  {id:24,vn:8,verb:"admit",pn:2,pattern:"admit+ V ing",meaning:"~하는 것을 인정하다",example:"He admits having done it himself.",trans:"그는 자신이 직접 그 일을 했다고 **인정한다**."},
  {id:25,vn:8,verb:"admit",pn:3,pattern:"admit+ that S+ V",meaning:"사실을 인정하다",example:"She admitted that she had made a mistake.",trans:"그녀는 자신이 실수를 저질렀다고 **인정했다**."},
  {id:26,vn:8,verb:"admit",pn:4,pattern:"admit+ 명사 +(to be)+ 보어",meaning:"~를 ~라고 인정하다 admit +A(in)to B: A를 B에 들어오도록 인정하다",example:"",trans:""},
  {id:27,vn:9,verb:"advise",pn:1,pattern:"advise+명사+ to VR",meaning:"~에게 ~하도록 조언하다, 충고하다",example:"He advised me not to go there.",trans:"그는 나에게 거기에 가지 말라고 **충고했다**."},
  {id:28,vn:9,verb:"advise",pn:2,pattern:"advise+ that+ S +(should)+ VR",meaning:"~라고 충고하다",example:"We advised that they should start early.",trans:"우리는 그들이 일찍 출발해야 한다고 **권고했다**."},
  {id:29,vn:9,verb:"advise",pn:3,pattern:"advise A on B",meaning:"A에게 B에 관하여 조언하다",example:"He advised me on the choice of a career.",trans:"그는 나에게 직업 선택에 대해 **조언해 주었다**."},
  {id:30,vn:10,verb:"afford",pn:1,pattern:"afford+ 명사",meaning:"~을 제공하다, 산출하다, 내놓다",example:"The U.S.A. affords minerals of various kinds.",trans:"미국은 다양한 종류의 광물을 **산출한다**."},
  {id:31,vn:10,verb:"afford",pn:2,pattern:"afford+ to RV",meaning:"~할 여유가 있다(없다)",example:"I can`t afford to lose you.",trans:"나는 당신을 잃을 여유가 **없다**."},
  {id:32,vn:11,verb:"agree",pn:1,pattern:"agree to",meaning:"~에 동의하다",example:"I can`t agree to your plan.",trans:"나는 당신의 계획에 **동의할** 수 없다."},
  {id:33,vn:11,verb:"agree",pn:2,pattern:"agree with",meaning:"~에 일치하다",example:"I agree with you in part.",trans:"나는 부분적으로 당신에게 **동의한다**."},
  {id:34,vn:11,verb:"agree",pn:3,pattern:"agree on",meaning:"합의를 보다.",example:"We had already agreed on the smallest model.",trans:"우리는 이미 가장 작은 모델로 **합의했었다**."},
  {id:35,vn:11,verb:"agree",pn:4,pattern:"agree to VR",meaning:"~하는 것을 동의하다",example:"The president agreed to speak to the waiting journalists.",trans:"대통령은 기다리는 기자들에게 연설하는 데 **동의했다**."},
  {id:36,vn:11,verb:"agree",pn:5,pattern:"agree that S+ V",meaning:"~라고 동의하다",example:"",trans:""},
  {id:37,vn:12,verb:"allow",pn:1,pattern:"allow+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 허락해주다",example:"We allow our maid one day off a week.",trans:"우리는 가정부에게 일주일에 하루 쉬는 날을 **허락한다**."},
  {id:38,vn:13,verb:"answer",pn:1,pattern:"answer+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 답해주다",example:"Please answer the door.",trans:"현관문 좀 **나가 보세요**."},
  {id:39,vn:13,verb:"answer",pn:2,pattern:"answer + that~",meaning:"~라고 답하다",example:"She answer that she would do anything to father.",trans:"그녀는 아버지를 위해 무엇이든 하겠다고 **대답했다**."},
  {id:40,vn:13,verb:"answer",pn:3,pattern:"are answered",meaning:"~라고 답 되어지다.",example:"My wishes were answered.",trans:"나의 소원이 **이루어졌다**."},
  {id:41,vn:13,verb:"answer",pn:4,pattern:"answer for~",meaning:"~에 책임을 지다. (=account for~)",example:"You must answer for the crime.",trans:"당신은 그 죄에 대해 **책임을 져야** 한다."},
  {id:42,vn:13,verb:"answer",pn:5,pattern:"answer to~",meaning:"~에 일치하다, 부합하다.",example:"His features answer to the description.",trans:"그의 용모는 그 인상착의와 **일치한다**."},
  {id:43,vn:14,verb:"appear",pn:1,pattern:"S+ appear",meaning:"S가 나타나다, 등장하다 ↔ S+ disappear",example:"Speak of the devil and he will appear.",trans:"호랑이도 제 말 하면 **온다**."},
  {id:44,vn:14,verb:"appear",pn:2,pattern:"S+ appear(=seem) +to VR",meaning:"S가 ~하는 것처럼 보이다 +(to be)+C",example:"He appears to be rich.",trans:"그는 부유한 것처럼 **보인다**."},
  {id:45,vn:15,verb:"apply",pn:1,pattern:"apply A to B",meaning:"A를 B에 적용하다 의뢰하다, 문의하다",example:"We applied our minds to finding a solution.",trans:"우리는 해결책을 찾는 데 마음을 **집중했다**."},
  {id:46,vn:15,verb:"apply",pn:2,pattern:"apply to",meaning:"~에 적용되다.",example:"Discounts apply to standing orders.",trans:"할인은 정기 주문에 **적용된다**."},
  {id:47,vn:15,verb:"apply",pn:3,pattern:"apply for",meaning:"~에 지원하다, ~을 신청하다.",example:"Can I apply for another one?",trans:"다른 것으로 **신청해도** 될까요?"},
  {id:48,vn:16,verb:"appoint",pn:1,pattern:"appoint+ 명사",meaning:"임명하다, 정하다",example:"The boss appointed a new secretary.",trans:"상사는 새 비서를 **임명했다**."},
  {id:49,vn:16,verb:"appoint",pn:2,pattern:"appoint+ 명사 +(to be/ as)명사",meaning:"~를 ~로 임명하다",example:"They appointed him chairman.",trans:"그들은 그를 의장으로 **임명했다**."},
  {id:50,vn:16,verb:"appoint",pn:3,pattern:"appoint+ 명사+ to VR",meaning:"‘명사’가 ~하도록 명하다",example:"The governor appointed people to do the duty.",trans:"주지사는 그 임무를 수행할 사람들을 **임명했다**."},
  {id:51,vn:16,verb:"appoint",pn:4,pattern:"appoint+ that+ S+ should +V",meaning:"S가 ~해야 한다고 정하다, 명하다",example:"God appointed that it should be done.",trans:"신은 그것이 이루어지도록 **정하셨다**."},
  {id:52,vn:17,verb:"appreciate",pn:1,pattern:"appreciate+ 명사",meaning:"감사하다, 감상(평가)하다, 이해하다",example:"I appreciate your concern, but it’s none of your business.",trans:"걱정해 주시는 건 **감사하지만**, 당신이 상관할 일이 아닙니다."},
  {id:53,vn:17,verb:"appreciate",pn:2,pattern:"appreciate+ that S+V",meaning:"이해하다, 인정하다",example:"We appreciate now that our conclusions were wrong.",trans:"우리는 이제 우리의 결론이 틀렸다는 것을 **인정한다**."},
  {id:54,vn:17,verb:"appreciate",pn:3,pattern:"appreciate+ V-ing",meaning:"행위에 대해 감사하게 생각하다",example:"I would very much appreciate receiving a copy of the book.",trans:"저는 그 책의 사본을 받는다면 대단히 **감사하겠습니다**."},
  {id:55,vn:18,verb:"approve",pn:1,pattern:"approve+ 명사",meaning:"승인하다, 인가하다, 찬성하다",example:"The Russian Parliament has approved a program of radical economic reforms.",trans:"러시아 의회는 급진적인 경제 개혁 프로그램을 **승인했다**."},
  {id:56,vn:18,verb:"approve",pn:2,pattern:"approve of + 명사",meaning:"(제안 등을) 반기다, 찬성하다",example:"Not everyone approves of the festival.",trans:"모든 사람이 그 축제를 **찬성하는** 것은 아니다."},
  {id:57,vn:19,verb:"argue",pn:1,pattern:"argue+ with 사람",meaning:"~와 논쟁하다",example:"I won’t argue with you, but I think you’re being impractical.",trans:"나는 당신과 **논쟁하지** 않겠지만, 당신이 비현실적이라고 생각한다."},
  {id:58,vn:19,verb:"argue",pn:2,pattern:"argue+ that S+V",meaning:"주장하다",example:"Columbus argued that he could reach India by going west.",trans:"콜럼버스는 서쪽으로 가면 인도에 **도달할 수 있다고** **주장했다**."},
  {id:59,vn:19,verb:"argue",pn:3,pattern:"argue+ 명사/ 명사+(to be) 보어",meaning:"논하다, 입증하다, 보이다",example:"His manners argue good upbringing.",trans:"그의 매너는 훌륭한 가정교육을 **입증한다**."},
  {id:60,vn:20,verb:"arrange",pn:1,pattern:"arrange+명사",meaning:"정리하다, 정하다, 편곡(개작)하다",example:"When she has a little spare time, she enjoys arranging dried flowers.",trans:"약간의 여가 시간이 생기면, 그녀는 말린 꽃을 **꽂는** 것을 즐긴다."},
  {id:61,vn:20,verb:"arrange",pn:2,pattern:"arrange for",meaning:"마련하다",example:"We have arranged for the bus to pick us up here.",trans:"우리는 버스가 여기서 우리를 **태우도록** **준비해 두었다**."},
  {id:62,vn:21,verb:"ask",pn:1,pattern:"ask + 명사(I.O)+ 명사(D.O- 질의, 질문)",meaning:"(I.O)에게 (D.O- 질의, 질문)를 물어보다 + 명사(D.O- 요구사항): (I.O)에게 (D.O- 요구사항)를 요청하다",example:"Will you ask her a favor?",trans:"그녀에게 부탁 하나 **드리시겠어요**?"},
  {id:63,vn:21,verb:"ask",pn:2,pattern:"ask+ (명)+ if/ whether/ wh- (S)+ V",meaning:"묻다",example:"He asks me if (whether) I was hungry.",trans:"그는 나에게 배가 고프냐고 **물었다**."},
  {id:64,vn:21,verb:"ask",pn:3,pattern:"ask+ for +명사",meaning:"(명사)를 요구하다",example:"He asks for little money.",trans:"그는 돈을 거의 **요구하지 않는다**."},
  {id:65,vn:21,verb:"ask",pn:4,pattern:"ask A for B",meaning:"A에게 B를 요구하다",example:"He asks me for little money.",trans:"그는 나에게 돈을 거의 **요구하지 않는다**."},
  {id:66,vn:21,verb:"ask",pn:5,pattern:"ask to VR",meaning:"할 것을 요구하다",example:"I must ask to be excused.",trans:"나는 자리를 비워도 되는지 **양해를 구해야** 한다."},
  {id:67,vn:21,verb:"ask",pn:6,pattern:"ask+ 명+ to VR",meaning:"~에게 할 것을 요구하다",example:"",trans:"나는 양해를 구하기를 **요청해야** 한다."},
  {id:68,vn:21,verb:"ask",pn:7,pattern:"ask+ that+ S+ (should) VR",meaning:"S가 V해야 한다고 요구하다",example:"",trans:"그녀는 모든 편지가 즉시 답장되어야 한다고 **요구했다**."},
  {id:69,vn:22,verb:"assign",pn:1,pattern:"assign+ 명사+(전 짝)",meaning:"할당하다, (임무 등을) 부여하다, 지명하다",example:"to assign work to each man.",trans:"각자에게 일을 **배정하다**."},
  {id:70,vn:22,verb:"assign",pn:2,pattern:"assign+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 명하다",example:"He assigned me to watch the house.",trans:"그는 나에게 집을 **지키도록** **맡겼다**."},
  {id:71,vn:22,verb:"assign",pn:3,pattern:"assign+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 배당하다",example:"He assigned us the best room of the hotel.",trans:"그는 우리에게 호텔의 가장 좋은 방을 **배정해 주었다**."},
  {id:72,vn:23,verb:"assume",pn:1,pattern:"assume+ 명사+ to VR",meaning:"(권력, 책임 등을) 취하다, 떠맡다",example:"Mr. Cross will assume the role of Chief Executive with a team of four directors.",trans:"크로스 씨는 네 명의 이사진과 함께 최고 경영자의 역할을 **맡을 것이다**."},
  {id:73,vn:23,verb:"assume",pn:2,pattern:"assume+ 명사(색조, 분위기, 느낌)",meaning:"색조를 띄다, 분위기를 띄다, 느낌을 띄다",example:"She assumed an air of cheerfulness.",trans:"그녀는 명랑한 표정을 **지었다**."},
  {id:74,vn:23,verb:"assume",pn:3,pattern:"assume+ that S+V/명사+ to be 보어",meaning:"추정(추측)하다, 가정하다",example:"He is assumed to be wealthy.",trans:"그는 부유한 것으로 **여겨진다**."},
  {id:75,vn:23,verb:"assume",pn:4,pattern:"assuming that S+V",meaning:"~라고 가정하면",example:"Assuming that it is true, what should we do now?",trans:"그것이 사실이라고 **가정하면**, 우리는 지금 어떻게 해야 할까?"},
  {id:76,vn:24,verb:"assure",pn:1,pattern:"assure+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 보장해주다",example:"Her achievement has assured her a place in the history books.",trans:"그녀의 업적은 역사책에 그녀의 자리를 **확보해 주었다**."},
  {id:77,vn:24,verb:"assure",pn:2,pattern:"assure+ 명사+ that S+ V",meaning:"‘명사’에게 ~을 보장해주다",example:"I assure you that he is innocent.",trans:"나는 그가 무고하다고 당신에게 **장담합니다**."},
  {id:78,vn:24,verb:"assure",pn:3,pattern:"assure A of B",meaning:"A에게 B를 보장하다",example:"He assured me of his hearty assistance.",trans:"그는 나에게 성심 어린 도움을 **약속했다**."},
  {id:79,vn:25,verb:"attempt",pn:1,pattern:"attempt+ 명사",meaning:"시도하다, 꾀하다",example:"to attempt a difficult task",trans:"어려운 과제를 **시도하다**."},
  {id:80,vn:25,verb:"attempt",pn:2,pattern:"attempt+ to VR",meaning:"시도하다",example:"The only time that we attempted to do something like that was in the city of Philadelphia.",trans:"우리가 그와 같은 일을 **시도한** 것은 필라델피아 시에서 단 한 번뿐이었다."},
  {id:81,vn:25,verb:"attempt",pn:3,pattern:"attempt+ V-ing",meaning:"~하는 것을 꾀하다",example:"We attempted breaking the lines of the enemy.",trans:"우리는 적의 전선을 **돌파하려고 시도했다**."},
  {id:82,vn:26,verb:"attend",pn:1,pattern:"attend+ 명사",meaning:"(회의 등에) 참가하다, 출석하다, (교육기관, 교회 등을) 다니다.",example:"They attended college together at the University of Pennsylvania.",trans:"그들은 펜실베이니아 대학교에서 함께 **다녔다**."},
  {id:83,vn:26,verb:"attend",pn:2,pattern:"attend+ 명사",meaning:"돌보다, 동행(동반)하다",example:"a cold attended with fever",trans:"열을 **동반한** 감기"},
  {id:84,vn:26,verb:"attend",pn:3,pattern:"attend on + 명사",meaning:"시중 들다",example:"to attend on the prince",trans:"왕자를 **시중들다**"},
  {id:85,vn:26,verb:"attend",pn:4,pattern:"attend to+ 명사",meaning:"주의하다, 보살피다",example:"The main thing is to attend to the injured.",trans:"중요한 것은 부상자들을 **돌보는** 것이다."},
  {id:86,vn:27,verb:"attach",pn:1,pattern:"attach A to B",meaning:"A를 B에 붙이다",example:"He first attached himself to the Liberals.",trans:"그는 처음에 자유당에 **몸을 담았다**."},
  {id:87,vn:27,verb:"attach",pn:2,pattern:"be attached to",meaning:"~에 미련, 애정, 집착, 미련을 갖다.",example:"Hamlet has been deeply attached to his father.",trans:"햄릿은 아버지에게 깊이 **애착을 가져왔다**."},
  {id:88,vn:28,verb:"associate",pn:1,pattern:"associate A with B",meaning:"A를 B와 연관 짓다, 연루시키다",example:"We often associate giving presents with Christmas.",trans:"우리는 흔히 선물을 주는 것을 크리스마스와 **연관 짓는다**."},
  {id:89,vn:28,verb:"associate",pn:2,pattern:"be associated with",meaning:"~와 연관되다, 연루되다",example:"I was associated with him in a large law firm.",trans:"나는 대형 법률 회사에서 그와 함께 **일했다**."},
  {id:90,vn:28,verb:"associate",pn:3,pattern:"associate with",meaning:"~와 교제하다",example:"A man’s character can be measured by the types of men with whom he associates.",trans:"사람의 성격은 그가 **어울리는** 사람들의 유형으로 **가늠할** 수 있다."},
  {id:91,vn:29,verb:"assemble",pn:1,pattern:"assemble+ 명사",meaning:"모으다, 집합시키다, 조립하다",example:"Many distinguished persons were assembled in the garden.",trans:"많은 저명인사들이 정원에 **모여 있었다**."},
  {id:92,vn:29,verb:"assemble",pn:2,pattern:"assemble",meaning:"모이다, 화합하다",example:"We assembled for the feast.",trans:"우리는 연회를 위해 **모였다**."},
  {id:93,vn:30,verb:"assess",pn:1,pattern:"assess+ 명사",meaning:"평가하다",example:"The damages were assessed at 100 dollars.",trans:"손해액은 100달러로 **산정되었다**."},
  {id:94,vn:30,verb:"assess",pn:2,pattern:"assess+명사(I.O)+명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 할당하다",example:"Each member of the club will be assessed one dollar to pay for the trip.",trans:"여행 경비를 충당하기 위해 클럽 회원 각자에게 1달러씩 **부과될** 것이다."},
  {id:95,vn:31,verb:"anticipate",pn:1,pattern:"anticipate+ 명사",meaning:"낙으로 삼고 기다리다, 기대하다, 예상하다, 앞서다",example:"I anticipated a good vacation in the beach.",trans:"나는 해변에서의 즐거운 휴가를 **기대했다**."},
  {id:96,vn:31,verb:"anticipate",pn:2,pattern:"anticipate+ V-ing",meaning:"~하는 것을 기대하다",example:"I anticipate picking up all the information while traveling.",trans:"나는 여행하는 동안 모든 정보를 **습득할 것을 기대한다**."},
  {id:97,vn:31,verb:"anticipate",pn:3,pattern:"anticipate+ that S+ V",meaning:"예상하다",example:"Nobody anticipated that there would be anything wrong.",trans:"아무도 무슨 문제가 생길 것이라고 **예상하지 못했다**."},
  {id:98,vn:32,verb:"annoy",pn:1,pattern:"annoy+ 명사",meaning:"귀찮게 하다, 성가시게 하다",example:"He was annoying the bull with a red rag.",trans:"그는 붉은 천으로 황소를 **성가시게 하고 있었다**."},
  {id:99,vn:32,verb:"annoy",pn:2,pattern:"be annoyed at/ by/ about…",meaning:"~에 짜증나다 to VR : ~해서 짜증나다 that S+V : ~때문에 성가시다",example:"I was annoyed at the interruption.",trans:"나는 방해를 받아 **짜증이 났다**."},
  {id:100,vn:33,verb:"announce",pn:1,pattern:"announce+ 명사",meaning:"~를 알리다, 발표하다, 고지하다",example:"We have announced her death to some friends only.",trans:"우리는 그녀의 죽음을 몇몇 친구들에게만 **알렸다**."},
  {id:101,vn:33,verb:"announce",pn:2,pattern:"announce+ that S+ V",meaning:"사실을 알리다, 발표하다, 고지하다",example:"It has been announced that the astronaut will visit this country in September.",trans:"그 우주비행사가 9월에 이 나라를 방문할 것이라고 **발표되었다**."},
  {id:102,vn:33,verb:"announce",pn:3,pattern:"announce+ 명사+ as/ to be",meaning:"~를 ~로서 아리다, 발표하다, 고지하다",example:"Mr. Brown was announced as (to be) the sponsor.",trans:"브라운 씨가 후원자로 **발표되었다**."},
  {id:103,vn:34,verb:"avail",pn:1,pattern:"avail",meaning:"(보통 부정구문에서) 소용이 되다",example:"Talk will not avail without work.",trans:"일 없이 말만 해서는 **소용없다**."},
  {id:104,vn:34,verb:"avail",pn:2,pattern:"avail+ 명사",meaning:"~에게 소용이 되다(보통 부정구문에서)",example:"It will avail you little or nothing.",trans:"그것은 당신에게 거의 또는 전혀 **도움이 되지 않을** 것이다."},
  {id:105,vn:34,verb:"avail",pn:3,pattern:"avail oneself of",meaning:"~을 이용하다",example:"We should avail ourselves of this opportunity.",trans:"우리는 이 기회를 **활용해야** 한다."},
  {id:106,vn:35,verb:"average",pn:1,pattern:"average+ 명사",meaning:"~를 평균값으로 하다",example:"The writer averages 3 stories a month.",trans:"그 작가는 한 달에 3편의 이야기를 **쓴다**."},
  {id:107,vn:35,verb:"average",pn:2,pattern:"average out(at something)",meaning:"결국 평균이 (…이) 되다",example:"The cost should average out at about ￡6 per person.",trans:"비용은 1인당 약 6파운드로 **평균이 될 것이다**."},
  {id:108,vn:36,verb:"awake",pn:1,pattern:"awake",meaning:"잠이 깨다",example:"He at last awoke to the danger.",trans:"그는 마침내 위험을 **깨달았다**."},
  {id:109,vn:36,verb:"awake",pn:2,pattern:"awake+ 명사",meaning:"~을 깨우다",example:"The gun shot awoke me in the middle of the night.",trans:"총성이 한밤중에 나를 **깨웠다**."},
  {id:110,vn:37,verb:"be",pn:1,pattern:"be",meaning:"존재하다",example:"I think, therefore I am.",trans:"나는 생각한다, 고로 나는 **존재한다**."},
  {id:111,vn:37,verb:"be",pn:2,pattern:"be+ 전치사+ 명사",meaning:"~에 있다, 존재하다",example:"I was at the party.",trans:"나는 파티에 **있었다**."},
  {id:112,vn:37,verb:"be",pn:3,pattern:"전치사+ 명사+ be+ S",meaning:"~에 S가 있다",example:"Among the dead was her husband.",trans:"사망자 중에 그녀의 남편이 **있었다**."},
  {id:113,vn:37,verb:"be",pn:4,pattern:"There+ be+ S",meaning:"S가 있다, 존재하다",example:"There is good evidence that she is innocent.",trans:"그녀가 무죄라는 충분한 증거가 **있다**."},
  {id:114,vn:37,verb:"be",pn:5,pattern:"be+ 형용사",meaning:"~한 상태이다",example:"The fat cat is white.",trans:"뚱뚱한 고양이는 하얗**다**."},
  {id:115,vn:37,verb:"be",pn:6,pattern:"be+ 명사",meaning:"~이다, 되다",example:"Knowledge is power.",trans:"지식은 힘**이다**."},
  {id:116,vn:37,verb:"be",pn:7,pattern:"be+ V-ing",meaning:"~하는 것이다",example:"Seeing is believing.",trans:"보는 것이 믿는 것**이다**."},
  {id:117,vn:37,verb:"be",pn:8,pattern:"be+ V-ing/ pp",meaning:"(남을) ~ 한 상태로 만들다, (주어가) ~한 생태가 되다",example:"His lecture was boring.",trans:"그의 강의는 지루**했다**."},
  {id:118,vn:37,verb:"be",pn:9,pattern:"be+ to VR",meaning:"~하는 것이다 (운명, 예정, 가능, 소망, 의도, 명령)",example:"My wish is to meet her again.",trans:"나의 소원은 그녀를 다시 만나는 것**이다**."},
  {id:119,vn:37,verb:"be",pn:10,pattern:"be+ that/ wh- S+ V",meaning:"~이다",example:"The trouble is that he likes her.",trans:"문제는 그가 그녀를 좋아한다는 것**이다**."},
  {id:120,vn:38,verb:"be aware",pn:1,pattern:"be aware of",meaning:"~을 알고 있다",example:"You should be aware of proper negotiation tactics.",trans:"당신은 적절한 협상 전술을 **인식해야 한다**."},
  {id:121,vn:38,verb:"be aware",pn:2,pattern:"be aware wh-+(S)+ V",meaning:"~인지 알고 있다",example:"I am aware what you teach them.",trans:"나는 당신이 그들에게 무엇을 가르치는지 **알고 있다**."},
  {id:122,vn:38,verb:"be aware",pn:3,pattern:"be aware that S+ V",meaning:"~라고 알고 있다",example:"I was well aware that it was dangerous.",trans:"나는 그것이 위험하다는 것을 충분히 **알고 있었다**."},
  {id:123,vn:39,verb:"be conscious",pn:1,pattern:"be conscious of 명사",meaning:"~을 알다",example:"He was not conscious of my presence in the room.",trans:"그는 내가 방 안에 있다는 것을 **의식하지 못했다**."},
  {id:124,vn:39,verb:"be conscious",pn:2,pattern:"be conscious of V-ing",meaning:"~하는 것을 알다",example:"I was conscious of being lifted from the ground.",trans:"나는 땅에서 들어 올려지는 것을 **느꼈다**."},
  {id:125,vn:39,verb:"be conscious",pn:3,pattern:"be conscious that S+ V",meaning:"사실을 알다",example:"She was conscious that her strength was faling.",trans:"그녀는 자신의 힘이 약해지고 있음을 **의식하고 있었다**."},
  {id:126,vn:39,verb:"be conscious",pn:4,pattern:"be conscious (of)wh- S+ V",meaning:"사실을 알다",example:"You are never conscious (of) what others will think about such conduct.",trans:"당신은 다른 사람들이 그런 행동에 대해 어떻게 생각할지를 전혀 **의식하지 못한다**."},
  {id:127,vn:40,verb:"be likely",pn:1,pattern:"be likely to VR",meaning:"~할 것 같다, ~ 할 가능성이 있다",example:"Go to a fairly quiet place where you are not likely to be disturbed.",trans:"방해받을 가능성이 없는 꽤 조용한 장소로 **가라**."},
  {id:128,vn:40,verb:"be likely",pn:2,pattern:"it is likely that S+ V",meaning:"~일 것 같다",example:"It is not likely that he will come.",trans:"그가 올 것 같지 **않다**."},
  {id:129,vn:41,verb:"be worth",pn:1,pattern:"be worth +명사",meaning:"~의 가치가 있다",example:"He is worth at least a million dollars.",trans:"그는 적어도 백만 달러의 재산을 **가지고 있다**."},
  {id:130,vn:41,verb:"be worth",pn:2,pattern:"be worth+ V-ing",meaning:"~할 만한 가치가 있다",example:"The book is worth reading.",trans:"그 책은 읽을 **가치가 있다**."},
  {id:131,vn:42,verb:"bear",pn:1,pattern:"bear+ 명사",meaning:"낳다, 지탱하다, 참다",example:"His efforts at last bore fruit.",trans:"그의 노력이 마침내 **결실을 맺었다**."},
  {id:132,vn:42,verb:"bear",pn:2,pattern:"bear+ to VR",meaning:"~하는 것을 견디다",example:"I cannot bear to see it.",trans:"나는 그것을 차마 **볼 수가 없다**."},
  {id:133,vn:42,verb:"bear",pn:3,pattern:"bear+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 낳아 주다, (악의를) 품어주다",example:"I bear you no grudge.",trans:"나는 당신에게 아무런 원한도 **품지 않는다**."},
  {id:134,vn:42,verb:"bear",pn:4,pattern:"bear+ V-ing",meaning:"~하는 것을 견뎌내다",example:"This cloth will bear washing.",trans:"이 천은 세탁을 **견딜 것이다**."},
  {id:135,vn:43,verb:"become",pn:1,pattern:"become+형용사",meaning:"~한 상태가 되다",example:"His breathing became irregular.",trans:"그의 호흡이 불규칙해**졌다**."},
  {id:136,vn:43,verb:"become",pn:2,pattern:"become+ 명사",meaning:"~가 되다, 어울리다",example:"He became a businessman.",trans:"그는 사업가가 **되었다**."},
  {id:137,vn:43,verb:"become",pn:3,pattern:"what을 주어로 하여 what become of",meaning:"어떻게 되다",example:"What has become of him?",trans:"그는 어떻게 **되었느냐**?"},
  {id:138,vn:44,verb:"beg",pn:1,pattern:"beg+ 명사",meaning:"빌다, 구하다",example:"I beg your pardon.",trans:"실례합니다 / 죄송합니다."},
  {id:139,vn:44,verb:"beg",pn:2,pattern:"beg+ 명사+ to VR/ that S+V",meaning:"‘명사’에게 ~할 것을 간절히 바라다",example:"I beg you to sit down.",trans:"앉아 주시기를 **부탁드립니다**."},
  {id:140,vn:45,verb:"believe",pn:1,pattern:"believe+ 명사",meaning:"믿다, 신뢰하다",example:"I don’t believe his piety.",trans:"나는 그의 신앙심을 **믿지 않는다**."},
  {id:141,vn:45,verb:"believe",pn:2,pattern:"believe in+ 명사",meaning:"~의 존재를 믿다.",example:"I believe in God.",trans:"나는 신을 **믿는다**."},
  {id:142,vn:45,verb:"believe",pn:3,pattern:"believe+ that S+ V",meaning:"~라고 믿다",example:"We believe your future career will benefit from the same effort that you’ve devoted to your academic work.",trans:"우리는 당신의 미래 경력이 학업에 **쏟아온** 것과 같은 노력으로부터 **도움을 받을 것이라고 믿습니다**."},
  {id:143,vn:45,verb:"believe",pn:4,pattern:"S+ be believed to VR",meaning:"~라고 믿어지다",example:"Moles are also believed to foretell the future.",trans:"점도 미래를 **예언한다고 여겨진다**."},
  {id:144,vn:46,verb:"betray",pn:1,pattern:"betray+ 명사",meaning:"배반하다",example:"When I tell someone I will not betray his confidence, I keep my word.",trans:"누군가에게 그의 비밀을 **누설하지 않겠다고** 말할 때, 나는 약속을 **지킨다**."},
  {id:145,vn:46,verb:"betray",pn:2,pattern:"betray A+ (to B)",meaning:"A를 B에게 누설하다",example:"to betray a secret to a person.",trans:"비밀을 어떤 사람에게 **누설하다**."},
  {id:146,vn:46,verb:"betray",pn:3,pattern:"betray+ 명사/ that절/ 명사+(to be) 보어",meaning:"~임을 나타내다",example:"She studied his face, but it betrayed nothing.",trans:"그녀는 그의 얼굴을 **살폈지만**, 얼굴은 아무것도 **드러내지 않았다**."},
  {id:147,vn:47,verb:"blame",pn:1,pattern:"blame+ 명사",meaning:"비난하다, ~탓으로 돌리다",example:"Don’t blame him.",trans:"그를 **탓하지** 마라."},
  {id:148,vn:47,verb:"blame",pn:2,pattern:"be to blame",meaning:"책임이 있다",example:"We consider that you are not to blame.",trans:"우리는 당신에게 책임이 없다고 **생각한다**."},
  {id:149,vn:47,verb:"blame",pn:3,pattern:"blame A for B",meaning:"B의 이유로 A를 비난하다",example:"It’s not fair to blame them for their parent’s misdeeds.",trans:"부모의 잘못으로 그들을 **비난하는** 것은 공평하지 않다."},
  {id:150,vn:48,verb:"bother",pn:1,pattern:"bother+ 명사",meaning:"귀찮게 하다, 괴롭히다 (=annoy, irritate)",example:"Do not bother me while I work.",trans:"내가 일하는 동안 나를 **방해하지** 마라."},
  {id:151,vn:48,verb:"bother",pn:2,pattern:"bother+ to VR",meaning:"~하는 수고를 하다",example:"Don’t bother to fix a lunch for me.",trans:"나를 위해 점심을 **챙겨줄** 것 없다."},
  {id:152,vn:48,verb:"bother",pn:3,pattern:"bother",meaning:"골치 아파하다",example:"I don’t bother with such things.",trans:"나는 그런 것에 **신경 쓰지 않는다**."},
  {id:153,vn:49,verb:"bring",pn:1,pattern:"bring+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 가져오다",example:"Please bring me something to drink.",trans:"마실 것을 좀 **가져다 주세요**."},
  {id:154,vn:49,verb:"bring",pn:2,pattern:"bring A into B",meaning:"A를 B의 상태가 되게 하다",example:"This fact brought his story into discredit.",trans:"이 사실이 그의 이야기를 신용 없게 **만들었다**."},
  {id:155,vn:49,verb:"bring",pn:3,pattern:"bring about+ 명사",meaning:"야기하다, 초래하다(=cause=result in)",example:"The pact brought about a diplomatic rapprochement between the two countries.",trans:"그 협정은 두 나라 사이에 외교적 화해를 **가져왔다**."},
  {id:156,vn:49,verb:"bring",pn:4,pattern:"bring in",meaning:"가지고 들어오다",example:"Bring in dinner for this gentleman.",trans:"이 신사분께 저녁 식사를 **가져다드리세요**."},
  {id:157,vn:49,verb:"bring",pn:5,pattern:"bring out",meaning:"가지고 나가다, 내놓다",example:"The warm weather has brought out cherry blossoms.",trans:"따뜻한 날씨가 벚꽃을 **피워냈다**."},
  {id:158,vn:49,verb:"bring",pn:6,pattern:"bring on",meaning:"초래하다, 일으키다",example:"Damp weather will bring on her rheumatism.",trans:"습한 날씨는 그녀의 류머티즘을 **악화시킬** 것이다."},
  {id:159,vn:49,verb:"bring",pn:7,pattern:"bring up",meaning:"키우다, 끌어내다, 게우다",example:"She was brought up to behave well.",trans:"그녀는 예의 바르게 행동하도록 **길러졌다**."},
  {id:160,vn:49,verb:"bring",pn:8,pattern:"bring off",meaning:"구출하다, 성취하다",example:"The mountaineers were brought off by the rescue party.",trans:"등산객들은 구조대에 의해 **구조되었다**."},
  {id:161,vn:49,verb:"bring",pn:9,pattern:"bring back",meaning:"돌려주다, 도로 찾다, 되부르다, 상기시키다",example:"The class reunion brought back a lot of memories.",trans:"동창회는 많은 추억을 **떠올리게 했다**."},
  {id:162,vn:49,verb:"bring",pn:10,pattern:"bring down",meaning:"짐을 내리다, 격추시키다, 떨어뜨리다",example:"They have brought down many enemy airplanes.",trans:"그들은 많은 적기를 **격추했다**."},
  {id:163,vn:49,verb:"bring",pn:11,pattern:"bring+ 목적어+ into being(or existence)",meaning:"생겨나게 하다",example:"He is able to bring into being something that doesn’t exist.",trans:"그는 존재하지 않는 것을 **만들어낼** 수 있다."},
  {id:164,vn:50,verb:"back",pn:1,pattern:"back+ 명사",meaning:"후원하다, 역행시키다",example:"Many of his friends backed his plan.",trans:"그의 친구들 중 많은 이들이 그의 계획을 **지지했다**."},
  {id:165,vn:51,verb:"ban",pn:1,pattern:"ban+ 명사",meaning:"~을 금지하다",example:"Swimming is banned in this lake.",trans:"이 호수에서는 수영이 **금지되어 있다**."},
  {id:166,vn:51,verb:"ban",pn:2,pattern:"ban+ 명사+ from+ V-ing",meaning:"명사가 ~하는 것을 막다",example:"Father bans me from joining any overnight party",trans:"아버지는 내가 어떤 1박 파티에도 참가하는 것을 **금지하신다**."},
  {id:167,vn:52,verb:"beat",pn:1,pattern:"beat+ 명사",meaning:"때리다, 치다, 물리쳐 이기다, 앞서가다",example:"The bird beats its wings so fast.",trans:"그 새는 날개를 매우 빠르게 **퍼덕인다**."},
  {id:168,vn:52,verb:"beat",pn:2,pattern:"beat+ 전치사+ 명사",meaning:"전치사에 따라 다양한 의미",example:"Stop beating at the door.",trans:"문을 그만 **두드려라**."},
  {id:169,vn:53,verb:"beckon",pn:1,pattern:"beckon+ 명사",meaning:"명사에게 손짓하다",example:"I beckoned him to come over.",trans:"나는 그에게 이리 오라고 **손짓했다**."},
  {id:170,vn:53,verb:"beckon",pn:2,pattern:"beckon",meaning:"부르다",example:"The blue sea beckons.",trans:"푸른 바다가 **손짓한다**."},
  {id:171,vn:54,verb:"belong",pn:1,pattern:"belong+ here/ to/ in/ on…",meaning:"소속되다, 속해있다",example:"This book belongs to me.",trans:"이 책은 내 것이다 / 이 책은 나에게 **속한다**."},
  {id:172,vn:55,verb:"benefit",pn:1,pattern:"benefit",meaning:"득을 얻다, 혜택 받다",example:"She benefitted by the medicine.",trans:"그녀는 그 약으로 **효과를 보았다**."},
  {id:173,vn:55,verb:"benefit",pn:2,pattern:"benefit+ 명사",meaning:"~에게 득을 주다",example:"The fresh air will benefit you.",trans:"신선한 공기가 당신에게 **이로울** 것이다."},
  {id:174,vn:56,verb:"bet",pn:1,pattern:"bet+ 명사",meaning:"~을 걸다",example:"The betted a great deal on the black horse.",trans:"그는 그 검은 말에 거액을 **걸었다**."},
  {id:175,vn:56,verb:"bet",pn:2,pattern:"bet+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D,O’를 걸다",example:"I will bet you all I have.",trans:"나는 내가 가진 모든 것을 당신과 **걸겠다**."},
  {id:176,vn:56,verb:"bet",pn:3,pattern:"bet + 명사+ 명사+ that+ S+ V",meaning:"~에게 ~사실에 대하여 ~을 걸다",example:"I bet you a pound that he has forgotten.",trans:"나는 그가 잊어버렸다는 것에 1파운드를 **걸겠다**."},
  {id:177,vn:56,verb:"bet",pn:4,pattern:"I bet/ you bet…",meaning:"확실하다",example:"I bet he is right.",trans:"나는 그가 옳다고 **확신한다**."},
  {id:178,vn:57,verb:"beware",pn:1,pattern:"beware of+ 명사",meaning:"조심하다",example:"Beware of pickpockets.",trans:"소매치기를 **조심하세요**."},
  {id:179,vn:57,verb:"beware",pn:2,pattern:"beware that S+ V",meaning:"조심하다",example:"beware that you do not anger him.",trans:"그를 화나게 하지 않도록 **주의하세요**."},
  {id:180,vn:58,verb:"bid",pn:1,pattern:"bid+ 명사+ (to)VR",meaning:"‘명사’에게 ~하라고 명령하다",example:"He bade the servant call the boy into the room.",trans:"그는 하인에게 그 소년을 방으로 **불러오라고** 했다."},
  {id:181,vn:58,verb:"bid",pn:2,pattern:"bid+ 명사+ farewell/ welcome/ goodbye",meaning:"~에게 작별 등을 고하다",example:"He bade us farewell.",trans:"그는 우리에게 작별 **인사를 했다**."},
  {id:182,vn:58,verb:"bid",pn:3,pattern:"bid on/ bid against/ bid for",meaning:"입찰하다",example:"Someone was bidding against him.",trans:"누군가가 그에 맞서 **입찰하고 있었다**."},
  {id:183,vn:59,verb:"blow",pn:1,pattern:"blow",meaning:"불다, 불러 날려지다",example:"It is blowing hard.",trans:"바람이 세차게 **불고 있다**."},
  {id:184,vn:59,verb:"blow",pn:2,pattern:"blow+ 명사",meaning:"~을 불다",example:"He blows a horn.",trans:"그는 나팔을 **분다**."},
  {id:185,vn:59,verb:"blow",pn:3,pattern:"blow up/ blow off/ blow out",meaning:"불러 일으키다, 부풀게 하다, 폭파하다, 불어서 끄다",example:"He blew the dust off.",trans:"그는 먼지를 **불어서 털어냈다**."},
  {id:186,vn:60,verb:"blur",pn:1,pattern:"blur",meaning:"흐려지다",example:"Her eyes blurred with tears.",trans:"그녀의 눈이 눈물로 **흐려졌다**."},
  {id:187,vn:60,verb:"blur",pn:2,pattern:"blur+ 명사",meaning:"흐릿하게 하다",example:"Smoke blurred the landscape.",trans:"연기가 풍경을 **흐리게 했다**."},
  {id:188,vn:61,verb:"boast",pn:1,pattern:"boast of",meaning:"자랑하다",example:"He never boasted of his success.",trans:"그는 자신의 성공을 결코 **자랑하지 않았다**."},
  {id:189,vn:61,verb:"boast",pn:2,pattern:"boast that S+ V",meaning:"자랑하다",example:"He boasted that there was nobody he couldn’t defeat.",trans:"그는 자신이 이기지 못할 사람은 아무도 없다고 **자랑했다**."},
  {id:190,vn:61,verb:"boast",pn:3,pattern:"boast+ 명사",meaning:"자랑거리로 소유하다",example:"The village boasts a fine castle.",trans:"그 마을에는 훌륭한 성이 **있다**."},
  {id:191,vn:62,verb:"break",pn:1,pattern:"break+ 명사",meaning:"깨뜨리다, 부수다, 꺾다, 타파하다, 어기다, 타파하다, 길들이다",example:"He broke a branch off the tree.",trans:"그는 나무에서 가지를 **꺾었다**."},
  {id:192,vn:62,verb:"break",pn:2,pattern:"break",meaning:"꺾어지다, 부서지다, 부러지다, 끊어지다, 허물어지다",example:"Her heart broke when her child died.",trans:"그녀는 아이가 죽었을 때 가슴이 **무너졌다**."},
  {id:193,vn:62,verb:"break",pn:3,pattern:"break away/ break through",meaning:"무너뜨리다, 탈퇴하다, 돌파하다",example:"He managed to break away from bad friends.",trans:"그는 나쁜 친구들로부터 **벗어나는** 데 성공했다."},
  {id:194,vn:62,verb:"break",pn:4,pattern:"break up/ break out",meaning:"분쇄하다, 해산하다, 나빠지다, 탈출하다, 발발하다",example:"We had better break up a box for firewood.",trans:"상자를 **부숴서** 땔감으로 쓰는 게 좋겠다."},
  {id:195,vn:62,verb:"break",pn:5,pattern:"break free/break loose",meaning:"탈출하다, 자유롭게 하다",example:"The horse has broken loose.",trans:"그 말은 **도망쳤다**."},
  {id:196,vn:63,verb:"call",pn:1,pattern:"call+ 명사",meaning:"부르다, 전화하다",example:"Call a taxi.",trans:"택시를 **불러라**."},
  {id:197,vn:63,verb:"call",pn:2,pattern:"call+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 불러주다",example:"I called him a taxi.",trans:"나는 그에게 택시를 **불러 주었다**."},
  {id:198,vn:63,verb:"call",pn:3,pattern:"call+ 명사+ O.C",meaning:"‘명사’를 ‘O.C’라고 부르다",example:"His name is Richard but we call him Dick.",trans:"그의 이름은 리처드이지만 우리는 그를 딕이라고 **부른다**."},
  {id:199,vn:63,verb:"call",pn:4,pattern:"call for+ 명사",meaning:"요구하다",example:"The situation calls for prompt action.",trans:"그 상황은 신속한 조치를 **필요로 한다**."},
  {id:200,vn:63,verb:"call",pn:5,pattern:"call on+ 명사",meaning:"들르다, 방문하다",example:"I didn’t call on you for fear of disturbing you.",trans:"나는 당신을 방해할까봐 **찾아가지 않았다**."},
  {id:201,vn:63,verb:"call",pn:6,pattern:"call A by B",meaning:"A를 B라고 부르다",example:"Do you know her well enough to call her by her Christian name?",trans:"당신은 그녀를 세례명으로 **부를** 만큼 그녀와 친한가요?"},
  {id:202,vn:63,verb:"call",pn:7,pattern:"call up+ 명사",meaning:"병력 등을 소집하다, 전화로 부르다",example:"I will be called up for the war.",trans:"나는 전쟁에 **징집될** 것이다."},
  {id:203,vn:63,verb:"call",pn:8,pattern:"call it a day",meaning:"하루의 일과를 마치다",example:"Let’s call it a day.",trans:"오늘은 여기서 **끝내자**."},
  {id:204,vn:63,verb:"call",pn:9,pattern:"call a game",meaning:"게임을 중지하다",example:"It was a called game.",trans:"그것은 몰수 경기였다."},
  {id:205,vn:63,verb:"call",pn:10,pattern:"call",meaning:"카드의 패를 보겠다고 동의하다",example:"I will double the bet, Call.",trans:"나는 판돈을 두 배로 **올리겠다**, 콜."},
  {id:206,vn:64,verb:"care",pn:1,pattern:"care for",meaning:"돌보다, 신경 쓰다, 상관 하다, 좋아하다",example:"Nurses care for the sick.",trans:"간호사들은 환자들을 **돌본다**."},
  {id:207,vn:64,verb:"care",pn:2,pattern:"care about",meaning:"신경 쓰다, 관심을 가지다",example:"Both Mike and I really care about AI.",trans:"마이크와 나 둘 다 AI에 대해 정말 **관심이 있다**."},
  {id:208,vn:64,verb:"care",pn:3,pattern:"care to VR",meaning:"~하고 싶어 하다",example:"I don’t care to see her.",trans:"나는 그녀를 **만나고 싶지 않다**."},
  {id:209,vn:64,verb:"care",pn:4,pattern:"care",meaning:"신경 쓰다",example:"I don’t care it.",trans:"나는 그것에 **개의치 않는다**."},
  {id:210,vn:64,verb:"care",pn:5,pattern:"take care of",meaning:"보살피다, 돌보다",example:"Please take good care of my baby.",trans:"내 아이를 잘 **돌봐** 주세요."},
  {id:211,vn:65,verb:"cause",pn:1,pattern:"cause+ 명사",meaning:"야기하다, ~의 원인이 되다",example:"Certain bacteria cause diseases.",trans:"특정 세균은 질병을 **일으킨다**."},
  {id:212,vn:65,verb:"cause",pn:2,pattern:"cause+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 안겨주다",example:"Your letter caused her a great deal of distress.",trans:"당신의 편지는 그녀에게 큰 고통을 **안겨 주었다**."},
  {id:213,vn:65,verb:"cause",pn:3,pattern:"cause+ 명사+ to VR",meaning:"‘명사’가 ~하도록 야기시키다",example:"The rain caused the river to overflow.",trans:"비로 인해 강물이 **범람했다**."},
  {id:214,vn:66,verb:"change",pn:1,pattern:"change",meaning:"변화하다, 바뀌다",example:"Fashions in advertising change frequency.",trans:"광고의 유행은 자주 **바뀐다**."},
  {id:215,vn:66,verb:"change",pn:2,pattern:"change A for B",meaning:"A를 B로 갈아입다",example:"You had better change wet clothes for dry ones.",trans:"젖은 옷을 마른 옷으로 **갈아입는** 것이 좋겠다."},
  {id:216,vn:66,verb:"change",pn:3,pattern:"change A into B",meaning:"A를 B로 바꾸다",example:"They changed the little cottage into a splendid house.",trans:"그들은 작은 오두막을 웅장한 집으로 **바꾸었다**."},
  {id:217,vn:66,verb:"change",pn:4,pattern:"change into",meaning:"~로 바뀌다",example:"A caterpillar changes into a butterfly.",trans:"애벌레는 나비로 **변한다**."},
  {id:218,vn:67,verb:"charge",pn:1,pattern:"charge+ 명사",meaning:"(의무, 책임 등을) 지우다, 부과하다, 고소(고발)하다, 충전하다",example:"I am charged to give you this letter.",trans:"나는 이 편지를 당신에게 전달하도록 **위임받았다**."},
  {id:219,vn:67,verb:"charge",pn:2,pattern:"charge+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’을 청구하다",example:"The architect charged us a fee of seven hundred and fifty pounds.",trans:"그 건축가는 우리에게 750파운드의 수수료를 **청구했다**."},
  {id:220,vn:67,verb:"charge",pn:3,pattern:"charge+ that S+ V",meaning:"~을 비난하다",example:"Some people charged that the hospital was unclean.",trans:"일부 사람들은 그 병원이 불결하다고 **주장했다**."},
  {id:221,vn:67,verb:"charge",pn:4,pattern:"charge",meaning:"돌격하다",example:"The player charged at me.",trans:"그 선수는 나에게 **돌진해 왔다**."},
  {id:222,vn:67,verb:"charge",pn:5,pattern:"명사 용법",meaning:"요금, 고소, 비난, 책임",example:"It is free of charge.",trans:"그것은 무료이다."},
  {id:223,vn:67,verb:"charge",pn:6,pattern:"claim+ (전 짝)",meaning:"(~에 대한 손해배상을) 요구하다, 고소하다",example:"They intended to claim for damages against the three doctors.",trans:"그들은 세 명의 의사를 상대로 손해배상을 **청구할** 작정이었다."},
  {id:224,vn:67,verb:"charge",pn:7,pattern:"claim+ 명사",meaning:"(권리로써) 요구하다, 청구하다",example:"Now they are returning to claim what was theirs.",trans:"이제 그들은 자신들의 것이었던 것을 **되찾으러** 돌아오고 있다."},
  {id:225,vn:67,verb:"charge",pn:8,pattern:"claim+ 명사(주로 생명에 관한 명사)",meaning:"(병, 재해 등이 인명을) 빼앗다",example:"Heart disease is the biggest killer, claiming 180,000 lives a year.",trans:"심장병은 연간 18만 명의 목숨을 **앗아가는** 최대의 사망 원인이다."},
  {id:226,vn:67,verb:"charge",pn:9,pattern:"claim+ to VR/ that S+ V",meaning:"~을 주장하다, 공연하다",example:"He claimed that it was all a conspiracy against him.",trans:"그는 그 모든 것이 자신에 대한 음모라고 **주장했다**."},
  {id:227,vn:68,verb:"come",pn:1,pattern:"come to an end",meaning:"끝나다",example:"It was as if the world had come to an end.",trans:"세상이 끝난 것 같았다."},
  {id:228,vn:68,verb:"come",pn:2,pattern:"come to VR",meaning:"~하게 되다(=get to VR)",example:"I have come to believe that the government’s economic policy is misguided.",trans:"나는 정부의 경제 정책이 잘못되었다고 **믿게 되었다**."},
  {id:229,vn:68,verb:"come",pn:3,pattern:"come before",meaning:"~앞에 위치하다",example:"Your turn comes before mine.",trans:"당신 차례가 내 차례보다 **먼저 온다**."},
  {id:230,vn:68,verb:"come",pn:4,pattern:"come+ 형용사",meaning:"~한 상태가 되다",example:"The handle has come loose.",trans:"손잡이가 **헐거워졌다**."},
  {id:231,vn:68,verb:"come",pn:5,pattern:"come+ 전치사/ 부사",meaning:"come in: ~에 들어오다 come over: 건너오다 come by: 들르다, 획득하다 come up with: ~을 생각해내다, 얻어내다 come to: ~에 이르다 come out: 나오다 How come+ S+ V: 왜 S+V? come about: 발생하다",example:"Please come in.",trans:"어서 **들어오세요**."},
  {id:232,vn:69,verb:"commit",pn:1,pattern:"commit+ 명사+ 전 짝",meaning:"위임하다, 회부하다",example:"to commit a bill to a committee",trans:"법안을 위원회에 **회부하다**"},
  {id:233,vn:69,verb:"commit",pn:2,pattern:"commit+ 명사",meaning:"범하다, 저지르다",example:"I have never committed any crime.",trans:"나는 어떤 범죄도 **저지른** 적이 없다."},
  {id:234,vn:69,verb:"commit",pn:3,pattern:"commit oneself to",meaning:"~에 몸을 맡기다, 전념하다(= be committed to)",example:"Commit yourself to the doctor.",trans:"의사의 지시에 **따르세요**."},
  {id:235,vn:69,verb:"commit",pn:4,pattern:"commit suicide",meaning:"자살하다",example:"There are unconfirmed reports he tried to commit suicide.",trans:"그가 자살을 **시도했다**는 확인되지 않은 보도가 있다."},
  {id:236,vn:70,verb:"compare",pn:1,pattern:"compare A with B",meaning:"A와 B를 비교하다",example:"Don’t compare yourself with others.",trans:"자신을 남과 **비교하지** 마라."},
  {id:237,vn:70,verb:"compare",pn:2,pattern:"compare A to B",meaning:"A를 B에 비유하다",example:"Poets have compared sleep to death.",trans:"시인들은 잠을 죽음에 **비유해왔다**."},
  {id:238,vn:71,verb:"concentrate",pn:1,pattern:"concentrate on",meaning:"~에 집중하다",example:"She couldn’t concentrate on her",trans:"그녀는 공부에 **집중할** 수가 없었다."},
  {id:239,vn:71,verb:"concentrate",pn:2,pattern:"concentrate A on B",meaning:"A를 B에 집중시키다",example:"We must concentrate our efforts on improving education.",trans:"우리는 교육 개선에 노력을 **집중해야** 한다."},
  {id:240,vn:72,verb:"concern",pn:1,pattern:"concern+ 명사",meaning:"~와 관계되다, ~에 중요하다, 걱정시키다",example:"The call concerned my sister.",trans:"그 전화는 내 여동생에 관한 것이었다. / 그 전화는 내 여동생과 **관련된** 것이었다."},
  {id:241,vn:72,verb:"concern",pn:2,pattern:"be concerned with",meaning:"~와 관련이 있다",example:"The right side of the brain is concerned with imagination and intuition.",trans:"뇌의 오른쪽은 상상력과 직관과 **관련되어** 있다."},
  {id:242,vn:72,verb:"concern",pn:3,pattern:"be concerned about",meaning:"~에 대해 걱정하다",example:"The President is deeply concerned about this issue.",trans:"대통령은 이 문제에 대해 깊이 **우려하고** 있다."},
  {id:243,vn:72,verb:"concern",pn:4,pattern:"as far as I am concerned",meaning:"내가 관련되는 한, 나로서는",example:"As long as I am concerned, I approve of his coming back.",trans:"나로서는 그가 돌아오는 것을 **찬성한다**."},
  {id:244,vn:73,verb:"conclude",pn:1,pattern:"conclude+ 명사/또는 자동사",meaning:"마치다, 종결하다",example:"The event concluded with dinner and speeches.",trans:"그 행사는 만찬과 연설로 **마무리되었다**."},
  {id:245,vn:73,verb:"conclude",pn:2,pattern:"conclude+ that S+ V",meaning:"결정하다, (추정하여) 결단하다",example:"He concluded that he would go.",trans:"그는 가기로 **결론을 내렸다**."},
  {id:246,vn:73,verb:"conclude",pn:3,pattern:"conclude+ 명사+ to be 보어",meaning:"~를 ~라고 판단하다",example:"She concluded the rumor to be true.",trans:"그녀는 그 소문이 사실이라고 **결론지었다**."},
  {id:247,vn:74,verb:"consider",pn:1,pattern:"consider+ 명사",meaning:"~을 고려하다, 참작하다",example:"I’ll consider your suggestion.",trans:"당신의 제안을 **검토해** 보겠습니다."},
  {id:248,vn:74,verb:"consider",pn:2,pattern:"consider+ V-ing",meaning:"~하는 것을 숙고하다, 생각하다",example:"I am considering going to London.",trans:"나는 런던에 갈까 **생각하고** 있다."},
  {id:249,vn:74,verb:"consider",pn:3,pattern:"consider+ that S+ V",meaning:"~라고 생각하다",example:"I consider that he ought to help me.",trans:"나는 그가 나를 도와야 한다고 **생각한다**."},
  {id:250,vn:74,verb:"consider",pn:4,pattern:"consider+ 명사+ O.C",meaning:"‘명사’가 ‘O.C’하라고 생각하다, 간주하다, 여기다",example:"She considers herself lucky.",trans:"그녀는 자신이 운이 좋다고 **여긴다**."},
  {id:251,vn:74,verb:"consider",pn:5,pattern:"consider it+ O.C+ to VR",meaning:"~하는 것이 ‘O.C’하다고 생각하다, 여기다",example:"Do you consider it wise to interfere?",trans:"당신은 간섭하는 것이 현명하다고 **생각하십니까**?"},
  {id:252,vn:74,verb:"consider",pn:6,pattern:"consider A as B",meaning:"A를 B라고 여기다, 간주하다",example:"He considered Hamlet as an example of a Shakespearean tragedy",trans:"그는 햄릿을 셰익스피어 비극의 한 예로 **보았다**."},
  {id:253,vn:75,verb:"consist",pn:1,pattern:"consist of",meaning:"~로 이루어지다(= be composed of)",example:"Water consists of hydrogen and oxygen.",trans:"물은 수소와 산소로 **이루어져** 있다."},
  {id:254,vn:75,verb:"consist",pn:2,pattern:"consist in",meaning:"~에 있다, 존재하다(= lie in)",example:"Happiness consists in contentment.",trans:"행복은 만족에 **있다**."},
  {id:255,vn:76,verb:"convince",pn:1,pattern:"convince+ 명사+ that S+ V",meaning:"‘명사’에게 ~사실을 확신시키다.",example:"He tried to convince me that I wasn’t good enough for the team.",trans:"그는 내가 팀에 어울리지 않는다고 나를 **설득하려** 했다."},
  {id:256,vn:76,verb:"convince",pn:2,pattern:"convince+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 확신시키다",example:"What convinced you to vote for them?",trans:"무엇이 그들에게 투표하도록 당신을 **설득했나요**?"},
  {id:257,vn:76,verb:"convince",pn:3,pattern:"convince A of B",meaning:"A에게 B를 확신시키다",example:"He tried to convince me of his innocence.",trans:"그는 자신의 무고함을 나에게 **납득시키려** 했다."},
  {id:258,vn:77,verb:"cost",pn:1,pattern:"cost+ 명사",meaning:"~의 비용이 들다",example:"This course is limited to 12 people and costs $50.",trans:"이 강좌는 12명으로 제한되어 있으며 수강료는 50달러입니다."},
  {id:259,vn:77,verb:"cost",pn:2,pattern:"cost+ 명사+ 명사(비용)",meaning:"~에게 ~의 비용이 들게 하다",example:"This house costs him a great deal of money.",trans:"이 집은 그에게 상당한 돈이 **든다**."},
  {id:260,vn:77,verb:"cost",pn:3,pattern:"cost+ 명사+ 명사",meaning:"~에게 ~을 희생시키다, 잃게 하다",example:"His life was saved by an operation that cost him his sight.",trans:"그의 생명은 시력을 **잃게 한** 수술로 구해졌다."},
  {id:261,vn:78,verb:"count",pn:1,pattern:"count",meaning:"중요성을 지니다",example:"Honesty doesn’t seem to count these days.",trans:"요즘은 정직함이 별로 **중요하지 않은** 것 같다."},
  {id:262,vn:78,verb:"count",pn:2,pattern:"count+ 명사",meaning:"세다",example:"We counted the people in the room and found there were thirty.",trans:"우리는 방 안의 사람들을 **세어보니** 서른 명이었다."},
  {id:263,vn:78,verb:"count",pn:3,pattern:"명사",meaning:"count: 백작 / countess: 백작부인",example:"",trans:"나는 그를 그 자리에서 **내쫓았다**."},
  {id:264,vn:79,verb:"carry",pn:1,pattern:"carry+ 명사",meaning:"나르다, 지탱하다, 자세를 취하다, 공감을 얻다, 휴대하다, 생기다",example:"Metals carry heat easily.",trans:"금속은 열을 쉽게 **전달한다**."},
  {id:265,vn:79,verb:"carry",pn:2,pattern:"carry",meaning:"도달하다, 닿다",example:"My voice does not carry so far.",trans:"내 목소리는 그렇게 멀리까지 **전달되지** 않는다."},
  {id:266,vn:79,verb:"carry",pn:3,pattern:"carry+ about/ away/ on/ out",meaning:"휴대하다, 휩쓸어가다, 계속하다, 수행하다",example:"I carry about a small dictionary with me.",trans:"나는 작은 사전을 항상 **가지고 다닌다**."},
  {id:267,vn:80,verb:"cast",pn:1,pattern:"cast+ 명사",meaning:"던지다, 드리우다, 주조하다, 배역을 주다",example:"Cast the net into the pond.",trans:"그물을 연못에 **던져라**."},
  {id:268,vn:80,verb:"cast",pn:2,pattern:"cast away",meaning:"물리치다, 표류시키다",example:"He has been cast away for 100 days.",trans:"그는 100일 동안 **표류하고 있었다**."},
  {id:269,vn:80,verb:"cast",pn:3,pattern:"cast out",meaning:"추방하다",example:"He shall be cast out for his betrayal against his fatherland.",trans:"그는 조국에 대한 배반으로 **추방될 것이다**."},
  {id:270,vn:81,verb:"catch",pn:1,pattern:"catch+ 명사",meaning:"잡다, 발견하다, 불붙다, 걸리다, 따라 잡다, 시간에 대다",example:"He caught me by the collar.",trans:"그는 내 옷깃을 **잡았다**."},
  {id:271,vn:81,verb:"catch",pn:2,pattern:"catch+ 명사",meaning:"얽히게 하다, 시선을 끌다, 타격하다, 이해하다",example:"A stone caught me on the nose.",trans:"돌 하나가 내 코를 **맞혔다**."},
  {id:272,vn:82,verb:"check",pn:1,pattern:"check+ 명사",meaning:"막다, 대조하다, 물표를 받고 맡기다",example:"The police tried to check the demonstration parade.",trans:"경찰은 시위 행진을 **저지하려** 했다."},
  {id:273,vn:82,verb:"check",pn:2,pattern:"명사",meaning:"수표",example:"",trans:"눈이 **내리고** 있었다."},
  {id:274,vn:83,verb:"choose",pn:1,pattern:"choose+ 명사",meaning:"고르다",example:"He chose a book from the library.",trans:"그는 도서관에서 책 한 권을 **골랐다**."},
  {id:275,vn:83,verb:"choose",pn:2,pattern:"choose+ to VR",meaning:"~하기로 택하다",example:"He chose to run for election.",trans:"그는 선거에 출마하기로 **선택했다**."},
  {id:276,vn:84,verb:"clear",pn:1,pattern:"clear+ 명사",meaning:"맑게 하다, 제거하다, 개간하다, 해결하다",example:"The plant can clear the muddy water.",trans:"그 식물은 흐린 물을 **정화할** 수 있다."},
  {id:277,vn:84,verb:"clear",pn:2,pattern:"clear",meaning:"맑아지다, 환히 트이다",example:"The haze began to clear.",trans:"안개가 **걷히기** 시작했다."},
  {id:278,vn:84,verb:"clear",pn:3,pattern:"clear A of B",meaning:"A에게서 B를 제거하다",example:"They cleared the woods of the undergrowth.",trans:"그들은 숲에서 잡목을 **제거했다**."},
  {id:279,vn:85,verb:"close",pn:1,pattern:"close+ 명사",meaning:"닫다, 완료하다",example:"All the doors and windows have been closed.",trans:"모든 문과 창문이 **닫혀 있다**."},
  {id:280,vn:85,verb:"close",pn:2,pattern:"close in",meaning:"포위하다, 가까워지다",example:"Winter was closing in on us.",trans:"겨울이 우리에게 **다가오고** 있었다."},
  {id:281,vn:86,verb:"combine",pn:1,pattern:"combine+ 복수명사",meaning:"~을 합치다",example:"I have combined several factors into one conclusion.",trans:"나는 여러 요인들을 하나의 결론으로 **결합했다**."},
  {id:282,vn:86,verb:"combine",pn:2,pattern:"combine A with B",meaning:"A를 B와 합치다",example:"The pursuit of knowledge should be combined with wisdom.",trans:"지식의 추구는 지혜와 **결합되어야** 한다."},
  {id:283,vn:86,verb:"combine",pn:3,pattern:"combine with",meaning:"합쳐지다",example:"Two atoms of hydrogen combine with one of oxygen to form water.",trans:"수소 원자 두 개와 산소 원자 한 개가 **결합하여** 물을 형성한다."},
  {id:284,vn:86,verb:"combine",pn:4,pattern:"복수주어+ combine",meaning:"합쳐지다",example:"Oxygen and hydrogen combine to form water.",trans:"산소와 수소가 **결합하여** 물을 형성한다."},
  {id:285,vn:87,verb:"command",pn:1,pattern:"command+ 명사",meaning:"~을 명하다",example:"He commanded silence.",trans:"그는 침묵을 **명령했다**."},
  {id:286,vn:87,verb:"command",pn:2,pattern:"command+ 명사+ to VR",meaning:"‘명사’에게 ~하라고 명하다",example:"The captain commanded his men to retreat.",trans:"대위는 부하들에게 후퇴하라고 **명령했다**."},
  {id:287,vn:87,verb:"command",pn:3,pattern:"command that S+(should)+ VR",meaning:"~해야 한다고 명령하다",example:"The king commanded that the slaves be free.",trans:"왕은 노예들을 해방하라고 **명령했다**."},
  {id:288,vn:87,verb:"command",pn:4,pattern:"command+ 명사",meaning:"지배하다, 모으다, 차지하다",example:"He can command himself.",trans:"그는 자신을 **통제할** 수 있다."},
  {id:289,vn:87,verb:"command",pn:5,pattern:"at one’s command",meaning:"마음대로 할 수 있다",example:"All the money is at your command.",trans:"그 돈은 모두 당신 마음대로 **쓸 수 있다**."},
  {id:290,vn:88,verb:"communicate",pn:1,pattern:"communicate 명사(+to 명사)",meaning:"전달하다",example:"She communicated her suspicion to her husband.",trans:"그녀는 자신의 의심을 남편에게 **전했다**."},
  {id:291,vn:88,verb:"communicate",pn:2,pattern:"communicate A with B",meaning:"배분하다, 함께하다",example:"He doesn’t like to communicate a thing with another.",trans:"그는 한 가지 일을 다른 것과 **연결 짓는** 것을 좋아하지 않는다."},
  {id:292,vn:88,verb:"communicate",pn:3,pattern:"communicate with",meaning:"함께 이야기하다, 통신하다, 서신 왕래하다",example:"Human beings communicate with one another by various instruments.",trans:"인간은 다양한 수단으로 서로 **의사소통한다**."},
  {id:293,vn:89,verb:"compensate",pn:1,pattern:"compensate A for B",meaning:"B에 대해 A를 보상해주다",example:"Employers should compensate their workmen for injuries.",trans:"고용주는 부상을 입은 노동자에게 보상을 **해주어야 한다**."},
  {id:294,vn:89,verb:"compensate",pn:2,pattern:"compensate for",meaning:"~에 대해 보상하다",example:"Industry sometimes compensates for lack of ability.",trans:"노력은 때때로 능력 부족을 **보완해 준다**."},
  {id:295,vn:90,verb:"complain",pn:1,pattern:"complain of/ complain about",meaning:"~에 대해 불평하다",example:"I complained to the police about my neighbor’s dog.",trans:"나는 이웃집 개에 대해 경찰에 **불평했다**."},
  {id:296,vn:90,verb:"complain",pn:2,pattern:"complain that S+ V",meaning:"사실에 대해 불평하다",example:"He complains that his job gives him no satisfaction.",trans:"그는 자신의 일이 아무런 보람을 주지 않는다고 **불평한다**."},
  {id:297,vn:91,verb:"compose",pn:1,pattern:"compose A of B/ be composed of",meaning:"~A를 B로 구성하다",example:"Switzerland is composed of 22 cantons.",trans:"스위스는 22개의 주로 **구성되어 있다**."},
  {id:298,vn:91,verb:"compose",pn:2,pattern:"compose 명사+(for/to VR)",meaning:"마음을 가라앉히다",example:"He composed himself to read a book.",trans:"그는 마음을 **가다듬고** 책을 읽었다."},
  {id:299,vn:92,verb:"conceive",pn:1,pattern:"conceive that/ wh- S+ V",meaning:"생각하다, 상상하다",example:"I conceived that there must be some difficulties.",trans:"나는 어떤 어려움이 있을 것이라고 **생각했다**."},
  {id:300,vn:92,verb:"conceive",pn:2,pattern:"conceive+ 명사",meaning:"품다",example:"He conceived love for her.",trans:"그는 그녀에 대한 사랑을 **품게 되었다**."},
  {id:301,vn:93,verb:"condemn",pn:1,pattern:"condemn+ 명사",meaning:"비난 하다, 유죄 선고하다, 운명 짓다",example:"Cruelty to animals should be condemned.",trans:"동물 학대는 **비난받아야 한다**."},
  {id:302,vn:93,verb:"condemn",pn:2,pattern:"be condemn+ to VR/ to 명사",meaning:"운명 짓다",example:"He was condemned to touring the whole country for a living.",trans:"그는 생계를 위해 전국을 돌아다닐 수밖에 없는 처지에 **놓였다**."},
  {id:303,vn:94,verb:"confess",pn:1,pattern:"confess+ 명사",meaning:"~을 고백하다",example:"He confessed his sins.",trans:"그는 자신의 죄를 **고백했다**."},
  {id:304,vn:94,verb:"confess",pn:2,pattern:"confess+ that S+ V",meaning:"사실을 고백하다",example:"He confessed that he had taken the money.",trans:"그는 돈을 가져갔다고 **고백했다**."},
  {id:305,vn:94,verb:"confess",pn:3,pattern:"confess to+ 명사",meaning:"~에 대해 인정하다",example:"I confess to being proud of my son’s success.",trans:"나는 아들의 성공을 자랑스럽게 **여긴다고 고백한다**."},
  {id:306,vn:95,verb:"confide",pn:1,pattern:"confide+ 명사",meaning:"~에 대해 신뢰하다",example:"You can confide in her good faith.",trans:"그녀의 신의를 **믿고** 속마음을 **털어놓아도** 된다."},
  {id:307,vn:95,verb:"confide",pn:2,pattern:"confide+ 명사",meaning:"털어놓다, 맡기다",example:"The children were confided to the care of a neighbor.",trans:"아이들은 이웃의 보살핌에 **맡겨졌다**."},
  {id:308,vn:96,verb:"confirm",pn:1,pattern:"confirm+ 명사",meaning:"확실하게 하다, 굳히다, 확인하다, 확증하다",example:"Will you confirm the information?",trans:"당신은 그 정보를 **확인해** 줄 건가요?"},
  {id:309,vn:96,verb:"confirm",pn:2,pattern:"confirm+ that S+ V",meaning:"확신시키다",example:"These words confirm us that we are right in our estimate.",trans:"이 말들은 우리의 판단이 옳다는 것을 우리에게 **확인시켜 준다**."},
  {id:310,vn:97,verb:"continue",pn:1,pattern:"continue+ 명사",meaning:"계속하다, 유지시키다",example:"They continued their journey.",trans:"그들은 여행을 **계속했다**."},
  {id:311,vn:97,verb:"continue",pn:2,pattern:"continue+ to VR",meaning:"~하는 것을 계속하다",example:"Prices continue to rise.",trans:"물가가 계속 **오르고 있다**."},
  {id:312,vn:97,verb:"continue",pn:3,pattern:"continue+ V-ing",meaning:"~하는 것을 계속하다",example:"How long will you continue working?",trans:"당신은 얼마나 오래 일을 **계속할** 건가요?"},
  {id:313,vn:97,verb:"continue",pn:4,pattern:"continue",meaning:"지속되다, 머물다",example:"The wet weather may continue.",trans:"흐린 날씨가 **계속될** 수도 있다."},
  {id:314,vn:98,verb:"decide",pn:1,pattern:"decide+ that S+ V",meaning:"~라고 결정하다",example:"The jury decided that he was guilty.",trans:"배심원단은 그가 유죄라고 **판결했다**."},
  {id:315,vn:98,verb:"decide",pn:2,pattern:"decide+ to VR",meaning:"~할 것을 결정하다",example:"She decided not to go alone.",trans:"그녀는 혼자 가지 않기로 **결심했다**."},
  {id:316,vn:98,verb:"decide",pn:3,pattern:"decide+ wh- to VR",meaning:"~할지를 결정하다",example:"He could not decide where to go.",trans:"그는 어디로 가야 할지 **결정하지** 못했다."},
  {id:317,vn:98,verb:"decide",pn:4,pattern:"decide+ on",meaning:"~에 관하여 결정하다",example:"They decided on a site for their new house.",trans:"그들은 새 집 부지를 **결정했다**."},
  {id:318,vn:99,verb:"declare",pn:1,pattern:"declare+ 명사",meaning:"선언하다",example:"They declared their support for the proposal.",trans:"그들은 그 제안에 대한 지지를 **선언했다**."},
  {id:319,vn:99,verb:"declare",pn:2,pattern:"declare+ that S+ V",meaning:"~라고 단언하다, 주장 하다",example:"he declared that her allegation was a lie.",trans:"그는 그녀의 주장이 거짓말이라고 **선언했다**."},
  {id:320,vn:99,verb:"declare",pn:3,pattern:"declare+ 명사+ O.C",meaning:"‘명사’를 ‘O.C’로 선언하다",example:"President Woodrow Wilson declared Mother’s Day an official holiday.",trans:"우드로 윌슨 대통령은 어머니날을 공식 기념일로 **선포했다**."},
  {id:321,vn:100,verb:"decline",pn:1,pattern:"decline",meaning:"기울다, 쇠하다",example:"The sun declines toward west.",trans:"해가 서쪽으로 **기울어진다**."},
  {id:322,vn:100,verb:"decline",pn:2,pattern:"decline+ 명사/ to VR",meaning:"(제의를)정중히 사절하다, 사양하다",example:"He declined their invitation.",trans:"그는 그들의 초대를 **거절했다**."},
  {id:323,vn:101,verb:"demand",pn:1,pattern:"demand+ 명사/ to VR/ that S+ V",meaning:"요구하다, 청구하다",example:"Mr. Kim demanded an immediate explanation.",trans:"김 씨는 즉각적인 해명을 **요구했다**."},
  {id:324,vn:101,verb:"demand",pn:2,pattern:"demand+ 명사",meaning:"묻다",example:"He demanded the name of the child.",trans:"그는 그 아이의 이름을 **요구했다**."},
  {id:325,vn:102,verb:"deny",pn:1,pattern:"deny+ 명사",meaning:"~을 부인하다",example:"I think he can’t deny my request.",trans:"나는 그가 내 요청을 **거절하지** 못할 것이라고 생각한다."},
  {id:326,vn:102,verb:"deny",pn:2,pattern:"deny+ V-ing",meaning:"~하는 것을 부인하다",example:"They all denied ever having seen her.",trans:"그들은 모두 그녀를 본 적이 없다고 **부인했다**."},
  {id:327,vn:102,verb:"deny",pn:3,pattern:"deny+ that S+ V",meaning:"S가 V하다는 것을 부인하다",example:"The accused man denies that he has ever met her.",trans:"피고인은 그녀를 만난 적이 없다고 **부인한다**."},
  {id:328,vn:102,verb:"deny",pn:4,pattern:"deny+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 인정하지 않다",example:"If he is unlucky, he may find that his ex-partner denies him access to his children.",trans:"운이 나쁘면 전 배우자가 자녀에 대한 면접권을 **거부할** 수도 있다는 사실을 알게 될 수도 있다."},
  {id:329,vn:103,verb:"direct",pn:1,pattern:"direct+ 명사",meaning:"지도하다, 지휘하다",example:"There was no teacher to direct the class.",trans:"수업을 **지도할** 교사가 없었다."},
  {id:330,vn:103,verb:"direct",pn:2,pattern:"direct+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 명령하다, 지휘하다",example:"The captain directed his men to advance.",trans:"대위는 부하들에게 전진하라고 **명령했다**."},
  {id:331,vn:103,verb:"direct",pn:3,pattern:"direct+ that+ S+(should) VR",meaning:"~할 것을 지시하다",example:"He directed that barricades be built.",trans:"그는 바리케이드를 세우라고 **지시했다**."},
  {id:332,vn:103,verb:"direct",pn:4,pattern:"direct A to B",meaning:"A에게 B로 가는 길을 가리키다",example:"Can you direct me to the nearest station?",trans:"가장 가까운 역으로 가는 길을 **알려** 주시겠어요?"},
  {id:333,vn:104,verb:"do",pn:1,pattern:"do",meaning:"행동하다, 도움이 되다, 충분하다",example:"Do as I tell you.",trans:"내가 시키는 대로 **해라**."},
  {id:334,vn:104,verb:"do",pn:2,pattern:"do well in school",meaning:"학교의 성적이 좋다",example:"Mary doesn’t do well in school, but she has a good head on her shoulders.",trans:"Mary는 학교 공부를 잘 **못하지만**, 꽤 머리가 좋다."},
  {id:335,vn:104,verb:"do",pn:3,pattern:"do+ 명사",meaning:"~을 하다",example:"You should not do that.",trans:"너는 그렇게 **하면** 안 된다."},
  {id:336,vn:104,verb:"do",pn:4,pattern:"do+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 가져다 주다",example:"Will you do me a favor?",trans:"부탁 하나 **들어주겠어요**?"},
  {id:337,vn:104,verb:"do",pn:5,pattern:"do the+ V-ing",meaning:"~를 하다",example:"I will do the painting.",trans:"나는 그 그림을 **그릴** 것이다."},
  {id:338,vn:105,verb:"doubt",pn:1,pattern:"doubt+ 명사",meaning:"수상하게 여기다, 의혹을 품다",example:"I doubt her honesty.",trans:"나는 그녀의 정직함을 **의심한다**."},
  {id:339,vn:105,verb:"doubt",pn:2,pattern:"doubt+ that S+ V",meaning:"~가 아니라고 생각하다",example:"Can you doubt that the earth is round?",trans:"지구가 둥글다는 것을 **의심할** 수 있나요?"},
  {id:340,vn:105,verb:"doubt",pn:3,pattern:"doubt+ whether+ S+ V",meaning:"~인지 아닌지 수상히 여기다",example:"I doubt whether he was there.",trans:"나는 그가 거기 있었는지 **의심스럽다**."},
  {id:341,vn:106,verb:"draw",pn:1,pattern:"draw+ 명사",meaning:"끌다, 당기다, (커튼 등을) 치다, (결론 등을) 내다, (돈을) 인출하다(~out)",example:"After drawing the curtains, she lit a candle.",trans:"커튼을 **친 후**, 그녀는 촛불을 **켰다**."},
  {id:342,vn:106,verb:"draw",pn:2,pattern:"draw+ 명사",meaning:"그리다",example:"Draw a rough design for a logo.",trans:"로고의 대략적인 디자인을 **그려라**."},
  {id:343,vn:106,verb:"draw",pn:3,pattern:"draw+ 명사+ to VR",meaning:"‘명사’를 꾀어서 ~하게 하다",example:"Pretty as you are, you would draw customers to buy them.",trans:"당신처럼 예쁘다면 고객들이 그것들을 사도록 **끌어들일** 수 있을 것이다."},
  {id:344,vn:106,verb:"draw",pn:4,pattern:"draw+ game",meaning:"무승부가 되다",example:"The game was drawn.",trans:"그 경기는 **무승부로 끝났다**."},
  {id:345,vn:106,verb:"draw",pn:5,pattern:"draw near",meaning:"다가오다",example:"Christmas is drawing near.",trans:"크리스마스가 **다가오고 있다**."},
  {id:346,vn:107,verb:"drive",pn:1,pattern:"drive+ 명사",meaning:"몰다, 운전하다, 가동시키다",example:"We may go to school, participate in sports, drive cars, and sometimes become involved in conflicts.",trans:"우리는 학교에 **다니고**, 스포츠에 **참여하고**, 자동차를 **운전하고**, 때로는 갈등에 **휘말리기도** 한다."},
  {id:347,vn:107,verb:"drive",pn:2,pattern:"drive+ 명사+ 형용사",meaning:"‘명사’를 ~한 상태로 만들다",example:"His rudeness drove her angry.",trans:"그의 무례함이 그녀를 **화나게 했다**."},
  {id:348,vn:107,verb:"drive",pn:3,pattern:"drive+ 명사+ to VR",meaning:"‘명사’에게 ~하게 하다",example:"More than one, depression drove him to attempt suicide.",trans:"한 번 이상, 우울증이 그를 자살을 **시도하게 몰아갔다**."},
  {id:349,vn:108,verb:"dare",pn:1,pattern:"dare to VR",meaning:"감히 ~하다",example:"He does not dare to tell us.",trans:"그는 감히 우리에게 **말하려 하지 않는다**."},
  {id:350,vn:108,verb:"dare",pn:2,pattern:"dare+ 명사",meaning:"모험적으로 해보다, 위험을 무릅쓰다, 도전하다",example:"I dare everything.",trans:"나는 모든 것에 **맞선다**."},
  {id:351,vn:109,verb:"derive",pn:1,pattern:"derive A from B",meaning:"B로부터 A를 끌어내다, 도출하다",example:"We derive knowledge from reading books.",trans:"우리는 책을 읽음으로써 지식을 **얻는다**."},
  {id:352,vn:109,verb:"derive",pn:2,pattern:"derive from",meaning:"~로 부터 유래되다, 도출되다",example:"This tradition derives from an old Indian rain inviting ceremony.",trans:"이 전통은 오래된 인디언 기우제에서 **유래한다**."},
  {id:353,vn:110,verb:"describe",pn:1,pattern:"describe+ 명사",meaning:"~을 묘사하다, 기술하다",example:"Words cannot describe the scene.",trans:"말로는 그 광경을 **묘사할** 수 없다."},
  {id:354,vn:110,verb:"describe",pn:2,pattern:"describe A as B",meaning:"A를 B로서 표현하다",example:"We might describe her as a good-natured woman.",trans:"우리는 그녀를 마음씨 좋은 여성으로 **묘사할** 수 있을 것이다."},
  {id:355,vn:111,verb:"design",pn:1,pattern:"design+ 명사",meaning:"설계하다, 밑그림을 그리다",example:"The golf genius designed this 18-hole course.",trans:"그 골프 천재가 이 18홀 코스를 **설계했다**."},
  {id:356,vn:111,verb:"design",pn:2,pattern:"design+ to VR/ that S+ V",meaning:"의도하다",example:"I designed to be a lawyer.",trans:"나는 변호사가 **되려고 계획했다**."},
  {id:357,vn:112,verb:"designate",pn:1,pattern:"designate+ 명사",meaning:"명확히 나타내다",example:"On this map, red lines designate main roads.",trans:"이 지도에서 빨간 선은 주요 도로를 **나타낸다**."},
  {id:358,vn:112,verb:"designate",pn:2,pattern:"designate A as B",meaning:"A를 B로 지명하다",example:"he has been designated as the next General Secretary.",trans:"그는 차기 사무총장으로 **지명되었다**."},
  {id:359,vn:112,verb:"designate",pn:3,pattern:"designate+ 명사(O)+ 명사(O.C)",meaning:"‘명사’를 ~로 칭하다",example:"The ruler was designated king.",trans:"그 통치자는 왕으로 **임명되었다**."},
  {id:360,vn:113,verb:"desire",pn:1,pattern:"desire+ 명사",meaning:"~을 바라다",example:"We all desire happiness.",trans:"우리는 모두 행복을 **원한다**."},
  {id:361,vn:113,verb:"desire",pn:2,pattern:"desire+ to VR",meaning:"~할 것을 바라다",example:"I desire to stay here until I die.",trans:"나는 죽을 때까지 여기에 **머물고 싶다**."},
  {id:362,vn:113,verb:"desire",pn:3,pattern:"desire+ 명사+ to VR",meaning:"‘명사’가 ~하길 바라다",example:"What do you desire me to do?",trans:"당신은 내가 무엇을 **해주기를 바랍니까**?"},
  {id:363,vn:113,verb:"desire",pn:4,pattern:"desire+ that S+ (should)V",meaning:"~해야 한다고 바라다",example:"She desired that all the letters be burnt after her death.",trans:"그녀는 자신이 죽은 후 모든 편지를 태워버리기를 **원했다**."},
  {id:364,vn:114,verb:"determine",pn:1,pattern:"determine to VR",meaning:"~하겠다고 결심하다",example:"I never determine to live above my income.",trans:"나는 결코 수입 이상으로 **살려고 하지 않는다**."},
  {id:365,vn:114,verb:"determine",pn:2,pattern:"determine+ that S+ V",meaning:"~해야 한다고 결심하다",example:"I determined that nothing should be changed.",trans:"나는 아무것도 바뀌어서는 안 된다고 **결심했다**."},
  {id:366,vn:114,verb:"determine",pn:3,pattern:"determine+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 결심시키다",example:"What determined you to oppose the plan?",trans:"무엇이 당신으로 하여금 그 계획에 반대하도록 **만들었습니까**?"},
  {id:367,vn:114,verb:"determine",pn:4,pattern:"determine+ wh-S+ V",meaning:"결정하다",example:"Have you determined what you are going to do after graduation?",trans:"졸업 후 무엇을 할지 **결정했습니까**?"},
  {id:368,vn:115,verb:"dip",pn:1,pattern:"dip+ 명사",meaning:"담그다, 적시기 위해 담그다, 떠내다",example:"He dipped his pen into the ink.",trans:"그는 펜을 잉크에 **담갔다**."},
  {id:369,vn:115,verb:"dip",pn:2,pattern:"dip",meaning:"기울다, 하강하다",example:"The bird dipped in this flight.",trans:"그 새는 비행 중에 **급강하했다**."},
  {id:370,vn:116,verb:"discharge",pn:1,pattern:"discharge+ 명사",meaning:"짐을 내리다, 방출하다, 배설하다, 배출하다, 해방시키다",example:"Please discharge the ship.",trans:"배의 짐을 **내려 주십시오**."},
  {id:371,vn:117,verb:"dispose",pn:1,pattern:"dispose+ 명사",meaning:"배치하다",example:"The battleships were disposed in a straight line.",trans:"그 전함들은 일렬로 **배치되었다**."},
  {id:372,vn:117,verb:"dispose",pn:2,pattern:"dispose of + 명사",meaning:"처분하다, 없애다",example:"It is hard to dispose of the material.",trans:"그 물질을 **처리하기**가 어렵다."},
  {id:373,vn:117,verb:"dispose",pn:3,pattern:"dispose+ 명사+ to VR",meaning:"‘명사’에게 ~할 마음이 내키게 하다",example:"The chance of promotion disposed him to accept the offer.",trans:"승진의 기회가 그로 하여금 그 제안을 받아들이도록 **마음을 움직였다**."},
  {id:374,vn:118,verb:"double",pn:1,pattern:"double+ 명사",meaning:"두 배가 되게 하다, 겹치게 하다",example:"I will double your salary.",trans:"나는 당신의 월급을 두 배로 **올려 드리겠습니다**."},
  {id:375,vn:118,verb:"double",pn:2,pattern:"double",meaning:"두 배가 되다",example:"The noise doubled when the window was broken.",trans:"창문이 깨지자 소음이 두 배로 **커졌다**."},
  {id:376,vn:118,verb:"double",pn:3,pattern:"double as",meaning:"겸하다",example:"The living room doubles as dining area.",trans:"그 거실은 식사 공간으로도 **쓰인다**."},
  {id:377,vn:119,verb:"drain",pn:1,pattern:"drain+ 명사",meaning:"물을 빼내다, 배수하다, 유출시키다",example:"They have to dig a drench to drain water out.",trans:"그들은 물을 **빼내기** 위해 도랑을 **파야 한다**."},
  {id:378,vn:119,verb:"drain",pn:2,pattern:"drain",meaning:"물이 빠지다, 물기가 없어져 마르다, 쇠퇴하다",example:"The street drains well.",trans:"그 거리는 배수가 잘 **된다**."},
  {id:379,vn:120,verb:"dream",pn:1,pattern:"dream",meaning:"꿈꾸다, 꿈 같은 느낌을 받다",example:"He says he seldom dreams.",trans:"그는 꿈을 거의 꾸지 않는다고 **말한다**."},
  {id:380,vn:120,verb:"dream",pn:2,pattern:"dream of/ dream about",meaning:"~에 대하여 꿈꾸다, 상상하다",example:"Little did I dream of meeting her again.",trans:"나는 그녀를 다시 만날 것이라고는 꿈에도 **생각하지 못했다**."},
  {id:381,vn:120,verb:"dream",pn:3,pattern:"dream+ 명사",meaning:"~을 꿈꾸다",example:"He dreamed a horrible dream.",trans:"그는 무서운 꿈을 **꾸었다**."},
  {id:382,vn:120,verb:"dream",pn:4,pattern:"dream+ that S+ V",meaning:"꿈꾸다, 상상 하다",example:"I dreamt that he was home.",trans:"나는 그가 집에 있는 꿈을 **꾸었다**."},
  {id:383,vn:121,verb:"employ",pn:1,pattern:"employ+ 명사(주로 사람)",meaning:"고용하다, 일을 주다",example:"This work will employ 60 men.",trans:"이 공사는 60명을 **고용할** 것이다."},
  {id:384,vn:121,verb:"employ",pn:2,pattern:"employ + 명사+ (전 짝)",meaning:"(물건, 시간, 힘 등을) 소비하다, 사용하다",example:"I don’t like the approaches and methods employed in the study.",trans:"나는 그 연구에서 **사용된** 접근법과 방법들이 마음에 들지 않는다."},
  {id:385,vn:122,verb:"examine",pn:1,pattern:"examine+ 명사+(전 짝)",meaning:"시험하다",example:"The teacher examined students on their knowledge of history.",trans:"선생님은 학생들의 역사 지식을 **시험했다**."},
  {id:386,vn:122,verb:"examine",pn:2,pattern:"examine+ 명/ wh- S+ V",meaning:"검사하다, 조사하다, 진찰하다",example:"He examined her passport and stamped it.",trans:"그는 그녀의 여권을 **검사하고** 도장을 **찍었다**."},
