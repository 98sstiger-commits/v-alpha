  {id:387,vn:123,verb:"excuse",pn:1,pattern:"excuse+ 명사+ (전 짝)",meaning:"용서하다, 너그러이 봐주다",example:"Excuse me for not having answered your letter sooner.",trans:"당신의 편지에 더 빨리 답장하지 못한 점을 **용서해** 주세요."},
  {id:388,vn:123,verb:"excuse",pn:2,pattern:"excuse+ 명사",meaning:"변명하다",example:"That doesn’t excuse my mother’s behavior.",trans:"그것이 내 어머니의 행동을 **정당화해** 주지는 않는다."},
  {id:389,vn:124,verb:"expect",pn:1,pattern:"expect A of B",meaning:"B에게서 A를 기대하다",example:"I hope you don’t expect much of me.",trans:"나에게 많은 것을 기대하지 않았으면 **한다**."},
  {id:390,vn:124,verb:"expect",pn:2,pattern:"expect+ that S+ V",meaning:"S가 V하는 것을 기대(예상)하다",example:"I expect you can guess what follows.",trans:"다음에 무슨 일이 일어날지 짐작할 수 있을 거라고 **생각한다**."},
  {id:391,vn:124,verb:"expect",pn:3,pattern:"expect to VR",meaning:"~할 것을 기대(예상)하다",example:"You cannot expect to like all the people you will work with.",trans:"함께 일하게 될 모든 사람들을 좋아할 거라고 **기대할** 수는 없다."},
  {id:392,vn:124,verb:"expect",pn:4,pattern:"expect+ 명사+ to VR",meaning:"‘명사’가 ~할 것을 기대하다",example:"Korea is expected to be among the world’s top four auto-making countries by 2010.",trans:"한국은 2010년까지 세계 4대 자동차 생산국 중 하나가 될 것으로 **예상된다**."},
  {id:393,vn:125,verb:"explain",pn:1,pattern:"explain+ 명사",meaning:"설명하다",example:"Explain your opinion briefly.",trans:"당신의 의견을 간략히 **설명하세요**."},
  {id:394,vn:125,verb:"explain",pn:2,pattern:"explain A to B",meaning:"A를 B에게 설명하다",example:"She explained her conduct to her boss.",trans:"그녀는 자신의 행동을 상사에게 **해명했다**."},
  {id:395,vn:125,verb:"explain",pn:3,pattern:"explain+ that S+ V/wh- S+ V",meaning:"설명하다",example:"He explained that his train had been delayed.",trans:"그는 기차가 연착되었다고 **설명했다**."},
  {id:396,vn:126,verb:"earn",pn:1,pattern:"earn+ 명사",meaning:"~을 벌다",example:"He earns ten dollars a day.",trans:"그는 하루에 10달러를 **번다**."},
  {id:397,vn:126,verb:"earn",pn:2,pattern:"earn+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 얻게 해주다",example:"Your untiring efforts will earn you the respect of all who know you.",trans:"당신의 끊임없는 노력은 당신을 아는 모든 사람들의 존경을 **받게 해** 줄 것이다."},
  {id:398,vn:127,verb:"ease",pn:1,pattern:"ease+ 명사",meaning:"완화시키다, 덜다, 편하게 하다, 안심시키다, 늦추다",example:"The medicine eased her pain.",trans:"그 약은 그녀의 고통을 **덜어** 주었다."},
  {id:399,vn:127,verb:"ease",pn:2,pattern:"ease A of B",meaning:"A에게서 B를 덜어주다",example:"He eased me of the burden.",trans:"그는 나의 짐을 **덜어** 주었다."},
  {id:400,vn:127,verb:"ease",pn:3,pattern:"ease oneself",meaning:"안심하다, 기분을 푸다, 대•소변을 보다",example:"You can’t ease yourself around here.",trans:"이 근처에서 용변을 **봐서는** 안 된다."},
  {id:401,vn:128,verb:"engage",pn:1,pattern:"engage+ 명사+ to 명사",meaning:"~와 ~를 약혼시키다",example:"I am engaged to her.",trans:"나는 그녀와 약혼한 **상태이다**."},
  {id:402,vn:128,verb:"engage",pn:2,pattern:"engage+ 명사+ in 명사",meaning:"종사시키다, 몰두시키다",example:"The ship is engaged in foreign trade.",trans:"그 배는 해외 무역에 **종사하고** 있다."},
  {id:403,vn:128,verb:"engage",pn:3,pattern:"engage+ to VR/ that S+ V/ for",meaning:"장담하다, 약속하다",example:"You had better not to engage to do the work unless you have time.",trans:"시간이 없다면 그 일을 하겠다고 **약속하지** 않는 것이 좋다."},
  {id:404,vn:129,verb:"ensure",pn:1,pattern:"ensure+ 명사",meaning:"안전하게 하다",example:"You should ensure yourself against the critics.",trans:"비평가들에 대비해 스스로를 **보호해야** 한다."},
  {id:405,vn:129,verb:"ensure",pn:2,pattern:"ensure+ 명사/ V-ing/ that S+ V",meaning:"확실하게 하다, 보증하다, 확보하다",example:"They ensured his obtaining the prize.",trans:"그들은 그가 상을 **받도록 확실히 했다**."},
  {id:406,vn:129,verb:"ensure",pn:3,pattern:"ensure+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 보장해주다",example:"This letter of recommendation will ensure you an interview.",trans:"이 추천서는 당신에게 면접 기회를 **보장해** 줄 것이다."},
  {id:407,vn:130,verb:"entitle",pn:1,pattern:"entitle+ 명사+ O.C",meaning:"‘명사’를 ~라고 칭하다",example:"The book was entitled ‘The wealth of nations’",trans:"그 책은 '국부론'이라는 제목이 **붙어 있었다**."},
  {id:408,vn:130,verb:"entitle",pn:2,pattern:"entitle+ A+ to B",meaning:"A에게 B에 대한 권리, 자격을 주다",example:"Your experience entitles you to the respect of the young.",trans:"당신의 경험은 젊은이들로부터 존경을 **받을 자격을 부여한다**."},
  {id:409,vn:131,verb:"equip",pn:1,pattern:"equip+ A with B",meaning:"A에게 B를 갖추게 하다",example:"The top priority is to equip the fort with guns and ammunitions.",trans:"최우선 과제는 요새에 총기와 탄약을 **갖추는 것이다**."},
  {id:410,vn:131,verb:"equip",pn:2,pattern:"equip+ 명사+ to VR",meaning:"‘명사’에게 ~할 준비를 갖추게 하다",example:"He wanted to be well equipped to study abroad.",trans:"그는 유학을 위해 충분한 준비를 **갖추고 싶었다**."},
  {id:411,vn:131,verb:"equip",pn:3,pattern:"equip A for B",meaning:"A를 B에 대비시키다",example:"He has equipped himself for the trip.",trans:"그는 여행을 위한 준비를 **갖추었다**."},
  {id:412,vn:132,verb:"escape",pn:1,pattern:"escape+ 명사/ V-ing",meaning:"~을 면하다, 피하다",example:"He escaped death.",trans:"그는 죽음을 **모면했다**."},
  {id:413,vn:132,verb:"escape",pn:2,pattern:"escape",meaning:"탈출하다, 새어 나오다",example:"One of the prisoners escaped from the camp.",trans:"죄수 중 한 명이 수용소에서 **탈출했다**."},
  {id:414,vn:133,verb:"face",pn:1,pattern:"face+ 명사",meaning:"~에 면하다, ~을 향하다, 마주하다",example:"Christie looked relaxed and calm as he faced the press.",trans:"크리스티는 기자들을 **대하면서** 느긋하고 침착해 보였다."},
  {id:415,vn:133,verb:"face",pn:2,pattern:"be faced with",meaning:"~에 직면하다",example:"We are faced with a serious problem.",trans:"우리는 심각한 문제에 **직면해 있다**."},
  {id:416,vn:133,verb:"face",pn:3,pattern:"wear a long face/ make a face",meaning:"인상을 쓰다 face to face: 서로 마주보고 save one’s face: 체면을 살리다 in the face of: ~을 맞대놓고, ~에도 불구하고",example:"",trans:"나는 그에게 돈을 **빚지고** 있다."},
  {id:417,vn:134,verb:"fail",pn:1,pattern:"fail+ 명사",meaning:"~을 저버리다, ~에서 낙제하다, 잃다",example:"I fall words to express my thanks.",trans:"감사한 마음을 표현할 말을 **찾지 못하겠다**."},
  {id:418,vn:134,verb:"fail",pn:2,pattern:"fail+ to VR",meaning:"~하지 못하다",example:"Don’t fail to let me know about that.",trans:"그 일을 반드시 나에게 **알려다오**."},
  {id:419,vn:134,verb:"fail",pn:3,pattern:"fail+ in",meaning:"~가 모자라다, ~하는 일에 실패하다",example:"If we did not report what was happening in the country, we would be failing in our duty.",trans:"우리가 나라에서 일어나고 있는 일을 보도하지 않는다면, 우리는 의무를 **저버리는 것이다**."},
  {id:420,vn:134,verb:"fail",pn:4,pattern:"fail",meaning:"약해지다, 망가지다",example:"His sight has begun to fail.",trans:"그의 시력이 **나빠지기** 시작했다."},
  {id:421,vn:135,verb:"feed",pn:1,pattern:"feed+ 명사",meaning:"먹이를 주다, 부양 하다",example:"That’s not sufficient to feed a hundred men.",trans:"그것은 백 명을 **먹이기에** 충분하지 않다."},
  {id:422,vn:136,verb:"feel",pn:1,pattern:"feel+ 명사",meaning:"만져보다, 느끼다",example:"Feel their pain.",trans:"그들의 고통을 **느껴라**."},
  {id:423,vn:136,verb:"feel",pn:2,pattern:"feel+ 형용사",meaning:"~한 상태로 느끼다",example:"I feel so good.",trans:"나는 정말 기분이 **좋다**."},
  {id:424,vn:136,verb:"feel",pn:3,pattern:"feel for",meaning:"~의 감정을 알다, 이해하다/ 더듬어 찾다",example:"I really felt for her when her husband died.",trans:"그녀의 남편이 죽었을 때 나는 그녀가 정말 **안타까웠다**."},
  {id:425,vn:136,verb:"feel",pn:4,pattern:"feel+ 명사+ VR",meaning:"‘명사’가 ~하는 것을 느끼다",example:"He felt his face flush.",trans:"그는 자신의 얼굴이 붉어지는 것을 **느꼈다**."},
  {id:426,vn:136,verb:"feel",pn:5,pattern:"feel+ 명사+ V-ing",meaning:"‘명사’가 ~하는 것을 느끼다",example:"We felt the ground sinking.",trans:"우리는 땅이 가라앉는 것을 **느꼈다**."},
  {id:427,vn:136,verb:"feel",pn:6,pattern:"feel+ 명사+pp",meaning:"‘명사’가 ~되는 것을 느끼다",example:"I felt myself lifted up.",trans:"나는 내가 들어 올려지는 것을 **느꼈다**."},
  {id:428,vn:136,verb:"feel",pn:7,pattern:"feel+ that S+ V",meaning:"~을 느끼다",example:"I feat that some disaster is impending.",trans:"나는 어떤 재앙이 임박해 있다는 것을 **느낀다**."},
  {id:429,vn:136,verb:"feel",pn:8,pattern:"feel it+ O.C+ to VR",meaning:"~하는 것이 ‘O.C’ 하다고 생각하다, 느끼다",example:"She felt it her duty to help him.",trans:"그녀는 그를 돕는 것이 자신의 의무라고 **느꼈다**."},
  {id:430,vn:136,verb:"feel",pn:9,pattern:"feel at home",meaning:"집처럼 편하다",example:"I feel at home at his home.",trans:"나는 그의 집에서 편안함을 **느낀다**."},
  {id:431,vn:136,verb:"feel",pn:10,pattern:"feel like+ V-ing",meaning:"~하고 싶어하다, ~하는 느낌이 들다",example:"I feel like walking on the clouds.",trans:"나는 구름 위를 걷는 것 같은 기분이 **든다**."},
  {id:432,vn:137,verb:"figure",pn:1,pattern:"figure+ 명사/~ out 명사",meaning:"계산하다, 어림잡다, 나타내다",example:"A dove figures peace.",trans:"비둘기는 평화를 **상징한다**."},
  {id:433,vn:137,verb:"figure",pn:2,pattern:"figure+ 명사",meaning:"~라고 생각하다, 판단하다",example:"",trans:"그는 돈을 **가지고 있다**."},
  {id:434,vn:137,verb:"figure",pn:3,pattern:"figure+ 명사+ (to be)보어",meaning:"~라고 생각하다, 판단하다",example:"I figured him to be about fifty.",trans:"나는 그가 50세쯤 되었다고 **생각했다**."},
  {id:435,vn:137,verb:"figure",pn:4,pattern:"figure+ that S+ V",meaning:"~라고 생각하다, 판단하다",example:"She figured that both she and Ned had learned a lot from the experience.",trans:"그녀는 자신과 네드 모두 그 경험에서 많은 것을 **배웠다고** 생각했다."},
  {id:436,vn:137,verb:"figure",pn:5,pattern:"figure+ as+ 명사",meaning:"~의 역을 연기하다, 두각을 나타내다",example:"He figured as a king in the play.",trans:"그는 그 연극에서 왕으로 **등장했다**."},
  {id:437,vn:137,verb:"figure",pn:6,pattern:"figure out",meaning:"이해하다, 파악하다",example:"They’re trying to figure out the politics of this whole situation.",trans:"그들은 이 상황 전체의 정치적 역학을 **파악하려** 하고 있다."},
  {id:438,vn:138,verb:"find",pn:1,pattern:"find+ 명사",meaning:"찾다, 발견하다, 알다",example:"We found a gold mine.",trans:"우리는 금광을 **발견했다**."},
  {id:439,vn:138,verb:"find",pn:2,pattern:"find+ that S+ V",meaning:"~라고 알다, 파악하다",example:"He found that he was mistaken.",trans:"그는 자신이 틀렸음을 **알았다**."},
  {id:440,vn:138,verb:"find",pn:3,pattern:"find+ 명사(I.O)+ 명사(D.O)",meaning:"’I.O’ 에게 ‘D.O’를 찾아주다",example:"Will you find me a good one?",trans:"좋은 것 하나 **찾아** 주시겠어요?"},
  {id:441,vn:138,verb:"find",pn:4,pattern:"find+ 명사+ 명사(O.C)",meaning:"~를 ~라고 알다, 파악하다",example:"I found them students.",trans:"나는 그들이 학생임을 **알았다**."},
  {id:442,vn:138,verb:"find",pn:5,pattern:"find+ 명사+형용사",meaning:"‘명사’가 ~한 상태임을 알다",example:"I found my purse gone.",trans:"나는 지갑이 없어진 것을 **알았다**."},
  {id:443,vn:138,verb:"find",pn:6,pattern:"find+ it+ O.C+ to VR",meaning:"~하는 것이 ‘O.C’하다는 것을 알게 되다",example:"We found it difficult to do so.",trans:"우리는 그렇게 하기가 어렵다는 것을 **알았다**."},
  {id:444,vn:138,verb:"find",pn:7,pattern:"be found+ 명사/ 형용사/ to VR",meaning:"~로 발견되다, 알게 되다",example:"He was found dead.",trans:"그는 죽은 채로 **발견되었다**."},
  {id:445,vn:139,verb:"fix",pn:1,pattern:"fix+ 명사",meaning:"고착시키다, 확정하다, 수선하다, 마련하다",example:"Fix these words in your mind.",trans:"이 말들을 마음속에 **새겨라**."},
  {id:446,vn:139,verb:"fix",pn:2,pattern:"fix on",meaning:"(시선 등 을) ~에 고정시키다",example:"His eyes were fixed on the distant ship.",trans:"그의 눈은 멀리 있는 배에 **고정되어 있었다**."},
  {id:447,vn:139,verb:"fix",pn:3,pattern:"fix+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 마련해주다",example:"Will you fix me lunch?",trans:"점심 좀 **만들어** 주시겠어요?"},
  {id:448,vn:140,verb:"affix",pn:1,pattern:"affix + 명사",meaning:"부착하다, 붙이다 (= attach)",example:"The label should be firmly affixed to the package.",trans:"라벨은 포장지에 단단히 **부착되어야** 한다."},
  {id:449,vn:141,verb:"focus",pn:1,pattern:"focus on",meaning:"~을 집중하다",example:"His eyes did not focus on me.",trans:"그의 눈은 나에게 **초점이 맞지 않았다**."},
  {id:450,vn:141,verb:"focus",pn:2,pattern:"focus A on B",meaning:"A를 B에 집중시키다",example:"Please focus your minds on the following problem.",trans:"다음 문제에 집중해 **주십시오**."},
  {id:451,vn:142,verb:"force",pn:1,pattern:"force+ 명사",meaning:"~을 강행하다, 억지로 하게 하다",example:"She won’t do it unless you force her.",trans:"그녀는 강요하지 않으면 그것을 **하지 않을** 것이다."},
  {id:452,vn:142,verb:"force",pn:2,pattern:"force+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 강요하다",example:"They forced him to sign the paper.",trans:"그들은 그에게 서류에 서명하도록 **강요했다**."},
  {id:453,vn:142,verb:"force",pn:3,pattern:"be forced to VR",meaning:"(억지로) ~하게 되다",example:"They were forced to forsake their wounded soldiers.",trans:"그들은 부상당한 병사들을 **버릴** 수밖에 없었다."},
  {id:454,vn:142,verb:"force",pn:4,pattern:"force+ 명사+ 전치사+ 명사",meaning:"강요해서 ~한 상태에 이르게 하다",example:"I forced him out of the position.",trans:"나는 그를 그 자리에서 **물러나게 했다**."},
  {id:455,vn:143,verb:"forget",pn:1,pattern:"forget+ to VR",meaning:"~할 것을 잊다",example:"I forget to answer the letter.",trans:"나는 편지에 답장하는 것을 **잊었다**."},
  {id:456,vn:143,verb:"forget",pn:2,pattern:"forget+ V-ing",meaning:"~한 것을 잊다",example:"I shall never forget hearing the President’s address.",trans:"나는 대통령의 연설을 들었던 것을 결코 **잊지 못할** 것이다."},
  {id:457,vn:143,verb:"forget",pn:3,pattern:"forget+ 명사",meaning:"~를 잊다",example:"He forgot his lines.",trans:"그는 자신의 대사를 **잊어버렸다**."},
  {id:458,vn:143,verb:"forget",pn:4,pattern:"forget+ that S+ V",meaning:"~를 잊다",example:"Did you forget that I was coming?",trans:"내가 오는 것을 **잊었나요**?"},
  {id:459,vn:143,verb:"forget",pn:5,pattern:"forget about",meaning:"~에 관하여 잊어버리다",example:"Let’s forget about us and please put the blame on me.",trans:"우리 사이의 일은 **잊고** 모든 잘못을 나에게 **돌려** 주세요."},
  {id:460,vn:143,verb:"forget",pn:6,pattern:"forget oneself",meaning:"자제심을 잃다",example:"Don’t forget yourself no matter what you may see.",trans:"무슨 일이 있어도 자신을 **잊지 마세요**."},
  {id:461,vn:144,verb:"form",pn:1,pattern:"form",meaning:"형성되다, 생기다",example:"A plan began to form in his mind.",trans:"그의 머릿속에서 계획이 **떠오르기 시작했다**."},
  {id:462,vn:144,verb:"form",pn:2,pattern:"form+ 명사",meaning:"~을 만들다, 세우다, ~을 형성시키다",example:"I don’t form opinions without careful consideration.",trans:"나는 신중한 고려 없이 의견을 **형성하지 않는다**."},
  {id:463,vn:144,verb:"form",pn:3,pattern:"take the form of",meaning:"~의 형태를 띠다 in the form of: ~의 형태로 for form’s sake: 격식상",example:"It is to take the primary form of religion.",trans:"그것은 종교의 근본적인 형태를 **띠는** 것이다."},
  {id:464,vn:145,verb:"fall",pn:1,pattern:"fall",meaning:"떨어지다, 내려앉다, 늘어지다, 전락하다, 쓰러지다, 죽다, 함락되다",example:"The snow was falling.",trans:"눈이 **내리고 있었다**."},
  {id:465,vn:145,verb:"fall",pn:2,pattern:"fall",meaning:"가라앉다, 찾아 듣다, 날짜에 해당되다, 귀속되다",example:"Night began to fall.",trans:"밤이 **내리기 시작했다**."},
  {id:466,vn:145,verb:"fall",pn:3,pattern:"fall+ 보어",meaning:"어떤 상태가 되다",example:"The contract has fallen due.",trans:"계약 기한이 **도래했다**."},
  {id:467,vn:146,verb:"fancy",pn:1,pattern:"fancy+ 명사/ V-ing/ that S+ V",meaning:"~을 상상하다",example:"I fancied that the house was on fire.",trans:"나는 집에 불이 났다고 **생각했다**."},
  {id:468,vn:146,verb:"fancy",pn:2,pattern:"fancy+ 명사",meaning:"즐기다, 마음에 들어 하다",example:"Do you fancy anything sweet?",trans:"달콤한 것이 **당기나요**?"},
  {id:469,vn:146,verb:"fancy",pn:3,pattern:"fancy+ 명사+ 보어",meaning:"~를 ~로 생각하다",example:"She fancies herself beautiful.",trans:"그녀는 자신이 아름답다고 **여긴다**."},
  {id:470,vn:147,verb:"fear",pn:1,pattern:"fear+ 명사/ V-ing/ to VR",meaning:"두려워하다",example:"He feared nothing.",trans:"그는 아무것도 **두려워하지 않았다**."},
  {id:471,vn:147,verb:"fear",pn:2,pattern:"fear+ that S+ V",meaning:"염려하다",example:"I fear that he dreams too much.",trans:"나는 그가 너무 많은 꿈을 꾼다고 **우려된다**."},
  {id:472,vn:148,verb:"fill",pn:1,pattern:"fill+ 명사",meaning:"~을 채우다",example:"The crowd filled the garden.",trans:"군중이 정원을 **가득 메웠다**."},
  {id:473,vn:148,verb:"fill",pn:2,pattern:"fill A with B",meaning:"A를 B로 채우다",example:"Fill the bottle with water.",trans:"병에 물을 **채우세요**."},
  {id:474,vn:148,verb:"fill",pn:3,pattern:"fill+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 채워주다",example:"He filled me a glass of whiskey.",trans:"그는 나에게 위스키 한 잔을 **따라 주었다**."},
  {id:475,vn:148,verb:"fill",pn:4,pattern:"fill with",meaning:"~로 가득 차다",example:"Her eyes filled with tears.",trans:"그녀의 눈에 눈물이 **가득 찼다**."},
  {id:476,vn:148,verb:"fill",pn:5,pattern:"fill in",meaning:"빈 곳을 채우다",example:"Fill in the blanks with suitable words.",trans:"빈칸에 알맞은 단어를 **채우세요**."},
  {id:477,vn:148,verb:"fill",pn:6,pattern:"fill out",meaning:"문서의 여백을 메우다",example:"Fill out the form.",trans:"양식을 **작성하세요**."},
  {id:478,vn:148,verb:"fill",pn:7,pattern:"fill up",meaning:"가득히 채우다",example:"Fill it up please.",trans:"가득 **채워 주세요**."},
  {id:479,vn:149,verb:"fly",pn:1,pattern:"fly",meaning:"날다, 날아가다, 나부끼다",example:"Time flies like an arrow.",trans:"세월은 화살처럼 **흐른다**."},
  {id:480,vn:149,verb:"fly",pn:2,pattern:"fly+ 명사",meaning:"날리다, 타고 날다",example:"I like to fly a kite.",trans:"나는 연을 **날리는** 것을 좋아한다."},
  {id:481,vn:150,verb:"follow",pn:1,pattern:"follow+ 명사",meaning:"뒤를 잇다, 따라 가다, 종사하다, 추구하다, 본받다, 이해하다",example:"Summer follows spring.",trans:"봄 다음에는 여름이 **온다**."},
  {id:482,vn:150,verb:"follow",pn:2,pattern:"It follows that S+ V",meaning:"결과로서 당연히 ~하다",example:"It follows that he is not the murderer.",trans:"따라서 그가 살인자가 아니라는 결론이 **나온다**."},
  {id:483,vn:150,verb:"follow",pn:3,pattern:"as follows",meaning:"그 다음과 같다",example:"His words were as follows.",trans:"그의 말은 다음과 **같았다**."},
  {id:484,vn:151,verb:"fool",pn:1,pattern:"fool",meaning:"어리석게 굴다 장난치다, 빈둥대다",example:"Don’t stay fooling around.",trans:"빈둥거리며 시간을 **낭비하지 마라**."},
  {id:485,vn:151,verb:"fool",pn:2,pattern:"fool+ 명사",meaning:"바보 취급하다, 속이다",example:"He has been fooling me all the time.",trans:"그는 줄곧 나를 **속여왔다**."},
  {id:486,vn:152,verb:"forbid",pn:1,pattern:"forbid+ 명사",meaning:"금지하다 (=ban)",example:"We forbid wine during mealtime.",trans:"우리는 식사 중에 음주를 **금한다**."},
  {id:487,vn:152,verb:"forbid",pn:2,pattern:"forbid+ V-ing",meaning:"~하는 것을 금하다",example:"I forbid smoking in the hall.",trans:"나는 홀에서의 흡연을 **금한다**."},
  {id:488,vn:152,verb:"forbid",pn:3,pattern:"forbid+ 명사+ to VR",meaning:"‘명사’가 ~하는 것을 금지하다",example:"His father forbids him to see me.",trans:"그의 아버지는 그가 나를 만나는 것을 **금한다**."},
  {id:489,vn:152,verb:"forbid",pn:4,pattern:"forbid+ 명사(I.O)+ 명사(D.O)",meaning:"’I.O’에게 ‘D.O’를 금하다",example:"I forbid you all leniency with the man.",trans:"나는 당신 모두가 그 남자에게 관대하게 구는 것을 **금한다**."},
  {id:490,vn:152,verb:"forbid",pn:5,pattern:"forbid+ that+ S+ (should)VR",meaning:"forbid+ that+ S+ (should)VR",example:"The police have forbidden that the house be opened.",trans:"경찰은 그 집을 개방하는 것을 **금지했다**."},
  {id:491,vn:153,verb:"forgive",pn:1,pattern:"forgive+ 명사",meaning:"용서하다",example:"I forgave the boy for deceiving me.",trans:"나는 그 소년이 나를 속인 것을 **용서했다**."},
  {id:492,vn:153,verb:"forgive",pn:2,pattern:"forgive+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 용서하다",example:"Forgive me my insensibility.",trans:"제 무감각함을 **용서해** 주세요."},
  {id:493,vn:154,verb:"get",pn:1,pattern:"get",meaning:"이르다, 도달하다, 당도하다",example:"We get here by train the day before yesterday.",trans:"우리는 그저께 기차를 타고 여기에 **도착했다**."},
  {id:494,vn:154,verb:"get",pn:2,pattern:"get+ 형용사",meaning:"~한 상태가 되다",example:"When it gets dark at night, they know that the day is over.",trans:"밤에 어두워지면, 그들은 하루가 **끝났음을** **안다**."},
  {id:495,vn:154,verb:"get",pn:3,pattern:"get+ 명사",meaning:"얻다, 이해하다",example:"I will get it.",trans:"내가 **가져오겠다**."},
  {id:496,vn:154,verb:"get",pn:4,pattern:"get+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 얻어주다, 구해다 주다",example:"Get me a glass of water.",trans:"물 한 잔 **가져다주세요**."},
  {id:497,vn:154,verb:"get",pn:5,pattern:"get+ 명사+ 형용사(O.C)",meaning:"‘명사’를 ~한 상태로 만들다",example:"I got my feet wet.",trans:"나는 발이 **젖었다**."},
  {id:498,vn:154,verb:"get",pn:6,pattern:"get+ to VR",meaning:"~하게 되다",example:"I got to realize his power.",trans:"나는 그의 힘을 **깨닫게 되었다**."},
  {id:499,vn:154,verb:"get",pn:7,pattern:"get+ 명사+ to VR",meaning:"‘명사’를 ~하도록 시키다",example:"I can’t get this door to shut properly.",trans:"나는 이 문이 제대로 **닫히게 할 수가 없다**."},
  {id:500,vn:154,verb:"get",pn:8,pattern:"get+ 명사+ pp",meaning:"‘명사’가 ~되도록 시키다, 되는 일을 겪다",example:"I got my arm broken.",trans:"나는 팔이 **부러졌다**."},
  {id:501,vn:154,verb:"get",pn:9,pattern:"get pp",meaning:"’동작’을 강조하는 수동형에서",example:"I don’t want to get killed.",trans:"나는 **죽임을 당하고** 싶지 않다."},
  {id:502,vn:154,verb:"get",pn:10,pattern:"have got to VR",meaning:"~해야 한다",example:"You’ve got to eat more vegetable.",trans:"당신은 채소를 더 많이 **먹어야 한다**."},
  {id:503,vn:155,verb:"give",pn:1,pattern:"give+ 명사",meaning:"주다",example:"He gave money to the poor.",trans:"그는 가난한 사람들에게 돈을 **주었다**."},
  {id:504,vn:156,verb:"go",pn:1,pattern:"go",meaning:"가다, 진행되다, 사라지다",example:"I am ready to go.",trans:"나는 **갈** 준비가 되어 있다."},
  {id:505,vn:156,verb:"go",pn:2,pattern:"go + 형용사",meaning:"~한 상태가 되다",example:"All the eggs went bad.",trans:"달걀이 모두 **상했다**."},
  {id:506,vn:156,verb:"go",pn:3,pattern:"go+ V-ing",meaning:"~하러 가다",example:"go fishing, go shopping, go mountain climbing, go surfing, go golfing…",trans:"낚시하러 **가다**, 쇼핑하러 **가다**, 등산하러 **가다**, 서핑하러 **가다**, 골프 치러 **가다**…"},
  {id:507,vn:156,verb:"go",pn:4,pattern:"go wrong",meaning:"나쁜 상태가 되다",example:"Everything went wrong.",trans:"모든 일이 **잘못되었다**."},
  {id:508,vn:157,verb:"grant",pn:1,pattern:"grant+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’(부탁 등)을 들어주다(승인해주다)",example:"France has agreed to grant him political asylum.",trans:"프랑스는 그에게 정치적 망명을 **허가하기로** 합의했다."},
  {id:509,vn:157,verb:"grant",pn:2,pattern:"take+ 명사+ for granted",meaning:"~를 당연한 것으로 여기다",example:"He took it for granted that the invitation included his wife.",trans:"그는 초대장에 아내도 포함되어 있는 것을 당연하게 **여겼다**."},
  {id:510,vn:158,verb:"grow",pn:1,pattern:"grow",meaning:"자라다, 성장하다",example:"Bananas grow in tropical areas.",trans:"바나나는 열대 지역에서 **자란다**."},
  {id:511,vn:158,verb:"grow",pn:2,pattern:"grew+ 형용사",meaning:"~한 상태가 되다",example:"It began to grow dark.",trans:"날이 **어두워지기** 시작했다."},
  {id:512,vn:158,verb:"grow",pn:3,pattern:"grow+ 명사",meaning:"기르다, 재배하다",example:"We grew vegetables in the garden.",trans:"우리는 정원에서 채소를 **길렀다**."},
  {id:513,vn:158,verb:"grow",pn:4,pattern:"grow+ to VR",meaning:"점차로 ~하게 되다",example:"I have grown to think that he was right.",trans:"나는 그가 옳았다고 **생각하게 되었다**."},
  {id:514,vn:159,verb:"guarantee",pn:1,pattern:"guarantee+ I.O+ D.O/ 명사+to VR/ to VR/ that S+V",meaning:"~을 보증하다, 보장하다",example:"He guaranteed us possession of the house by June.",trans:"그는 6월까지 우리에게 그 집의 소유권을 **보장했다**."},
  {id:515,vn:160,verb:"guess",pn:1,pattern:"guess+ 명사/ 명사+ to VR/ 명사절/ 명사+ to be 보어",meaning:"~을 추측하다, 짐작하다",example:"I cannot guess what to do next.",trans:"나는 다음에 무엇을 해야 할지 **짐작할** 수 없다."},
  {id:516,vn:160,verb:"guess",pn:2,pattern:"guess what",meaning:"있잖아, 그거 알아? (상대의 주위를 환기시키거나 추측을 요구할 때)",example:"Guess what?",trans:"있잖아, **그거 알아**?"},
  {id:517,vn:161,verb:"gain",pn:1,pattern:"gain",meaning:"이익을 얻다, 벌다, 진보하다, 나아가다, 향상되다",example:"The sick child is gaining in health daily.",trans:"그 아픈 아이는 매일 건강을 **회복하고 있다**."},
  {id:518,vn:161,verb:"gain",pn:2,pattern:"gain+ 명사",meaning:"얻다, 벌다, 획득하다, 늘다",example:"This is how I gain my living.",trans:"이것이 내가 생계를 **꾸려가는** 방식이다."},
  {id:519,vn:162,verb:"grasp",pn:1,pattern:"grasp+ 명사",meaning:"잡다, 납득하다",example:"Grasp all, lose all.",trans:"다 **잡으려다** 다 **잃는다**."},
  {id:520,vn:162,verb:"grasp",pn:2,pattern:"grasp",meaning:"달려들다",example:"He tried to grasp for any support.",trans:"그는 어떤 지지라도 **잡으려고** 했다."},
  {id:521,vn:163,verb:"hand",pn:1,pattern:"hand+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 건네주다",example:"He handed me a little rectangle of white paper.",trans:"그는 나에게 작은 직사각형의 흰 종이를 **건네주었다**."},
  {id:522,vn:163,verb:"hand",pn:2,pattern:"hand in",meaning:"제출하다",example:"I’m supposed to have handed in a first draft of my dissertation.",trans:"나는 논문의 초고를 **제출했어야** 했다."},
  {id:523,vn:163,verb:"hand",pn:3,pattern:"hand out+ 명사",meaning:"나누어주다",example:"Teacher handed out the test paper.",trans:"선생님이 시험지를 **나눠주었다**."},
  {id:524,vn:163,verb:"hand",pn:4,pattern:"hand over+ 명사",meaning:"넘겨주다",example:"He handed over his right for the children to his wife.",trans:"그는 아이들에 대한 권리를 아내에게 **넘겨주었다**."},
  {id:525,vn:163,verb:"hand",pn:5,pattern:"hand down+ 명사",meaning:"물려주다",example:"This tradition has been handed down from far ancestors.",trans:"이 전통은 먼 조상으로부터 **전해 내려왔다**."},
  {id:526,vn:164,verb:"have",pn:1,pattern:"have+ 명사",meaning:"먹다, 가지다, (시간을) 보내다",example:"She has a nephew in the navy.",trans:"그녀는 해군에 복무 중인 조카가 **있다**."},
  {id:527,vn:164,verb:"have",pn:2,pattern:"have to VR",meaning:"~해야 한다",example:"You have to be with them.",trans:"당신은 그들과 함께 **있어야 한다**."},
  {id:528,vn:164,verb:"have",pn:3,pattern:"have+ 명사+ VR",meaning:"‘명사’가 ~하도록 시키다",example:"I won’t have someone else tell me to do this or that.",trans:"나는 다른 사람이 이래라저래라 하는 것을 **참지 않겠다**."},
  {id:529,vn:164,verb:"have",pn:4,pattern:"have+ 명사+ pp",meaning:"‘명사’가 ~하게 되다, 당하다",example:"I had my composition corrected by teacher.",trans:"나는 선생님께 작문을 **고쳐 받았다**."},
  {id:530,vn:164,verb:"have",pn:5,pattern:"had+ better/ sooner/ rather+ 동사 have pp",meaning:"~하는 편이 낫다, 나았었다",example:"You had better listen to my advice.",trans:"내 충고를 **듣는 것이** 좋을 것이다."},
  {id:531,vn:165,verb:"hear",pn:1,pattern:"hear+ 명사",meaning:"듣다, 들리다",example:"Hear a loud voice.",trans:"큰 소리가 **들린다**."},
  {id:532,vn:165,verb:"hear",pn:2,pattern:"hear of",meaning:"~을 듣다",example:"I rejoiced to hear of your success.",trans:"나는 당신의 성공 소식을 **듣고** 기뻤다."},
  {id:533,vn:165,verb:"hear",pn:3,pattern:"hear about",meaning:"~에 대해 듣다",example:"We shall hear about it tomorrow.",trans:"우리는 내일 그것에 대해 **들을 것이다**."},
  {id:534,vn:165,verb:"hear",pn:4,pattern:"hear+ 명사+ VR/ V-ing",meaning:"‘명사’가 ~하는 것을 닫다",example:"We heard someone telling for help.",trans:"우리는 누군가 도움을 **요청하는 것을 들었다**."},
  {id:535,vn:165,verb:"hear",pn:5,pattern:"hear+ 명사+ pp",meaning:"‘명사’가 ~되는 것을 듣다",example:"Did you hear your name called?",trans:"당신은 자신의 이름이 **불리는** 것을 **들었습니까**?"},
  {id:536,vn:165,verb:"hear",pn:6,pattern:"hear+ that S+ V",meaning:"~라고 듣다",example:"We’ve heard you accepted a job offer at Beautiful Mind Books.",trans:"우리는 당신이 Beautiful Mind Books에서 일자리 제안을 **수락했다고** **들었습니다**."},
  {id:537,vn:166,verb:"help",pn:1,pattern:"help+ 명사",meaning:"돕다",example:"Heaven helps those who help themselves.",trans:"하늘은 스스로 **돕는** 자를 **돕는다**."},
  {id:538,vn:166,verb:"help",pn:2,pattern:"help A with B",meaning:"A의 B를 돕다",example:"She gets her tame husband to help her with domestic chores.",trans:"그녀는 순종적인 남편을 시켜 집안일을 **돕게** **한다**."},
  {id:539,vn:166,verb:"help",pn:3,pattern:"help+ (to)VR",meaning:"~하는 것을 돕다",example:"These toys will help to keep the baby amused.",trans:"이 장난감들은 아기가 즐겁게 **지내도록** **도와줄** 것이다."},
  {id:540,vn:166,verb:"help",pn:4,pattern:"help+ V-ing",meaning:"~하는 것을 꺼리다, 피하다",example:"I could not help laughing.",trans:"나는 웃지 않을 수 **없었다**."},
  {id:541,vn:166,verb:"help",pn:5,pattern:"help+ it",meaning:"꺼리다, 피하다",example:"I cannot help it.",trans:"나는 어쩔 수 **없다**."},
  {id:542,vn:166,verb:"help",pn:6,pattern:"help+ 명사+ (to)VR",meaning:"‘명사’가 ~하는 것을 돕다",example:"I helped him (to) find his things.",trans:"나는 그가 물건을 **찾도록** **도와주었다**."},
  {id:543,vn:167,verb:"hold",pn:1,pattern:"hold+ 명사",meaning:"잡다, 가지다, 지지하다, 개최하다",example:"I’ll hold the boat steady while you climb in.",trans:"당신이 **타는** 동안 내가 배를 안정적으로 **잡고** **있을게요**."},
  {id:544,vn:167,verb:"hold",pn:2,pattern:"hold on to+ 명사",meaning:"고수하다, 집착하다",example:"Remember that life is precious and you need to live in the present as well as hold on to your dreams for the future.",trans:"삶이 소중하다는 것을 **기억하세요**. 현재를 **살아가면서** 미래의 꿈도 **붙잡아야** 합니다."},
  {id:545,vn:167,verb:"hold",pn:3,pattern:"hold+ 명사+ 형용사",meaning:"‘명사’가 ~한 상태라고 여기다, 간주하다",example:"He holds his reputation dear.",trans:"그는 자신의 명성을 소중히 **여긴다**."},
  {id:546,vn:167,verb:"hold",pn:4,pattern:"hold+ that S+ V",meaning:"~을 주장하다",example:"She still holds that the government’s policy is mistaken.",trans:"그녀는 여전히 정부의 정책이 잘못되었다고 **주장한다**."},
  {id:547,vn:167,verb:"hold",pn:5,pattern:"hold",meaning:"계속되다, 지속되다",example:"I hope that the weather will hold.",trans:"나는 날씨가 **계속되기를** **바란다**."},
  {id:548,vn:167,verb:"hold",pn:6,pattern:"hold+ 형용사",meaning:"효력이 있다",example:"The contract still holds good.",trans:"그 계약은 여전히 **유효하다**."},
  {id:549,vn:168,verb:"hope",pn:1,pattern:"hope+ to VR",meaning:"바라다, 희망하다",example:"I hope to announce the winner shortly.",trans:"나는 곧 수상자를 **발표하기를** **바랍니다**."},
  {id:550,vn:168,verb:"hope",pn:2,pattern:"hope+ that S+ V",meaning:"~하는 것을 바라다, 희망하다",example:"Officials hoped that import controls might cure the economy’s serious inflation.",trans:"관리들은 수입 규제가 경제의 심각한 인플레이션을 **치유할 수** **있기를** **바랐다**."},
  {id:551,vn:168,verb:"hope",pn:3,pattern:"hope for",meaning:"기대하다, 바라다",example:"I am hoping for a good crop this year.",trans:"나는 올해 풍작을 **기대하고** **있다**."},
  {id:552,vn:169,verb:"hang",pn:1,pattern:"hang+ 명사",meaning:"걸다, 교수형에 처하다",example:"Hang your cap on the hook.",trans:"모자를 고리에 **거세요**."},
  {id:553,vn:169,verb:"hang",pn:2,pattern:"hang",meaning:"걸리다, 매달려있다, 늘어지다",example:"There were curtains hanging over the windows.",trans:"창문 위로 커튼이 **드리워져** **있었다**."},
  {id:554,vn:170,verb:"happen",pn:1,pattern:"happen",meaning:"생기다, 발생하다, 일어나다",example:"Something is likely to happen.",trans:"무슨 일이 **일어날** 것 같다."},
  {id:555,vn:170,verb:"happen",pn:2,pattern:"happen to VR",meaning:"우연히 ~하다",example:"I happened to sit beside her.",trans:"나는 우연히 그녀 옆에 **앉게** **되었다**."},
  {id:556,vn:170,verb:"happen",pn:3,pattern:"it happen that S+ V",meaning:"우연히 ~하다",example:"It happened that we were in London.",trans:"우리가 런던에 **있었던** 것은 우연이었다."},
  {id:557,vn:170,verb:"happen",pn:4,pattern:"happen on+ 명사",meaning:"우연히 만나다",example:"I happened on the very thing I wanted.",trans:"나는 원하던 바로 그것을 우연히 **발견했다**."},
  {id:558,vn:170,verb:"happen",pn:5,pattern:"as it happens",meaning:"공교롭게도",example:"I have left the book at home, as it happens.",trans:"공교롭게도 나는 책을 집에 **두고** **왔다**."},
  {id:559,vn:171,verb:"hinder",pn:1,pattern:"hinder+ 명사",meaning:"방해하다",example:"The mud hindered the advance of the troops.",trans:"진흙이 군대의 진격을 **방해했다**."},
  {id:560,vn:171,verb:"hinder",pn:2,pattern:"hinder+ 명사+ from+ V-ing",meaning:"~하는 것을 방해하다",example:"A man can never be hindered from thinking whatever he chooses but can be hindered from expressing it if it is not true or proper enough to make others suffer.",trans:"어떤 사람도 자신이 원하는 것은 무엇이든 생각하는 데 있어서는 결코 **방해받을 수 없지만**, 그것이 충분히 사실이 아니거나 적절하지 않아 타인에게 고통을 줄 경우에는 그것을 표현하는 데 있어서는 **방해받을 수 있다**."},
  {id:561,vn:172,verb:"hint",pn:1,pattern:"hint+ 명사",meaning:"~을 넌지시 알리다",example:"Gray skies hinted to us an early winter.",trans:"흐린 하늘은 우리에게 이른 겨울을 **암시했다**."},
  {id:562,vn:172,verb:"hint",pn:2,pattern:"hint + that S+ V",meaning:"사실을 암시하다",example:"She hinted that she wanted to go to bed.",trans:"그녀는 자고 싶다고 **넌지시 말했다**."},
  {id:563,vn:173,verb:"hit",pn:1,pattern:"hit+ 명사",meaning:"치다, 쳐서 맞히다, 우연히 발견하다, 적합하다, 타격을 가하다",example:"He hit a ball with a wooden bat.",trans:"그는 나무 방망이로 공을 **쳤다**."},
  {id:564,vn:173,verb:"hit",pn:2,pattern:"hit+ upon",meaning:"우연히 생각나다",example:"",trans:"그는 서둘러 **달려갔다**."},
  {id:565,vn:174,verb:"hurry",pn:1,pattern:"hurry",meaning:"서두르다",example:"He hurried home.",trans:"그는 집으로 **서둘러 갔다**."},
  {id:566,vn:175,verb:"hurt",pn:1,pattern:"hurt",meaning:"아프다",example:"It hurts.",trans:"**아프다**."},
  {id:567,vn:175,verb:"hurt",pn:2,pattern:"hurt+ 명사",meaning:"아프게 하다",example:"It hurts me to cough.",trans:"기침을 하면 **아프다**."},
  {id:568,vn:176,verb:"identify",pn:1,pattern:"identify+ 명사/ A as B",meaning:"확인하다, 신원을 밝히다",example:"She identified the fountain pen as hers.",trans:"그녀는 그 만년필이 자신의 것이라고 **확인했다**."},
  {id:569,vn:176,verb:"identify",pn:2,pattern:"identify+ 명사+ with 명사",meaning:"~와 동일시하다",example:"They identified Jones with the progress of the company.",trans:"그들은 존스를 회사의 발전과 **동일시했다**."},
  {id:570,vn:177,verb:"imagine",pn:1,pattern:"imagine + 명사",meaning:"상상하다",example:"Imagine a house with a big garden.",trans:"넓은 정원이 있는 집을 **상상해 보세요**."},
  {id:571,vn:177,verb:"imagine",pn:2,pattern:"imagine+ that S+ V",meaning:"~라고 상상하다, ~라고 생각하다",example:"At first sight I could easily imagine that the girl would become a good actress",trans:"첫눈에 나는 그 소녀가 훌륭한 배우가 될 것이라고 쉽게 **상상할 수 있었다**."},
  {id:572,vn:177,verb:"imagine",pn:3,pattern:"imagine+ V-ing",meaning:"~하는 것을 상상하다",example:"I can’t imagine living anywhere else.",trans:"나는 다른 곳에서 사는 것을 **상상할 수 없다**."},
  {id:573,vn:178,verb:"inform",pn:1,pattern:"inform A of B",meaning:"A에게 B를 알리다",example:"Why didn’t you inform me of her death?",trans:"왜 그녀의 죽음을 나에게 **알리지 않았습니까**?"},
  {id:574,vn:178,verb:"inform",pn:2,pattern:"inform+ 명사+ that",meaning:"~에게 ~한 사실을 알리다",example:"I informed him that she had been successful.",trans:"나는 그에게 그녀가 성공했다고 **알렸다**."},
  {id:575,vn:179,verb:"insist",pn:1,pattern:"insist+ on 명(-ing)",meaning:"주장하다, 고집하다, 강요하다",example:"He insisted on doing business over lunch.",trans:"그는 점심을 먹으면서 사업을 **하겠다고 고집했다**."},
  {id:576,vn:179,verb:"insist",pn:2,pattern:"insist+ that S+ V",meaning:"우기다, 주장하다",example:"He insisted that his brother is innocent.",trans:"그는 자신의 형이 무죄라고 **주장했다**."},
  {id:577,vn:179,verb:"insist",pn:3,pattern:"insist+ that S+ should VR",meaning:"~해야 한다고 주장하다",example:"He insisted that the murdered be hanged.",trans:"그는 살인범을 교수형에 처해야 한다고 **주장했다**."},
  {id:578,vn:180,verb:"intend",pn:1,pattern:"intend to VR",meaning:"~할 것을 의도하다",example:"I did not intend to insult you at all.",trans:"나는 당신을 전혀 모욕할 **생각이 없었다**."},
  {id:579,vn:180,verb:"intend",pn:2,pattern:"intend that S+V",meaning:"의도하다",example:"We intend that it shall be done today.",trans:"우리는 그것을 오늘 완료할 **작정이다**."},
  {id:580,vn:180,verb:"intend",pn:3,pattern:"intend+ 명사+ to VR",meaning:"‘명사’에게 ~하게 할 작정이다",example:"I intend him to go.",trans:"나는 그가 가기를 **바란다**."},
  {id:581,vn:181,verb:"infer",pn:1,pattern:"infer+ 명사",meaning:"추론하다",example:"He inferred the fact from the evidence.",trans:"그는 증거로부터 그 사실을 **추론했다**."},
  {id:582,vn:181,verb:"infer",pn:2,pattern:"infer+ that S+ V",meaning:"사실을 추론하다",example:"The professor inferred that so able a student would make a good scholar.",trans:"그 교수는 그토록 유능한 학생이라면 훌륭한 학자가 될 것이라고 **추론했다**."},
  {id:583,vn:182,verb:"inquire",pn:1,pattern:"inquire+ 명사",meaning:"묻다",example:"He inquired of the policeman the best route to the station.",trans:"그는 경찰관에게 역까지 가는 가장 좋은 길을 **물었다**."},
  {id:584,vn:182,verb:"inquire",pn:2,pattern:"inquire+ 명사절",meaning:"묻다",example:"I will inquire how I can find it.",trans:"나는 그것을 어떻게 찾을 수 있는지 **알아볼 것이다**."},
  {id:585,vn:182,verb:"inquire",pn:3,pattern:"inquire after",meaning:"안부를 묻다",example:"She inquired after your health.",trans:"그녀는 당신의 건강에 대해 **안부를 물었다**."},
  {id:586,vn:183,verb:"involve",pn:1,pattern:"involve+ 명사/ V-ing",meaning:"포함하다, 수반하다, 연관시키다",example:"This question involves embarrassing explanations.",trans:"이 질문은 당혹스러운 설명을 **수반한다**."},
  {id:587,vn:183,verb:"involve",pn:2,pattern:"involve+ A+ in + B",meaning:"A를 B에 연루시키다",example:"The mistake involved me in a great deal of trouble.",trans:"그 실수로 인해 나는 큰 곤경에 **휘말렸다**."},
  {id:588,vn:184,verb:"invite",pn:1,pattern:"invite+ 명사",meaning:"초대하다, 청하다, 초래하다",example:"They invited me to the wedding.",trans:"그들은 나를 결혼식에 **초대했다**."},
  {id:589,vn:184,verb:"invite",pn:2,pattern:"invite+ 명사+ to VR",meaning:"‘명사’를 ~하도록 권유하다",example:"The audience were invited to express their opinions.",trans:"청중은 자신들의 의견을 **표현하도록 초대받았다**."},
  {id:590,vn:185,verb:"keep",pn:1,pattern:"keep+ 명사",meaning:"지속하다, 보유하다, 보존하다, 지키다",example:"You may keep the change.",trans:"잔돈은 **가지셔도** 됩니다."},
  {id:591,vn:185,verb:"keep",pn:2,pattern:"keep+ 명사",meaning:"사육하다, 부양하다, 손질하여 돌보다, 일기나 장부를 적다",example:"This garden is well kept.",trans:"이 정원은 잘 **관리되어 있다**."},
  {id:592,vn:185,verb:"keep",pn:3,pattern:"keep+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 따로 떼어 놓다",example:"Will you keep me a good cut of beef?",trans:"좋은 쇠고기 부위로 **남겨** 주시겠어요?"},
  {id:593,vn:185,verb:"keep",pn:4,pattern:"keep+ 명사+ 명사, 형용사(O.C)",meaning:"~를 ~로, ~하게 유지하다",example:"Let’s keep it a secret.",trans:"그것을 비밀로 **해** 둡시다."},
  {id:594,vn:185,verb:"keep",pn:5,pattern:"keep+ 명사+ from+ V-ing",meaning:"‘명사’가 ~하는 것을 막다",example:"She couldn’t keep herself from weeping.",trans:"그녀는 울음을 **참을** 수가 없었다."},
  {id:595,vn:185,verb:"keep",pn:6,pattern:"keep+ 형용사",meaning:"~한 상태를 유지하다",example:"He kept awake.",trans:"그는 잠을 **이루지 못했다**."},
  {id:596,vn:185,verb:"keep",pn:7,pattern:"keep+ V-ing",meaning:"동작을 계속하다",example:"The child kept crying.",trans:"그 아이는 계속 **울었다**."},
  {id:597,vn:185,verb:"keep",pn:8,pattern:"자동사 keep",meaning:"오래가다, 유지하다",example:"I will keep in touch with you.",trans:"당신과 계속 **연락하겠습니다**."},
  {id:598,vn:186,verb:"know",pn:1,pattern:"know+ 명사",meaning:"알다, 알고 있다, 체험하다",example:"He knows the real truth of the matter.",trans:"그는 그 문제의 진실을 **알고 있다**."},
  {id:599,vn:186,verb:"know",pn:2,pattern:"know A from B",meaning:"식별하다",example:"We want our children to know good from bad, right from wrong.",trans:"우리는 자녀들이 선악과 옳고 그름을 **구별할 줄 알기를** 바란다."},
  {id:600,vn:186,verb:"know",pn:3,pattern:"know+ that S+ V/ wh-S+ V/ wh- to VR",meaning:"know+ that S+ V/ wh-S+ V/ wh- to VR",example:"I know that she was once a singer.",trans:"나는 그녀가 한때 가수였다는 것을 **알고 있다**."},
  {id:601,vn:186,verb:"know",pn:4,pattern:"be known to VR",meaning:"~하는 것으로 알려 진다.",example:"Even dogs and other animals are known to suffer from motion sickness dufing long trips in cars.",trans:"개나 다른 동물들도 자동차로 장거리 이동 시 멀미로 **고통받는 것으로 알려져 있다**."},
  {id:602,vn:186,verb:"know",pn:5,pattern:"know for sure",meaning:"확실히 알다",example:"I know it for sure.",trans:"나는 그것을 확실히 **알고 있다**."},
  {id:603,vn:186,verb:"know",pn:6,pattern:"know better than to VR",meaning:"~할 정도로 어리석지 않다",example:"I should have known better than to say so.",trans:"그런 말을 하지 않을 만큼 **분별력이 있었어야** 했는데."},
  {id:604,vn:186,verb:"know",pn:7,pattern:"make+목적어+ known",meaning:"알리다, 발표하다",example:"She made her intention known",trans:"그녀는 자신의 의도를 **알렸다**."},
  {id:605,vn:186,verb:"know",pn:8,pattern:"not that I know of",meaning:"내가 아는 바로는 그렇지 않다",example:"Hs he been ill or something?",trans:"그가 아프거나 뭐 그런 건가요?"},
  {id:606,vn:186,verb:"know",pn:9,pattern:"who knows",meaning:"누가 알겠는가?",example:"I hope it will clear up tomorrow.",trans:"내일은 날이 **개었으면** 합니다."},
  {id:607,vn:186,verb:"know",pn:10,pattern:"God knows",meaning:"맹세코, 아무도 모른다",example:"God knows that it is true.",trans:"신도 그것이 사실임을 **아신다**."},
  {id:608,vn:186,verb:"know",pn:11,pattern:"know of, know about",meaning:"대하여 알고 있다",example:"I know of him but I do not know him.",trans:"나는 그에 대해 **들어서 알지만** 직접 **알지는** 못한다."},
  {id:609,vn:186,verb:"know",pn:12,pattern:"you know",meaning:"아시다시피",example:"He is angry you know.",trans:"그는 화가 났잖아요, **아시죠**."},
  {id:610,vn:187,verb:"kill",pn:1,pattern:"kill+ 명사",meaning:"죽이다, 시들게 하다, 기세를 꺾다, 시간을 소비하다, 뇌새시키다",example:"He killed himself.",trans:"그는 스스로 목숨을 **끊었다**."},
  {id:611,vn:187,verb:"kill",pn:2,pattern:"kill",meaning:"살생하다, 죽었을 때 고기를 생산하다",example:"Pigs do not kill well at the age.",trans:"돼지는 그 나이에 **도살이** 잘 **되지 않는다**."},
  {id:612,vn:188,verb:"kindle",pn:1,pattern:"kindle+ 명사",meaning:"불 붙이다",example:"He kindled a twig with a match.",trans:"그는 성냥으로 나뭇가지에 **불을 붙였다**."},
  {id:613,vn:188,verb:"kindle",pn:2,pattern:"kindle",meaning:"불 붙다, 타오르다",example:"The damp wood will never kindle.",trans:"축축한 나무는 절대 **불이 붙지 않을 것이다**."},
  {id:614,vn:189,verb:"knock",pn:1,pattern:"knock+ 명사",meaning:"치다, 두드리다, 부딪히다",example:"She knocked the door.",trans:"그녀는 문을 **두드렸다**."},
  {id:615,vn:189,verb:"knock",pn:2,pattern:"knock+ on, at+ 명사",meaning:"두드리다, 부딪히다",example:"Someone was knocking on the door.",trans:"누군가 문을 **두드리고 있었다**."},
  {id:616,vn:190,verb:"lay",pn:1,pattern:"lay+ 명사",meaning:"눕히다, 내려놓다, 설치하다, 준비하다, 알 낳다, 쓰러뜨리다",example:"She laid her hand on his.",trans:"그녀는 그의 손 위에 자신의 손을 **얹었다**."},
  {id:617,vn:191,verb:"laugh",pn:1,pattern:"laugh",meaning:"소리 내어 웃다",example:"He laughs best who laughs fast.",trans:"마지막에 **웃는** 자가 가장 잘 **웃는** 자다."},
  {id:618,vn:191,verb:"laugh",pn:2,pattern:"laugh at",meaning:"~을 보고 큰 소리로 웃다, 비웃다",example:"He laughed at my yellow tie.",trans:"그는 내 노란 넥타이를 보고 **비웃었다**."},
  {id:619,vn:192,verb:"land",pn:1,pattern:"land+ 명사",meaning:"상륙시키다, 착륙시키다, 하차시키다",example:"The pilot landed his airplane in a field.",trans:"조종사는 들판에 비행기를 **착륙시켰다**."},
  {id:620,vn:192,verb:"land",pn:2,pattern:"land",meaning:"상륙하다",example:"The U.N. troops landed in Egypt.",trans:"유엔군이 이집트에 **상륙했다**."},
  {id:621,vn:193,verb:"lie",pn:1,pattern:"lie",meaning:"거짓말하다",example:"I didn’t lie to him.",trans:"나는 그에게 **거짓말하지 않았다**."},
  {id:622,vn:193,verb:"lie",pn:2,pattern:"lie",meaning:"눕다, 놓여있다, 존재하다",example:"The cat was lying by the fire.",trans:"고양이가 난롯가에 **누워 있었다**."},
  {id:623,vn:193,verb:"lie",pn:3,pattern:"lie+ 보어",meaning:"상태에 놓여있다",example:"The book lay open on his desk.",trans:"책이 그의 책상 위에 펼쳐진 채 **놓여 있었다**."},
  {id:624,vn:194,verb:"learn",pn:1,pattern:"learn+ 명사",meaning:"배우다",example:"Lots of Koreans learn English.",trans:"많은 한국인들이 영어를 **배운다**."},
  {id:625,vn:194,verb:"learn",pn:2,pattern:"learn to VR, learn how to VR",meaning:"~하는 것을 배우다",example:"You must learn to be more patient.",trans:"너는 좀 더 인내심을 갖도록 **배워야 한다**."},
  {id:626,vn:194,verb:"learn",pn:3,pattern:"learn+ that S+V",meaning:"알게 되다",example:"I learned that he had been sick.",trans:"나는 그가 아팠었다는 것을 **알게 되었다**."},
  {id:627,vn:194,verb:"learn",pn:4,pattern:"learn+ wh-S+ V",meaning:"알게 되다",example:"I learned what it meant to be poor.",trans:"나는 가난하다는 것이 무엇을 의미하는지 **배웠다**."},
  {id:628,vn:194,verb:"learn",pn:5,pattern:"learn of, about",meaning:"~에 대해서 듣고 알다",example:"I learned of her marriage from her mother.",trans:"나는 그녀의 어머니로부터 그녀의 결혼 소식을 **알게 되었다**."},
  {id:629,vn:195,verb:"leave",pn:1,pattern:"leave+ 명사",meaning:"떠나다, 남기다",example:"The boy had to leave school to help support the family.",trans:"그 소년은 가족의 생계를 돕기 위해 학교를 **떠나야 했다**."},
  {id:630,vn:195,verb:"leave",pn:2,pattern:"leave+명사(I.O)+ 명사(D.O)",meaning:"’I.O’에게 ‘D.O’를 남기다, 맡기다",example:"He left her everything.",trans:"그는 그녀에게 모든 것을 **남겼다**."},
  {id:631,vn:195,verb:"leave",pn:3,pattern:"leave for",meaning:"~로 향해 떠나다",example:"I’m leaving for Europe tomorrow.",trans:"나는 내일 유럽으로 **떠난다**."},
  {id:632,vn:195,verb:"leave",pn:4,pattern:"leave+ 명사+ 형용사",meaning:"명사를 ~한 상태로 내버려두다",example:"He has left no stone unturned.",trans:"그는 모든 방법을 다 **동원했다**."},
  {id:633,vn:195,verb:"leave",pn:5,pattern:"leave off",meaning:"하던 일을 그만두다",example:"Do you remember where we left off?",trans:"우리가 어디까지 **했는지** 기억하세요?"},
  {id:634,vn:195,verb:"leave",pn:6,pattern:"leave out",meaning:"제외하다, 생략하다",example:"See that no one is left out at the party?",trans:"파티에서 아무도 **소외되지 않도록** 살펴봐라."},
  {id:635,vn:195,verb:"leave",pn:7,pattern:"leave behind",meaning:"뒤에 남겨놓다",example:"An umbrella was left behind.",trans:"우산이 **뒤에 남겨졌다**."},
  {id:636,vn:195,verb:"leave",pn:8,pattern:"명사 leave",meaning:"휴가, 허락",example:"He is on leave now.",trans:"그는 지금 휴가 중이다."},
  {id:637,vn:196,verb:"let",pn:1,pattern:"let+ 명사+ VR",meaning:"~에게 ~하도록 허락하다, 내버려두다, 시키다",example:"Let him come over.",trans:"그가 이쪽으로 **오게** 해라."},
  {id:638,vn:196,verb:"let",pn:2,pattern:"let+ 명사+ in, out",meaning:"들어오게, 나가게 하다",example:"Please let me in.",trans:"저를 들여보내 **주세요**."},
  {id:639,vn:196,verb:"let",pn:3,pattern:"let+ 명사+ down",meaning:"낙심시키다, 내려놓다, 늦추다",example:"Let down a person gently.",trans:"사람의 감정이 상하지 않도록 부드럽게 **거절하라**."},
  {id:640,vn:196,verb:"let",pn:4,pattern:"let up",meaning:"그치다, 잠잠해지다",example:"The train never let up all night.",trans:"그 기차는 밤새 한 번도 **멈추지** 않았다."},
  {id:641,vn:196,verb:"let",pn:5,pattern:"let go of",meaning:"~을 놓아주다",example:"He let go of my hand in the crowd.",trans:"그는 군중 속에서 내 손을 **놓았다**."},
  {id:642,vn:196,verb:"let",pn:6,pattern:"let+ 명사",meaning:"새놓다, 빠져 나오게 하다",example:"He let a sigh.",trans:"그는 한숨을 **내쉬었다**."},
  {id:643,vn:197,verb:"like",pn:1,pattern:"like+ 명사",meaning:"좋아하다",example:"I like fruit.",trans:"나는 과일을 **좋아한다**."},
  {id:644,vn:197,verb:"like",pn:2,pattern:"like+ to VR",meaning:"~하고 싶다",example:"I should like to see her.",trans:"나는 그녀를 **만나고 싶다**."},
  {id:645,vn:197,verb:"like",pn:3,pattern:"like+ V-ing",meaning:"~하는 것을 좋아하다",example:"She likes reading.",trans:"그녀는 독서를 **좋아한다**."},
  {id:646,vn:197,verb:"like",pn:4,pattern:"like+ 명사+ to VR",meaning:"‘명사’ 가 ~하기를 바라다",example:"I like boys to be lively.",trans:"나는 남자아이들이 활발하기를 **바란다**."},
  {id:647,vn:197,verb:"like",pn:5,pattern:"like+ 명사+ 형용사",meaning:"‘명사’가 ~한 상태인 것이 좋다",example:"I like my egg bolied.",trans:"나는 달걀을 삶아서 **먹는 것을 좋아한다**."},
  {id:648,vn:197,verb:"like",pn:6,pattern:"like",meaning:"마음에 들다, 하고 싶다",example:"You may do as you like.",trans:"당신이 원하는 대로 **해도** 됩니다."},
  {id:649,vn:198,verb:"long",pn:1,pattern:"long for",meaning:"~를 갈망하다",example:"She longs for something new.",trans:"그녀는 새로운 무언가를 **갈망한다**."},
  {id:650,vn:198,verb:"long",pn:2,pattern:"long to VR",meaning:"~하기를 갈망하다",example:"He longed to return home.",trans:"그는 집에 **돌아가고 싶어했다**."},
  {id:651,vn:198,verb:"long",pn:3,pattern:"long for+ 명사+ to VR",meaning:"명사가 ~하기를 갈망하다",example:"He longed for you to write him a letter.",trans:"그는 당신이 편지를 써 주기를 **바랐다**."},
  {id:652,vn:199,verb:"look",pn:1,pattern:"look",meaning:"바라보다, 쳐다보다",example:"I looked everywhere but I couldn’t find it.",trans:"나는 사방을 **찾아봤지만** 찾을 수 없었다."},
  {id:653,vn:199,verb:"look",pn:2,pattern:"look at",meaning:"~를 쳐다보다",example:"Look at my eyes.",trans:"내 눈을 **봐라**."},
  {id:654,vn:199,verb:"look",pn:3,pattern:"look on",meaning:"관찰하다, 방관하다",example:"You all play and I’ll look on.",trans:"너희는 모두 놀아라, 나는 **구경할게**."},
  {id:655,vn:199,verb:"look",pn:4,pattern:"look upon A as B",meaning:"A를 B로 간주하다",example:"I look upon him as a humbug.",trans:"나는 그를 사기꾼으로 **여긴다**."},
  {id:656,vn:199,verb:"look",pn:5,pattern:"look out",meaning:"밖을 내다보다, 조심하다",example:"I was looking out at the view.",trans:"나는 그 경치를 **내다보고 있었다**."},
  {id:657,vn:199,verb:"look",pn:6,pattern:"look around",meaning:"둘러보다",example:"I am just looking around and I’ll let you know if I need help.",trans:"그냥 **둘러보는** 중입니다, 도움이 필요하면 말씀드릴게요."},
  {id:658,vn:199,verb:"look",pn:7,pattern:"look through",meaning:"통해서 보다, 검토하다, 훑어보다",example:"You can see it if you look through the telescope.",trans:"망원경으로 **들여다보면** 볼 수 있어요."},
  {id:659,vn:199,verb:"look",pn:8,pattern:"look after",meaning:"뒤를 보아주다, 보살피다",example:"I’ll look after the baby while you are gone.",trans:"네가 없는 동안 내가 아기를 **돌볼게**."},
  {id:660,vn:199,verb:"look",pn:9,pattern:"look back",meaning:"뒤돌아 보다",example:"Since that day he has never looked back.",trans:"그날 이후로 그는 한 번도 뒤를 **돌아보지** 않았다."},
  {id:661,vn:199,verb:"look",pn:10,pattern:"look down on",meaning:"멸시하다, 낮추어 보다, 아래로 보다",example:"You may be able to look down upon the woods you have just passed through.",trans:"당신은 방금 지나온 숲을 내려다**볼** 수 있을 것이다."},
  {id:662,vn:199,verb:"look",pn:11,pattern:"look up to",meaning:"올려다 보다, 우러러보다",example:"They all looked up to him as a true leader.",trans:"그들은 모두 그를 진정한 지도자로 **우러러보았다**."},
  {id:663,vn:199,verb:"look",pn:12,pattern:"look up",meaning:"올려다 보다, 사전 등에서 찾다",example:"Look up the dictionary for the various meanings of the word.",trans:"그 단어의 다양한 의미를 사전에서 **찾아보아라**."},
  {id:664,vn:199,verb:"look",pn:13,pattern:"look toward",meaning:"향하다",example:"The window looking toward the west is the biggest one in this house.",trans:"서쪽을 **향하고 있는** 창문이 이 집에서 가장 크다."},
  {id:665,vn:199,verb:"look",pn:14,pattern:"look to",meaning:"유의하다, 의지하다",example:"Look to your tools.",trans:"당신의 도구들을 잘 **살펴라**."},
  {id:666,vn:199,verb:"look",pn:15,pattern:"look over",meaning:"훑어보다",example:"Please look over the paper before you submit it.",trans:"제출하기 전에 그 서류를 **검토해** 주세요."},
  {id:667,vn:199,verb:"look",pn:16,pattern:"look+ 형용사",meaning:"~한 상태로 보이다",example:"He looks well.",trans:"그는 **건강해 보인다**."},
  {id:668,vn:199,verb:"look",pn:17,pattern:"look like+ 명사",meaning:"~처럼 보이다",example:"Penguins look like men in tailcoats.",trans:"펭귄은 연미복을 입은 사람처럼 **보인다**."},
  {id:669,vn:199,verb:"look",pn:18,pattern:"look as if, look as though",meaning:"마치 ~인 것처럼 보이다",example:"It looks as if I’ve been overtaxed this month.",trans:"이번 달에 세금을 너무 많이 낸 것 같이 **보인다**."},
  {id:670,vn:199,verb:"look",pn:19,pattern:"look+ 명사+ 전치사+ 명사",meaning:"쳐다보아서 결과 ~하게 하다",example:"I looked him to shame.",trans:"나는 그를 노려보아 **부끄럽게 만들었다**."},
  {id:671,vn:199,verb:"look",pn:20,pattern:"명사 look",meaning:"외모, 눈초리, 안색, 용모, 한번 보기",example:"Please have a look.",trans:"한번 **봐** 주세요."},
  {id:672,vn:200,verb:"lose",pn:1,pattern:"lose+ 명사",meaning:"잃다, 잊다, 상실하다, 놓치다, 지다",example:"I have lost my key.",trans:"나는 열쇠를 **잃어버렸다**."},
  {id:673,vn:200,verb:"lose",pn:2,pattern:"lose+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 잃게 하다",example:"This lost them the victory.",trans:"이것이 그들에게서 승리를 **빼앗아 갔다**."},
  {id:674,vn:200,verb:"lose",pn:3,pattern:"be lost",meaning:"멸망, 파괴하다, 길을 잃다, 사라지다, 영향 받지 않는다, 따돌림 당하다",example:"The ship and its crew were lost at sea.",trans:"그 배와 선원들은 바다에서 **조난당했다**."},
  {id:675,vn:200,verb:"lose",pn:4,pattern:"lose+ 시간+ V-ing",meaning:"~하면서 시간을 버리다",example:"You are losing your time trying to persuade me.",trans:"나를 설득하려 해도 시간만 **낭비하는** 것이다."},
  {id:676,vn:200,verb:"lose",pn:5,pattern:"lose",meaning:"실패하다, 지다, 손해보다, 쇠퇴하다",example:"I am afraid our team will lose.",trans:"우리 팀이 **질** 것 같아 걱정된다."},
  {id:677,vn:200,verb:"lose",pn:6,pattern:"Lost and Found",meaning:"분실물 신고",example:"",trans:"기적을 **이루어냅시다**."},
  {id:678,vn:201,verb:"lead",pn:1,pattern:"lead+ 명사",meaning:"인도하다, 안내하다, 끌고 가다, 선도하다, 지휘하다",example:"He kindly led me out.",trans:"그는 친절하게도 나를 밖으로 **안내해 주었다**."},
  {id:679,vn:201,verb:"lead",pn:2,pattern:"lead+ 명사",meaning:"지내다, 보내다, 살다",example:"After his father’s death he led a poor life for many years.",trans:"아버지가 돌아가신 후 그는 오랫동안 가난한 생활을 **했다**."},
  {id:680,vn:201,verb:"lead",pn:3,pattern:"lead+ 명사+ to VR",meaning:"~에게 ~하도록 유도하다",example:"Fear led him to tell a lie.",trans:"두려움이 그로 하여금 거짓말을 **하게 만들었다**."},
  {id:681,vn:201,verb:"lead",pn:4,pattern:"lead to",meaning:"~에 이르다, ~을 초래하다",example:"All roads lead to Rome.",trans:"모든 길은 로마로 **통한다**."},
  {id:682,vn:201,verb:"lead",pn:5,pattern:"lead up to",meaning:"결국 ~로 이끌다",example:"What is she leading up to?",trans:"그녀는 무슨 말을 하려고 **이러는** 것일까?"},
  {id:683,vn:201,verb:"lead",pn:6,pattern:"명사 lead",meaning:"선도, 통 솥, 본보기/ 금속 납",example:"You should give them a lead.",trans:"당신이 그들에게 솔선수범을 **보여야** 한다."},
  {id:684,vn:202,verb:"leap",pn:1,pattern:"leap",meaning:"뛰어오르다",example:"Look before you leap.",trans:"돌다리도 두들겨 보고 **건너라**."},
  {id:685,vn:202,verb:"leap",pn:2,pattern:"leap+ 명사",meaning:"뛰어넘다, 뛰게 하다",example:"She leaped a ditch.",trans:"그녀는 도랑을 **뛰어넘었다**."},
  {id:686,vn:203,verb:"lend",pn:1,pattern:"lend+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 빌려주다",example:"Lend me your ear for a moment.",trans:"잠깐 귀를 **기울여 주세요**."},
  {id:687,vn:204,verb:"lodge",pn:1,pattern:"lodge",meaning:"묵다, 숙박하다, 몸 속에 박히다",example:"He is lodging at Mr. Wilson’s.",trans:"그는 윌슨 씨 집에 **하숙하고 있다**."},
  {id:688,vn:204,verb:"lodge",pn:2,pattern:"lodge+ 명사",meaning:"숙박시키다, 쏘아 박다",example:"Can you board and lodge me?",trans:"당신은 나를 먹여주고 **재워줄 수 있나요**?"},
  {id:689,vn:205,verb:"love",pn:1,pattern:"love+ 명사",meaning:"사랑하다, 소중히 하다, 반하다",example:"They loved each other.",trans:"그들은 서로 **사랑했다**."},
  {id:690,vn:205,verb:"love",pn:2,pattern:"love+ to VR",meaning:"~하고 싶어하다",example:"She loves to be admired by young man.",trans:"그녀는 젊은 남성에게 칭찬받는 것을 **좋아한다**."},
  {id:691,vn:205,verb:"love",pn:3,pattern:"love+ V-ing",meaning:"~하고 싶어하다",example:"I love dancing in the rain.",trans:"나는 빗속에서 춤추는 것을 **좋아한다**."},
  {id:692,vn:205,verb:"love",pn:4,pattern:"love+ 명사+ to VR",meaning:"‘명사’가 ~하면 좋다",example:"I love you to dress well.",trans:"나는 네가 옷을 잘 차려입기를 **바란다**."},
  {id:693,vn:206,verb:"maintain",pn:1,pattern:"maintain+ 명사",meaning:"유지하다, 계속하다, 주장하다, 정비하다, 부양하다",example:"I intended to maintain my friendship with him.",trans:"나는 그와의 우정을 **유지하려고** 했다."},
  {id:694,vn:206,verb:"maintain",pn:2,pattern:"maintain+ that S+ V",meaning:"주장하다",example:"He maintained that all men are not equal.",trans:"그는 모든 사람이 평등하지는 않다고 **주장했다**."},
  {id:695,vn:207,verb:"manage",pn:1,pattern:"manage+ 명사",meaning:"처리하다, 관리하다, 꾸려가다",example:"I can manage my affairs.",trans:"나는 내 일을 **처리할 수 있다**."},
  {id:696,vn:207,verb:"manage",pn:2,pattern:"manage to VR",meaning:"간신히 해내다",example:"I manage to get there in time.",trans:"나는 가까스로 제시간에 **도착한다**."},
  {id:697,vn:208,verb:"mind",pn:1,pattern:"mind+ 명사",meaning:"주의하다, 염두에 두다, 신경 쓰다",example:"Mind your step.",trans:"발밑을 **조심해라**."},
  {id:698,vn:208,verb:"mind",pn:2,pattern:"mind+ V-ing",meaning:"~하는 것을 귀찮게 여기다, 싫어하다, 꺼리다",example:"I don’t mind your smoking here.",trans:"나는 당신이 여기서 담배를 피워도 **상관없다**."},
  {id:699,vn:208,verb:"mind",pn:3,pattern:"자동사 mind",meaning:"주의하다, 꺼리다",example:"Do you mind if I open the door?",trans:"제가 문을 열어도 **괜찮으시겠어요**?"},
  {id:700,vn:209,verb:"move",pn:1,pattern:"자동사 move",meaning:"움직이다, 이동하다, 이사하다",example:"When do you move into your new place?",trans:"언제 새 집으로 **이사하나요**?"},
  {id:701,vn:209,verb:"move",pn:2,pattern:"move+ 명사",meaning:"움직이다, 감동시키다",example:"He moved his chair nearer to the fire.",trans:"그는 의자를 난로 가까이로 **옮겼다**."},
  {id:702,vn:210,verb:"make",pn:1,pattern:"make+ 명사",meaning:"만들다, 되다",example:"He made a cake for me.",trans:"그는 나를 위해 케이크를 **만들어 주었다**."},
  {id:703,vn:210,verb:"make",pn:2,pattern:"make+ 행위명사",meaning:"행위를 하다",example:"Please make a quick answer.",trans:"빨리 **답해 주세요**."},
  {id:704,vn:210,verb:"make",pn:3,pattern:"make+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 만들어주다, 되어주다",example:"Her mother made her a new dress.",trans:"그녀의 어머니는 그녀에게 새 옷을 **만들어 주었다**."},
  {id:705,vn:210,verb:"make",pn:4,pattern:"make+ 명사+ 형용사",meaning:"‘명사’를 ~한 상태로 만들다",example:"Flowers make our rooms cheerful.",trans:"꽃은 우리 방을 밝게 **만들어 준다**."},
  {id:706,vn:210,verb:"make",pn:5,pattern:"make+ 명사+ 명사(O.C)",meaning:"‘명사’를 ~로 되게 하다, 만들다",example:"He is known to have made her his valet.",trans:"그는 그녀를 자신의 시종으로 **삼은 것으로** 알려져 있다."},
  {id:707,vn:210,verb:"make",pn:6,pattern:"make+ 명사+ VR",meaning:"‘명사’를 강제로 ~하도록 만들다",example:"He was made to stay.",trans:"그는 머물도록 **강요받았다**."},
  {id:708,vn:210,verb:"make",pn:7,pattern:"make as if S+V",meaning:"~처럼 행동하다",example:"He made as if he knew everything.",trans:"그는 마치 모든 것을 아는 **척했다**."},
  {id:709,vn:210,verb:"make",pn:8,pattern:"make believe + that S+ V",meaning:"make believe + that S+ V",example:"Let’s make believe that we’re Indians.",trans:"우리가 인디언인 **척하자**."},
  {id:710,vn:210,verb:"make",pn:9,pattern:"make for",meaning:"향하다",example:"Seeing a light, I made for it.",trans:"불빛을 보고 나는 그쪽으로 **나아갔다**."},
  {id:711,vn:210,verb:"make",pn:10,pattern:"make it",meaning:"성공하다, 해내다, 약속 잡다",example:"You can make it if you try.",trans:"노력하면 **해낼 수 있다**."},
  {id:712,vn:210,verb:"make",pn:11,pattern:"make off",meaning:"도망치다, 떠나다",example:"The thief made off with the diamond.",trans:"그 도둑은 다이아몬드를 **훔쳐 달아났다**."},
  {id:713,vn:210,verb:"make",pn:12,pattern:"make out",meaning:"식별하다, 이해하다",example:"He could barely make out something like an island in the hazy distance.",trans:"그는 흐릿한 먼 곳에서 섬처럼 보이는 것을 겨우 **알아볼 수 있었다**."},
  {id:714,vn:210,verb:"make",pn:13,pattern:"make up",meaning:"복구하다, 구성하다, 조작하다, 화해하다, 화장하다",example:"We must make up the loss.",trans:"우리는 그 손실을 **보충해야 한다**."},
  {id:715,vn:211,verb:"measure",pn:1,pattern:"measure+ 명사",meaning:"~를 측정하다, 평가하다, 판단하다",example:"Do you mind if I measure you for the skirt?",trans:"치마를 맞추기 위해 치수를 **재도** 될까요?"},
  {id:716,vn:211,verb:"measure",pn:2,pattern:"measure+ 치수(보어)",meaning:"~로 치수가 나오다",example:"The rowing boat measures 20 feet.",trans:"그 조정용 보트는 길이가 20피트**이다**."},
  {id:717,vn:212,verb:"mend",pn:1,pattern:"mend+ 명사",meaning:"고치다, 개선하다",example:"How dare you try to mend my behavior?",trans:"감히 어떻게 내 행동을 **고치려 드느냐**?"},
  {id:718,vn:212,verb:"mend",pn:2,pattern:"자동사 mend",meaning:"호전되다, 개심하다",example:"It’s never too late to mend.",trans:"잘못을 **뉘우치기에** 너무 늦은 때란 없다."},
  {id:719,vn:213,verb:"mention",pn:1,pattern:"mention + 명사",meaning:"언급하다, 거명하다",example:"She feared mentioning all the names involved.",trans:"그녀는 관련된 모든 이름을 **언급하기를** 두려워했다."},
  {id:720,vn:213,verb:"mention",pn:2,pattern:"mention + that S+ V",meaning:"말하다",example:"She confessed to mentioning that she would set me up.",trans:"그녀는 나를 함정에 빠뜨리겠다고 **말했음을 고백했다**."},
  {id:721,vn:213,verb:"mention",pn:3,pattern:"not to mention",meaning:"… 은 말할 것도 없고(물론이고)",example:"He has two big houses in this country, not to mention his villa in France.",trans:"그는 프랑스의 별장은 **말할 것도 없고** 이 나라에 큰 집이 두 채나 있다."},
  {id:722,vn:214,verb:"mess",pn:1,pattern:"mess+ 명사",meaning:"망쳐놓다, 엉망으로 만들다",example:"The late arrival of the train messed up all the plans.",trans:"기차의 연착이 모든 계획을 **엉망으로 만들었다**."},
  {id:723,vn:214,verb:"mess",pn:2,pattern:"자동사 mess",meaning:"밥 먹다",example:"The privates messed together.",trans:"그 사병들은 함께 **식사했다**."},
  {id:724,vn:215,verb:"miss",pn:1,pattern:"miss+ 명사",meaning:"놓치다, 간과하다, 생략하다, 피하다, 없어서 섭섭히 여기다, 그리워하다",example:"His arrow missed the target.",trans:"그의 화살은 과녁을 **빗나갔다**."},
  {id:725,vn:215,verb:"miss",pn:2,pattern:"miss+ V-ing",meaning:"생략하다, 피하다",example:"I never miss attending on the patient.",trans:"나는 그 환자를 **빠짐없이 돌본다**."},
  {id:726,vn:216,verb:"mix",pn:1,pattern:"mix+ 명사 and 명사/ 복수명사/ 명사 with 명사",meaning:"섞다, 섞어서 만들다",example:"They mixed all kinds of fruits.",trans:"그들은 온갖 종류의 과일을 **섞었다**."},
  {id:727,vn:216,verb:"mix",pn:2,pattern:"mix+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 섞어주다",example:"He mixed me a drink.",trans:"그는 나에게 음료를 **만들어 주었다**."},
  {id:728,vn:216,verb:"mix",pn:3,pattern:"자동사 mix",meaning:"섞이다, 혼합되다",example:"Oil and water won’t mix.",trans:"기름과 물은 **섞이지 않는다**."},
  {id:729,vn:217,verb:"need",pn:1,pattern:"need+ 명사",meaning:"필요로 하다",example:"I need money.",trans:"나는 돈이 **필요하다**."},
  {id:730,vn:217,verb:"need",pn:2,pattern:"need+ to VR",meaning:"~할 필요가 있다",example:"Each of us needs to master such a foolish fear.",trans:"우리 각자는 그런 어리석은 두려움을 **극복해야 한다**."},
  {id:731,vn:217,verb:"need",pn:3,pattern:"need+ V-ing",meaning:"~할 필요가 있다 (수동 관계)",example:"My camera needs mending.",trans:"내 카메라는 수리가 **필요하다**."},
  {id:732,vn:217,verb:"need",pn:4,pattern:"명사 need",meaning:"필요성, 소용, 욕구",example:"There is no need to hurry.",trans:"서두를 **필요가 없다**."},
  {id:733,vn:218,verb:"notice",pn:1,pattern:"notice+ 명사",meaning:"알아차리다, 인지하다",example:"She did not notice me.",trans:"그녀는 나를 **알아채지 못했다**."},
  {id:734,vn:218,verb:"notice",pn:2,pattern:"notice+ that S+ V",meaning:"알아차리다",example:"When he took off his hat, I noticed that he was bald.",trans:"그가 모자를 벗었을 때, 나는 그가 대머리임을 **알아챘다**."},
  {id:735,vn:218,verb:"notice",pn:3,pattern:"notice+ V-ing",meaning:"~하고 있는 것을 알아차리다",example:"I noticed a tramp prowling around.",trans:"나는 한 부랑자가 주변을 어슬렁거리는 것을 **발견했다**."},
  {id:736,vn:218,verb:"notice",pn:4,pattern:"notice+ 명사+ VR",meaning:"‘명사’가 ~하고 있는 것을 눈여겨보다",example:"Did you notice anyone come in?",trans:"누군가 들어오는 것을 **눈치챘나요**?"},
  {id:737,vn:218,verb:"notice",pn:5,pattern:"명사 notice",meaning:"통고, 고지",example:"The whistle blew to give notice that the boat was about to leave.",trans:"배가 곧 떠난다는 것을 **알리기** 위해 호각이 **울렸다**."},
  {id:738,vn:219,verb:"name",pn:1,pattern:"name+ 명사",meaning:"이름 짓다, 거명하다",example:"He was supposed to name the new born baby.",trans:"그는 갓 태어난 아기의 이름을 **지어줄** 예정이었다."},
  {id:739,vn:219,verb:"name",pn:2,pattern:"name+ 명사+ 명사(O.C)",meaning:"‘명사’를 ~로 이름 짓다",example:"The baby was named Ronald.",trans:"그 아기는 로널드라는 이름이 **붙여졌다**."},
  {id:740,vn:219,verb:"name",pn:3,pattern:"name+ 명사+ as+ 명사",meaning:"‘명사’를 ~로서 지명하다",example:"He has been named as the probable successor.",trans:"그는 유력한 후계자로 **지명되었다**."},
  {id:741,vn:219,verb:"name",pn:4,pattern:"name A after B",meaning:"B를 따서 A를 이름 짓다",example:"England was named after the Angles.",trans:"잉글랜드는 앵글족의 이름을 **따서 명명되었다**."},
  {id:742,vn:219,verb:"name",pn:5,pattern:"명사 name",meaning:"이름, 명칭, 평판, 험담(복수)",example:"Do you have a name?",trans:"이름이 **있으신가요**?"},
  {id:743,vn:220,verb:"offer",pn:1,pattern:"offer+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 제안하다, 제공하다",example:"He offered me a cigarette.",trans:"그는 나에게 담배를 **권했다**."},
  {id:744,vn:220,verb:"offer",pn:2,pattern:"offer+ to VR",meaning:"~하겠다고 제안하다",example:"He offered to lend me the money.",trans:"그는 나에게 돈을 빌려주겠다고 **제안했다**."},
  {id:745,vn:220,verb:"offer",pn:3,pattern:"offer+ that+ S should VR",meaning:"~해야 한다고 제안하다",example:"He offered to me that we should make up with each other.",trans:"그는 우리가 서로 화해해야 한다고 나에게 **제의했다**."},
  {id:746,vn:221,verb:"order",pn:1,pattern:"order+ 명사+ to VR",meaning:"‘명사’에게 ~할 것을 명령하다",example:"The policeman ordered them to leave.",trans:"경찰관은 그들에게 떠나라고 **명령했다**."},
  {id:747,vn:221,verb:"order",pn:2,pattern:"order+ that S+ should VR",meaning:"~에게 한다고 명령하다",example:"The judge ordered that he be banished.",trans:"판사는 그를 추방하라고 **명령했다**."},
  {id:748,vn:221,verb:"order",pn:3,pattern:"order+ 명사",meaning:"주문하다",example:"I ordered some new books.",trans:"나는 새 책을 몇 권 **주문했다**."},
  {id:749,vn:221,verb:"order",pn:4,pattern:"명사 order",meaning:"명령, 주문, 질서, 순서",example:"Keep things in order.",trans:"물건을 순서대로 **정리해** 두어라."},
  {id:750,vn:222,verb:"owe",pn:1,pattern:"owe+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 빚지다, 힘입다",example:"She owes the grocer fifty dollars.",trans:"그녀는 식료품 가게 주인에게 50달러를 **빚지고 있다**."},
  {id:751,vn:223,verb:"own",pn:1,pattern:"own+ 명사",meaning:"소유하다, 인정하다",example:"They owned 200 acres of farmland.",trans:"그들은 200에이커의 농지를 **소유하고 있었다**."},
  {id:752,vn:223,verb:"own",pn:2,pattern:"own+ that S+ V",meaning:"사실을 인정하다, 자백하다",example:"I own that it was entirely my fault.",trans:"나는 그것이 전적으로 내 잘못이었음을 **인정한다**."},
  {id:753,vn:223,verb:"own",pn:3,pattern:"형용사",meaning:"소유격과 함께[자신의]",example:"It is my own car.",trans:"그것은 내 자신의 차이다."},
  {id:754,vn:224,verb:"oblige",pn:1,pattern:"oblige+ 명사+ to VR",meaning:"‘명사’에게 ~할 것을 강요하다",example:"The law obliges us to pay taxes.",trans:"법은 우리에게 세금을 **납부하도록 의무를 지운다**."},
  {id:755,vn:224,verb:"oblige",pn:2,pattern:"oblige+ 명사",meaning:"은혜를 베풀다",example:"Will you oblige me by opening the window?",trans:"창문을 **열어** 주시겠어요?"},
  {id:756,vn:225,verb:"observe",pn:1,pattern:"observe+ 명사",meaning:"관찰하다, 감시하다, 준수하다",example:"An astronomer observes stars.",trans:"천문학자는 별을 **관측한다**."},
  {id:757,vn:225,verb:"observe",pn:2,pattern:"observe+ 명사절",meaning:"관찰에 의하여 인지하다",example:"Observe how I do this.",trans:"내가 이것을 어떻게 하는지 **잘 봐라**."},
  {id:758,vn:226,verb:"obtain",pn:1,pattern:"obtain+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 얻게 해주다",example:"The experience obtained him the position.",trans:"그 경험 덕분에 그는 그 자리를 **얻었다**."},
  {id:759,vn:226,verb:"obtain",pn:2,pattern:"obtain+ 명사",meaning:"~를 얻다",example:"We can obtain sugar from beet.",trans:"우리는 사탕무에서 설탕을 **얻을** 수 있다."},
  {id:760,vn:227,verb:"occur",pn:1,pattern:"occur",meaning:"일어나다, 발생하다, 나오다, 생겨나다",example:"If something should occur, let me know.",trans:"무슨 일이 **생기면** 알려 주세요."},
  {id:761,vn:227,verb:"occur",pn:2,pattern:"It occur to+ 명사+ that S+ V",meaning:"생각나다, 마음에 떠오르다",example:"It occurred to me that he was left-handed.",trans:"그가 왼손잡이라는 것이 나에게 **떠올랐다**."},
  {id:762,vn:228,verb:"oppose",pn:1,pattern:"oppose+ 명사",meaning:"~에 반대하다, 저항하다",example:"I opposed the plan.",trans:"나는 그 계획에 **반대했다**."},
  {id:763,vn:228,verb:"oppose",pn:2,pattern:"oppose+ 명사(A)+ to 명사(B)",meaning:"A를 B에 마주보게 하다, 반대에 두다",example:"Never oppose violence to violence.",trans:"폭력에 결코 폭력으로 **맞서지 마라**."},
  {id:764,vn:229,verb:"pay",pn:1,pattern:"pay(pay off)+ 명사",meaning:"청산하다",example:"He managed to pay off his debts in two years.",trans:"그는 2년 만에 빚을 **갚아냈다**."},
  {id:765,vn:229,verb:"pay",pn:2,pattern:"pay+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 지불하다, 제공하다, 표하다",example:"I’m going to pay you a visit before long.",trans:"나는 머지않아 너를 **방문할 것이다**."},
  {id:766,vn:229,verb:"pay",pn:3,pattern:"pay+ 명사",meaning:"보상을 하다, 지불하다",example:"It wouldn’t pay me to take that job.",trans:"그 일을 맡는 것은 내게 **득이 되지 않을 것이다**."},
  {id:767,vn:229,verb:"pay",pn:4,pattern:"pay for+ 명사",meaning:"~의 대가를 지불하다",example:"Have you paid for the car?",trans:"차 값은 **치렀습니까**?"},
  {id:768,vn:229,verb:"pay",pn:5,pattern:"pay A for B",meaning:"B의 대가로 A를 지불하다, B에 대하여 A에게 갚다",example:"He paid his life for the victory.",trans:"그는 승리를 위해 목숨을 **바쳤다**."},
  {id:769,vn:229,verb:"pay",pn:6,pattern:"자동사 pay",meaning:"지불하다, 수지가 맞다, 득이 되다, 보람이 있다",example:"It would pay to tell the truth.",trans:"진실을 말하는 것이 **이득이 될 것이다**."},
  {id:770,vn:230,verb:"permit",pn:1,pattern:"permit+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 허락하다",example:"He wouldn’t permit me any excuse.",trans:"그는 나의 어떤 변명도 **허락하지 않으려 했다**."},
  {id:771,vn:230,verb:"permit",pn:2,pattern:"permit+ 명사+ to VR",meaning:"에게 ~하도록 허락하다",example:"Permit me to interrupt you, but….",trans:"말씀을 **끊어서** 죄송합니다만…."},
  {id:772,vn:230,verb:"permit",pn:3,pattern:"permit+ 명사",meaning:"허용하다",example:"Smoking is not permitted in this room.",trans:"이 방에서는 흡연이 **허용되지 않습니다**."},
  {id:773,vn:230,verb:"permit",pn:4,pattern:"permit of+ 명사",meaning:"여유가 있다, 여지가 있다",example:"The situation permits of no delay.",trans:"상황이 어떠한 지체도 **허용하지 않는다**."},
  {id:774,vn:231,verb:"play",pn:1,pattern:"자동사 play",meaning:"놀다, 장난하다, 즐기다, 자유롭게 움직이다, 경기를 하다, 연주하다",example:"The old man played well on the flute.",trans:"그 노인은 플루트를 잘 **연주했다**."},
  {id:775,vn:231,verb:"play",pn:2,pattern:"play+ 명사",meaning:"위의 뜻에서 타동사",example:"They were playing poker.",trans:"그들은 포커를 **치고 있었다**."},
  {id:776,vn:232,verb:"please",pn:1,pattern:"please+ 명사",meaning:"즐겁게 하다, 만족시키다",example:"Nothing could please him.",trans:"아무것도 그를 **기쁘게 할 수** 없었다."},
  {id:777,vn:232,verb:"please",pn:2,pattern:"be pleased to VR/ at/ with/ that S+ V",meaning:"~해서, ~에 기쁘다",example:"I am pleased to hear that.",trans:"그 말을 들으니 **기쁩니다**."},
  {id:778,vn:232,verb:"please",pn:3,pattern:"자동사 please",meaning:"남의 마음에 들다, 기분이 좋다",example:"Do as you please.",trans:"하고 싶은 대로 **하세요**."},
  {id:779,vn:233,verb:"plunge",pn:1,pattern:"plunge+ 명사",meaning:"찔러 넣다, 던져 넣다",example:"Plunge both hands into the warm water.",trans:"두 손을 따뜻한 물속에 **담가라**."},
  {id:780,vn:233,verb:"plunge",pn:2,pattern:"자동사 plunge",meaning:"뛰어들다, 돌진하다",example:"The rope broke and the elevator plunged to the ground.",trans:"밧줄이 끊어지면서 엘리베이터가 바닥으로 **추락했다**."},
  {id:781,vn:234,verb:"point",pn:1,pattern:"point+ 명사",meaning:"뾰족하게 하다, 강조하다, 가리키다",example:"I pointed my camera at him.",trans:"나는 카메라를 그에게 **겨눴다**."},
  {id:782,vn:234,verb:"point",pn:2,pattern:"point out that S+ V",meaning:"사실을 지적하다",example:"He pointed out that the account must be settled at once.",trans:"그는 그 계산서를 즉시 **처리해야 한다고 지적했다**."},
  {id:783,vn:234,verb:"point",pn:3,pattern:"자동사 point",meaning:"손으로 가리키다, 향하다",example:"The big signboard pointed south.",trans:"큰 간판이 남쪽을 **가리키고 있었다**."},
  {id:784,vn:235,verb:"ponder",pn:1,pattern:"ponder+ 명사",meaning:"~를 생각하다, 숙고하다",example:"He spent the day pondering the next step.",trans:"그는 다음 단계를 **궁리하며** 하루를 **보냈다**."},
  {id:785,vn:235,verb:"ponder",pn:2,pattern:"ponder on+ 명사",meaning:"~에 대해 깊게 생각하다",example:"I pondered on what father had said.",trans:"나는 아버지가 하신 말씀을 **곰씹었다**."},
  {id:786,vn:236,verb:"pop",pn:1,pattern:"pop+ 명사",meaning:"뻥 소리 나게 하다, 불쑥 나오게 하다",example:"You’ll see how I can pop the corn.",trans:"내가 어떻게 팝콘을 **튀기는지** 보게 될 거야."},
  {id:787,vn:236,verb:"pop",pn:2,pattern:"pop+ in, out of, up",meaning:"불쑥 나오다, 펑 소리 내다",example:"The cork popped.",trans:"코르크 마개가 **펑 하고 빠졌다**."},
  {id:788,vn:237,verb:"pose",pn:1,pattern:"자동사 pose",meaning:"자세를 취하다, 가장하다",example:"She posed for her portrait.",trans:"그녀는 초상화를 위해 포즈를 **취했다**."},
  {id:789,vn:237,verb:"pose",pn:2,pattern:"pose+ 명사",meaning:"문제 등을 제시하다, 제기하다",example:"Three problems were posed.",trans:"세 가지 문제가 **제기되었다**."},
  {id:790,vn:238,verb:"possess",pn:1,pattern:"possess+ 명사",meaning:"소유하다, 홀리다",example:"He possessed much property.",trans:"그는 많은 재산을 **소유하고 있었다**."},
  {id:791,vn:238,verb:"possess",pn:2,pattern:"be possessed with",meaning:"홀리다, 악령 등에 씌이다",example:"The ancient Greeks believed that poets were possessed by a god when they wrote poetry.",trans:"고대 그리스인들은 시인들이 시를 쓸 때 신에게 **빙의된다고 믿었다**."},
  {id:792,vn:239,verb:"pound",pn:1,pattern:"pound+ 명사",meaning:"빻다, 가루로 만들다, 마구 치다",example:"The waves pounded the boat to pieces.",trans:"파도가 배를 산산조각으로 **부숴 버렸다**."},
  {id:793,vn:239,verb:"pound",pn:2,pattern:"자동사 pound",meaning:"난타하다, 포격하다, 둥둥 울리다",example:"I could hear him pounding on the drum.",trans:"나는 그가 드럼을 **두드리는** 소리를 들을 수 있었다."},
  {id:794,vn:240,verb:"pour",pn:1,pattern:"자동사 pour",meaning:"퍼붓다, 쏟아지다",example:"The rain poured down as if someone were emptying it out of great buckets.",trans:"누군가가 커다란 양동이에서 물을 퍼붓는 것처럼 비가 **쏟아졌다**."},
  {id:795,vn:240,verb:"pour",pn:2,pattern:"pour+ 명사",meaning:"~를 붓다, 따르다",example:"She poured the hot water from the kettle.",trans:"그녀는 주전자에서 뜨거운 물을 **따랐다**."},
  {id:796,vn:241,verb:"practice",pn:1,pattern:"practice+ 명사",meaning:"실행하다, 연습하다, 길들이다",example:"Always practice what you preach.",trans:"항상 말한 대로 **실천하라**."},
  {id:797,vn:241,verb:"practice",pn:2,pattern:"practice+ V-ing",meaning:"~하는 것을 연습하다",example:"It is important to practice playing the piano regularly.",trans:"피아노를 규칙적으로 **연습하는** 것이 중요하다."},
  {id:798,vn:241,verb:"practice",pn:3,pattern:"practice+ law, medicine",meaning:"개업하고 있다",example:"He will practice law right after he graduates from law school.",trans:"그는 로스쿨을 졸업하는 즉시 변호사를 **개업할** 것이다."},
  {id:799,vn:242,verb:"prefer",pn:1,pattern:"prefer+ 명사/ to VR/ V-ing",meaning:"더 좋아하다, 선호하다",example:"I prefer coffee.",trans:"나는 커피를 **좋아한다**."},
  {id:800,vn:242,verb:"prefer",pn:2,pattern:"prefer A to B",meaning:"B보다 A를 더 좋아하다",example:"I prefer physics to chemistry.",trans:"나는 화학보다 물리를 **더 좋아한다**."},
  {id:801,vn:242,verb:"prefer",pn:3,pattern:"prefer+ 명사+ 형용사(보어)",meaning:"~한 ‘명사’를 더 좋아하다",example:"I prefer my egg boiled.",trans:"나는 달걀을 삶아서 **먹는 것을 좋아한다**."},
  {id:802,vn:242,verb:"prefer",pn:4,pattern:"prefer+ 명사+ to VR(보어)",meaning:"‘명사’가 ~하는 것이 더 좋다",example:"I prefer him not to start so early.",trans:"나는 그가 그렇게 일찍 출발하지 않기를 **바란다**."},
  {id:803,vn:242,verb:"prefer",pn:5,pattern:"prefer+ that S+ V",meaning:"이왕이면 ~사실을 선호하다",example:"He preferred that nothing should be said about his family.",trans:"그는 자신의 가족에 대해 아무 말도 하지 않기를 **바랐다**."},
  {id:804,vn:243,verb:"prepare",pn:1,pattern:"prepare+ 명사",meaning:"마련하다, 사용을 위해 준비하다",example:"Mom and I used to prepare 3 meals a day.",trans:"엄마와 나는 하루에 세 끼를 **준비하곤 했다**."},
  {id:805,vn:243,verb:"prepare",pn:2,pattern:"prepare+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 마련해주다",example:"Mom prepared us a substantial breakfast.",trans:"엄마는 우리에게 든든한 아침 식사를 **차려 주었다**."},
  {id:806,vn:243,verb:"prepare",pn:3,pattern:"prepare+ to VR",meaning:"~할 대비를 하다",example:"After a short break we prepared to climb down.",trans:"잠깐 휴식을 취한 후 우리는 내려갈 **준비를 했다**."},
  {id:807,vn:243,verb:"prepare",pn:4,pattern:"prepare for+ 명사",meaning:"~에 대비하다",example:"He ordered that she prepare for working as a fire fighter.",trans:"그는 그녀에게 소방관으로 일할 **준비를 하도록** 지시했다."},
  {id:808,vn:243,verb:"prepare",pn:5,pattern:"prepare A for B",meaning:"A를 B에 대비시키다, B를 위해 A를 마련하다",example:"He decided to prepare one of his students for the test.",trans:"그는 학생 중 한 명을 시험에 **대비시키기로** 결심했다."},
  {id:809,vn:243,verb:"prepare",pn:6,pattern:"prepare+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 대비시키다",example:"I prepared myself to die.",trans:"나는 죽을 **각오를 했다**."},
  {id:810,vn:244,verb:"present",pn:1,pattern:"present+ 명사",meaning:"증정하다, 주다, 소개하다, 등장시키다, 나타내다, 제출하다",example:"The girls presented a book to their teacher in hospital.",trans:"소녀들은 입원 중인 선생님께 책을 **선물했다**."},
  {id:811,vn:244,verb:"present",pn:2,pattern:"present A with B",meaning:"A에게 B를 제공하다",example:"We would present him with a gold watch on his 60th birthday, which he did not accept as a public official.",trans:"우리는 그의 60번째 생일에 금시계를 **선물할 예정이었으나**, 그는 공직자로서 이를 **받지 않았다**."},
  {id:812,vn:244,verb:"present",pn:3,pattern:"present+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 제공하다",example:"He presented the king what he had found.",trans:"그는 자신이 발견한 것을 왕에게 **바쳤다**."},
  {id:813,vn:245,verb:"promise",pn:1,pattern:"promise+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 약속하다",example:"In 1920 the great powers promised them an independence state.",trans:"1920년에 강대국들은 그들에게 독립 국가를 **약속했다**."},
  {id:814,vn:245,verb:"promise",pn:2,pattern:"promise+ 명사+ that S+V",meaning:"‘명사’에게 ~사실을 약속하다",example:"Promise me that you’ll never give me up no matter what happens.",trans:"무슨 일이 있어도 절대 나를 포기하지 않겠다고 나에게 **약속해줘**."},
  {id:815,vn:245,verb:"promise",pn:3,pattern:"promise+ 명사+ to VR",meaning:"‘명사’에게 ~하겠다고 약속하다",example:"He promised me to finish it by noon.",trans:"그는 나에게 정오까지 그것을 끝내겠다고 **약속했다**."},
  {id:816,vn:246,verb:"propose",pn:1,pattern:"propose+ 명사",meaning:"제안하다",example:"The government proposed a gradual change to the education system.",trans:"정부는 교육 제도의 점진적인 변화를 **제안했다**."},
  {id:817,vn:246,verb:"propose",pn:2,pattern:"propose+ to VR/ V-ing",meaning:"~할 것을 제안하다, 꾀하다",example:"I propose to take a week’s holiday.",trans:"나는 일주일간 휴가를 **갖기로 하겠다**."},
  {id:818,vn:246,verb:"propose",pn:3,pattern:"propose+ that S+ should VR",meaning:"~해야 한다고 제안하다",example:"I proposed to him that the loan be reduced.",trans:"나는 그에게 대출을 줄이자고 **제안했다**."},
  {id:819,vn:246,verb:"propose",pn:4,pattern:"propose to 사람",meaning:"청혼하다",example:"He had proposed to Isabel the day after taking the job as a lawyer.",trans:"그는 변호사 일을 맡은 다음 날 이사벨에게 **청혼했다**."},
  {id:820,vn:247,verb:"prove",pn:1,pattern:"prove to VR",meaning:"~하는 것으로 입증되다",example:"He will prove to know nothing about the subject.",trans:"그는 그 주제에 대해 아무것도 모른다는 것이 **드러날 것이다**."},
  {id:821,vn:247,verb:"prove",pn:2,pattern:"prove+ 형용사",meaning:"~인 상태로 판명되다",example:"In the past this process of transition often proved difficult.",trans:"과거에는 이 전환 과정이 종종 어렵다는 것이 **판명되었다**."},
  {id:822,vn:247,verb:"prove",pn:3,pattern:"prove+ 명사",meaning:"~를 입증하다",example:"He needs more time to prove his innocence.",trans:"그는 자신의 무죄를 **증명하기** 위해 더 많은 시간이 필요하다."},
  {id:823,vn:247,verb:"prove",pn:4,pattern:"prove+ that S+ V",meaning:"사실을 입증하다",example:"I will prove that he is guilty.",trans:"나는 그가 유죄라는 것을 **증명할 것이다**."},
  {id:824,vn:247,verb:"prove",pn:5,pattern:"prove+ 명사+ 형용사(O.C)",meaning:"‘명사’를 ~하다고 입증하다",example:"I am determined to prove him wrong.",trans:"나는 그가 틀렸다는 것을 **입증하기로** 결심했다."},
  {id:825,vn:248,verb:"pull",pn:1,pattern:"pull+ 명사",meaning:"당기다, 뽑다",example:"I pulled the trigger and the gun went off.",trans:"나는 방아쇠를 **당겼고** 총이 **발사되었다**."},
  {id:826,vn:248,verb:"pull",pn:2,pattern:"pull over",meaning:"길가에 차를 세우다 머리에서부터 옷을 입다",example:"The patrol car ordered him to pull over onto the road shoulder.",trans:"순찰차는 그에게 갓길로 **차를 대라고** 명령했다."},
  {id:827,vn:248,verb:"pull",pn:3,pattern:"pull into",meaning:"차를 세우다",example:"She pulled into a garage to check the tire.",trans:"그녀는 타이어를 확인하기 위해 정비소로 **차를 몰았다**."},
  {id:828,vn:248,verb:"pull",pn:4,pattern:"pull out",meaning:"빠져나가다, 꺼내다, 빼내다",example:"Do I need to have one tooth pulled out?",trans:"치아 한 개를 **뽑아야** 할까요?"},
  {id:829,vn:248,verb:"pull",pn:5,pattern:"pull oneself together",meaning:"정신을 차리다",example:"He tried to pull himself together after blow on the head.",trans:"그는 머리를 얻어맞은 후 정신을 **차리려고** 했다."},
  {id:830,vn:249,verb:"put",pn:1,pattern:"put+ 명사+ in, into, to, on, against…",meaning:"~를 놓다, 두다, 넣다",example:"She put the gun down and pulled out a sword instead.",trans:"그녀는 총을 **내려놓고** 대신 칼을 **꺼냈다**."},
  {id:831,vn:249,verb:"put",pn:2,pattern:"put on+ 옷, 기타 장신구류",meaning:"착용하다",example:"She often puts on shorts and hair band.",trans:"그녀는 종종 반바지와 머리띠를 **착용한다**."},
  {id:832,vn:249,verb:"put",pn:3,pattern:"put off+ 명사/ V-ing",meaning:"뒤로 미루다, 제거하다",example:"We had to put off our trip.",trans:"우리는 여행을 **미뤄야** 했다."},
  {id:833,vn:249,verb:"put",pn:4,pattern:"put away",meaning:"치워 놓다, 챙겨두다",example:"Each of you should put away a little money for the rainy day.",trans:"여러분 각자는 만약의 경우를 대비해 돈을 조금씩 **저축해야** 한다."},
  {id:834,vn:249,verb:"put",pn:5,pattern:"put in+ 시간+ V-ing",meaning:"~하면서 시간을 보내다",example:"He puts in at least 2 hours working out at the gym.",trans:"그는 헬스장에서 운동하는 데 적어도 2시간을 **쏟는다**."},
  {id:835,vn:249,verb:"put",pn:6,pattern:"put out",meaning:"내놓다, 불을 끄다",example:"I put out my tongue for the doctor.",trans:"나는 의사에게 혀를 **내밀었다**."},
  {id:836,vn:249,verb:"put",pn:7,pattern:"put together",meaning:"함께 놓다, 조립하다",example:"Let’s put it all together and get a conclusion.",trans:"모두 **종합해서** 결론을 **내립시다**."},
  {id:837,vn:249,verb:"put",pn:8,pattern:"put up",meaning:"숙박시키다",example:"Will you put us up for the night?",trans:"오늘 밤 저희를 **재워** 주시겠어요?"},
  {id:838,vn:249,verb:"put",pn:9,pattern:"put up with",meaning:"견디다",example:"I had to put up with a great many inconveniences.",trans:"나는 아주 많은 불편을 **감수해야** 했다."},
  {id:839,vn:249,verb:"put",pn:10,pattern:"put an end to+ 명사",meaning:"끝내다",example:"It is time to put an end to plutocracy.",trans:"금권정치를 **끝낼** 때가 되었다."},
  {id:840,vn:250,verb:"push",pn:1,pattern:"push+ 명사",meaning:"밀다, 지지하다, 추구하다, 강요하다",example:"We pushed him out of the room.",trans:"우리는 그를 방 밖으로 **밀어냈다**."},
  {id:841,vn:250,verb:"push",pn:2,pattern:"push against",meaning:"~에 기대다",example:"Do not push against the door. It opens automatically.",trans:"문을 **밀지** 마세요. 자동으로 **열립니다**."},
  {id:842,vn:251,verb:"provide",pn:1,pattern:"provide+ 명사",meaning:"마련하다, 준비하다, 공급하다",example:"We must provide a complete outfit of modern tools and machinery.",trans:"우리는 현대적인 도구와 기계를 완전히 **갖추어야** 한다."},
  {id:843,vn:251,verb:"provide",pn:2,pattern:"provide A with B",meaning:"A에게 B를 제공하다",example:"Cacti provide us with water when in a desert.",trans:"사막에서 선인장은 우리에게 물을 **제공해 준다**."},
  {id:844,vn:252,verb:"protest",pn:1,pattern:"protest+ 명사/ that S+ V",meaning:"주장하다, 단언하다",example:"He protested his innocence.",trans:"그는 자신의 무죄를 **주장했다**."},
  {id:845,vn:252,verb:"protest",pn:2,pattern:"자동사 protest",meaning:"항의하다",example:"The boys protested against having girls in the game.",trans:"소년들은 여자아이들이 게임에 참여하는 것에 **반대했다**."},
  {id:846,vn:253,verb:"pardon",pn:1,pattern:"pardon+ 명사/ V-ing",meaning:"용서하다",example:"I pardon your offense.",trans:"나는 당신의 잘못을 **용서합니다**."},
  {id:847,vn:253,verb:"pardon",pn:2,pattern:"pardon+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 용서하다",example:"Please pardon me my offense.",trans:"제 잘못을 **용서해** 주십시오."},
  {id:848,vn:254,verb:"pass",pn:1,pattern:"pass+ 명사",meaning:"통과하다, 가로지르다",example:"They managed to pass the dangerous section of the road.",trans:"그들은 가까스로 도로의 위험한 구간을 **통과했다**."},
  {id:849,vn:254,verb:"pass",pn:2,pattern:"pass+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 건네주다",example:"Will you pass me the pepper?",trans:"후추를 **건네** 주시겠어요?"},
  {id:850,vn:254,verb:"pass",pn:3,pattern:"pass+ 명사",meaning:"유통시키다, 통과시키다, 가결하다",example:"The congress passed the bill.",trans:"의회는 그 법안을 **통과시켰다**."},
  {id:851,vn:254,verb:"pass",pn:4,pattern:"pass by",meaning:"지나가다, 사라지다",example:"No one passed by.",trans:"아무도 **지나가지** 않았다."},
  {id:852,vn:254,verb:"pass",pn:5,pattern:"pass as, pass for",meaning:"~로 통용되다",example:"A picture like this will not pass as a genuine Picasso.",trans:"이런 그림은 진짜 피카소 작품으로 **통하지** 않을 것이다."},
  {id:853,vn:254,verb:"pass",pn:6,pattern:"pass away",meaning:"가버리다, 죽다",example:"He passed away peacefully.",trans:"그는 평화롭게 **세상을 떠났다**."},
  {id:854,vn:254,verb:"pass",pn:7,pattern:"pass into",meaning:"~로 전환되다",example:"Water passes into steam when it is heated.",trans:"물은 가열되면 수증기로 **변한다**."},
  {id:855,vn:255,verb:"peel",pn:1,pattern:"peel+ 명사",meaning:"껍질을 벗기다",example:"You peel the onions and I will chop them up.",trans:"네가 양파를 **벗기면** 내가 **다질게**."},
  {id:856,vn:255,verb:"peel",pn:2,pattern:"자동사 peel",meaning:"벗겨지다",example:"This orange hardly peels.",trans:"이 오렌지는 껍질이 잘 **벗겨지지** 않는다."},
  {id:857,vn:256,verb:"penetrate",pn:1,pattern:"penetrate+ 명사",meaning:"관통하다, 꿰뚫다, 스며들다",example:"The bullet penetrated the partition.",trans:"총알이 칸막이를 **뚫고 지나갔다**."},
  {id:858,vn:256,verb:"penetrate",pn:2,pattern:"자동사 penetrate",meaning:"뚫고 들어가다",example:"The sunshine penetrated where the trees were thickest.",trans:"햇빛이 나무가 가장 우거진 곳까지 **스며들었다**."},
  {id:859,vn:257,verb:"perceive",pn:1,pattern:"perceive+ 명사",meaning:"인지하다",example:"A baby see things but does not perceive them as definite objects.",trans:"아기는 사물을 **보지만** 뚜렷한 물체로 **인식하지는** 못한다."},
  {id:860,vn:257,verb:"perceive",pn:2,pattern:"perceive+ that S+ V",meaning:"이해하다",example:"He perceived that he could not make his daughter change her mind.",trans:"그는 딸의 마음을 **바꿀** 수 없다는 것을 **깨달았다**."},
  {id:861,vn:257,verb:"perceive",pn:3,pattern:"perceive+ 명사+ VR(V-ing)",meaning:"‘명사’가 ~하는 것을 인지하다",example:"Nobody perceived me entering the room.",trans:"아무도 내가 방에 **들어오는** 것을 **알아채지** 못했다."},
  {id:862,vn:258,verb:"perform",pn:1,pattern:"perform+ 명사",meaning:"이행하다, 공연하다",example:"I performed my duty.",trans:"나는 내 의무를 **다했다**."},
  {id:863,vn:258,verb:"perform",pn:2,pattern:"자동사 perform",meaning:"공연하다, 연주하다, 행하다, 작동하다, 기증하다, 게임 등을 하다",example:"They had to perform on the stage 2 times a day.",trans:"그들은 하루에 2번 무대에서 **공연해야 했다**."},
  {id:864,vn:259,verb:"persist",pn:1,pattern:"persist+ that S+ V",meaning:"주장하다, 우기다, 고집하다, 지속되다",example:"He persisted that his son was innocent.",trans:"그는 자신의 아들이 무죄라고 **주장했다**."},
