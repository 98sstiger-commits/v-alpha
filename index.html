  {id:865,vn:260,verb:"persuade",pn:1,pattern:"persuade+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 설득하다",example:"The priests of the old religions used to persuade people to persecute the Christians.",trans:"옛 종교의 성직자들은 사람들이 기독교인들을 **박해하도록 설득하곤 했다**."},
  {id:866,vn:260,verb:"persuade",pn:2,pattern:"persuade+ 명사+ 전치사+ 명사",meaning:"‘명사’를 설득해서 ~상태에 이르게 하다",example:"Can you persuade her into wearing pants?",trans:"당신은 그녀가 바지를 입도록 **설득할 수** 있나요?"},
  {id:867,vn:260,verb:"persuade",pn:3,pattern:"persuade+ 명사+ of+ 명사",meaning:"납득시키다",example:"How can I persuade you of my plight?",trans:"내 딱한 사정을 어떻게 하면 당신에게 **납득시킬 수** 있을까요?"},
  {id:868,vn:260,verb:"persuade",pn:4,pattern:"persuade+ 명사+ that S+ V",meaning:"‘명사’에게 ~ 사실을 납득시키다",example:"He persuaded the farmers that they should plant peanuts.",trans:"그는 농부들에게 땅콩을 심어야 한다고 **설득했다**."},
  {id:869,vn:261,verb:"pick",pn:1,pattern:"pick+ 명사",meaning:"쪼다, 후벼 파다, 꺾다, 뜯다, 뽑아내다, 고르다, 발라내다, 배우다",example:"It is inappropriate to pick your teeth before others.",trans:"남들 앞에서 이쑤시개를 **쑤시는** 것은 적절하지 않다."},
  {id:870,vn:261,verb:"pick",pn:2,pattern:"pick up",meaning:"줍다, 집어 올리다, 우연히 얻다, 발탁하다",example:"He picked up many valuable curios in Paris.",trans:"그는 파리에서 귀중한 골동품을 많이 **수집했다**."},
  {id:871,vn:262,verb:"picture",pn:1,pattern:"picture+ 명사",meaning:"그리다, 상상하다",example:"It is hard to picture his sufferings.",trans:"그의 고통을 **상상하기**란 어렵다."},
  {id:872,vn:262,verb:"picture",pn:2,pattern:"picture+ 명사+ V-ing",meaning:"‘명사’가 ~하는 것을 상상하다",example:"He didn’t picture her asking him the favor.",trans:"그는 그녀가 자신에게 부탁을 할 것이라고 **예상하지 못했다**."},
  {id:873,vn:263,verb:"pitch",pn:1,pattern:"pitch+ 명사",meaning:"던지다, 팽개치다, 음조를 잡다",example:"The farmers were pitching hay on the cart.",trans:"농부들은 건초를 수레 위에 **던져 올리고 있었다**."},
  {id:874,vn:263,verb:"pitch",pn:2,pattern:"자동사 pitch",meaning:"던지다, 거꾸로 떨어지다, 곤두박질하다",example:"He pitched well in the game.",trans:"그는 경기에서 **잘 던졌다**."},
  {id:875,vn:264,verb:"plan",pn:1,pattern:"plan to VR",meaning:"~하기로 계획하다",example:"We are planning to make a tour next month.",trans:"우리는 다음 달에 여행을 **할 계획이다**."},
  {id:876,vn:264,verb:"plan",pn:2,pattern:"plan+ 명사",meaning:"~을 계획하다, 꾀하다",example:"She seems to have planned something.",trans:"그녀는 무언가를 **계획한** 것 같다."},
  {id:877,vn:265,verb:"pray",pn:1,pattern:"자동사 pray",meaning:"기도하다, 간절히 바라다",example:"He prayed twice a day.",trans:"그는 하루에 두 번 **기도했다**."},
  {id:878,vn:265,verb:"pray",pn:2,pattern:"pray+ that S+ V",meaning:"간절히 바라다",example:"He prayed that he might not be seen by anyone who knew him.",trans:"그는 자신을 아는 사람에게 **들키지 않기를** 간절히 **바랐다**."},
  {id:879,vn:266,verb:"press",pn:1,pattern:"press+ 명사",meaning:"누르다, 다림질하다, 압박하다",example:"Press the button should you need any assistance.",trans:"도움이 필요하시면 버튼을 **누르십시오**."},
  {id:880,vn:266,verb:"press",pn:2,pattern:"press+ 명사+ to VR",meaning:"‘명사’에게 ~하도록 강요하다",example:"We pressed him to stay another week.",trans:"우리는 그에게 한 주 더 머물도록 **압박했다**."},
  {id:881,vn:267,verb:"presume",pn:1,pattern:"presume+ 명사",meaning:"추정하다",example:"The court presumed the death of the man.",trans:"법원은 그 남자의 사망을 **추정했다**."},
  {id:882,vn:267,verb:"presume",pn:2,pattern:"presume+ that S+ V",meaning:"~라고 가정하다",example:"I presume that you want to have the goods insured.",trans:"저는 귀하께서 물품에 보험을 들기를 원하시는 것으로 **생각합니다**."},
  {id:883,vn:267,verb:"presume",pn:3,pattern:"presume+ 명사+ to VR",meaning:"‘명사’를 ~하다고 가정하다",example:"He presumed her to be dead.",trans:"그는 그녀가 죽었다고 **추정했다**."},
  {id:884,vn:267,verb:"presume",pn:4,pattern:"presume+ to VR",meaning:"감히 ~하다",example:"May I presume to ask you a question?",trans:"감히 한 가지 여쭤봐도 **될까요**?"},
  {id:885,vn:268,verb:"pretend",pn:1,pattern:"pretend to VR",meaning:"~하는 척 하다",example:"She pretended not to know me and failed me at the last moment.",trans:"그녀는 나를 모르는 척 **했고** 마지막 순간에 나를 **실망시켰다**."},
  {id:886,vn:268,verb:"pretend",pn:2,pattern:"pretend + that S+ V",meaning:"사실을 가장하다",example:"Let’s pretend that we are a couple.",trans:"우리가 연인인 척 **해보자**."},
  {id:887,vn:268,verb:"pretend",pn:3,pattern:"pretend+ 명사",meaning:"~을 가장하다",example:"He forced me to pretend poverty.",trans:"그는 나에게 가난한 척하도록 **강요했다**."},
  {id:888,vn:269,verb:"prevail",pn:1,pattern:"자동사 prevail",meaning:"이기다, 우세하다, 유행하다, 득세하다",example:"The soldiers prevailed over their enemy.",trans:"그 병사들은 적을 **이겼다**."},
  {id:889,vn:269,verb:"prevail",pn:2,pattern:"prevail on",meaning:"설득하다",example:"He prevailed on his friend to go with him.",trans:"그는 친구를 **설득하여** 함께 가게 했다."},
  {id:890,vn:270,verb:"prevent",pn:1,pattern:"prevent+ 명사",meaning:"~를 막다",example:"His careful study prevented an outbreak of another accident.",trans:"그의 신중한 연구가 또 다른 사고의 발생을 **막았다**."},
  {id:891,vn:270,verb:"prevent",pn:2,pattern:"prevent + A+ from B",meaning:"B로부터 A를 막다",example:"We prevented the fire from spreading to other areas nearby.",trans:"우리는 불이 근처 다른 지역으로 **번지는 것을 막았다**."},
  {id:892,vn:271,verb:"profess",pn:1,pattern:"profess+ 명사",meaning:"공언하다",example:"He professes a great dislike for me.",trans:"그는 나를 매우 **싫어한다고 공언한다**."},
  {id:893,vn:271,verb:"profess",pn:2,pattern:"profess + 명사+ 명사, 형용사(O.C)",meaning:"‘명사’를 ~로 공연하다",example:"He professed himself a supporter of the party.",trans:"그는 자신이 그 당의 지지자라고 **자처했다**."},
  {id:894,vn:271,verb:"profess",pn:3,pattern:"profess+ that S+ V",meaning:"사실을 천명하다, 말하다",example:"I profess that the idea is new to me.",trans:"나는 그 생각이 내게 생소하다는 것을 **인정한다**."},
  {id:895,vn:272,verb:"prohibit",pn:1,pattern:"prohibit+ 명사",meaning:"금지하다",example:"The sale of intoxicating liquor is prohibited.",trans:"주류 판매가 **금지되어 있다**."},
  {id:896,vn:272,verb:"prohibit",pn:2,pattern:"prohibit+ 명사+ from+ V-ing",meaning:"~를 하는 것으로부터 금지하다",example:"The law prohibits ships from approaching the island.",trans:"법은 선박이 그 섬에 접근하는 것을 **금지한다**."},
  {id:897,vn:273,verb:"project",pn:1,pattern:"project+ 명사",meaning:"던지다, 발사하다, 밀어내다, 투영하다, 비추다",example:"The apparatus projects missiles into space.",trans:"그 장치는 미사일을 우주로 **발사한다**."},
  {id:898,vn:273,verb:"project",pn:2,pattern:"자동사 project",meaning:"튀어나오다",example:"The breakwater projects far into the sea.",trans:"방파제가 바다 쪽으로 멀리 **뻗어 있다**."},
  {id:899,vn:274,verb:"prompt",pn:1,pattern:"prompt+ 명사",meaning:"자극하다, 고무시키다",example:"Hatred prompted her.",trans:"증오심이 그녀를 **부추겼다**."},
  {id:900,vn:274,verb:"prompt",pn:2,pattern:"prompt+ 명사+ to VR",meaning:"‘명사’를 자극하여 ~하게 하다",example:"Her curiosity prompts her to ask endless questions.",trans:"그녀의 호기심이 그녀로 하여금 끝없이 질문하게 **만든다**."},
  {id:901,vn:275,verb:"pronounce",pn:1,pattern:"pronounce+ 명사",meaning:"발음하다, 선언하다",example:"The judgement was pronounced.",trans:"판결이 **선고되었다**."},
  {id:902,vn:275,verb:"pronounce",pn:2,pattern:"pronounce+ 명사+ to VR/ 명사/ 형용사(O.C)",meaning:"‘명사’를 ~하다고 선언하다",example:"She cut the apple and pronounced it unripe.",trans:"그녀는 사과를 잘라 보고 아직 덜 익었다고 **선언했다**."},
  {id:903,vn:275,verb:"pronounce",pn:3,pattern:"pronounce+ that S+ V",meaning:"사실을 선언하다",example:"The doctor pronounced that the patient was out of danger.",trans:"의사는 환자가 위험에서 **벗어났다고 선언했다**."},
  {id:904,vn:276,verb:"purpose",pn:1,pattern:"purpose+ 명사/ to VR/ V-ing/ that S+ V",meaning:"의도하다",example:"He purposed an interview.",trans:"그는 면담을 **계획했다**."},
  {id:905,vn:277,verb:"quit",pn:1,pattern:"quit+ 명사/ V-ing",meaning:"~를 끝내다, 떠나다",example:"George quit his brother in anger.",trans:"조지는 화가 나서 동생 곁을 **떠났다**."},
  {id:906,vn:277,verb:"quit",pn:2,pattern:"자동사 quit",meaning:"그만두다, 단념하다",example:"He has decided to quit as manager of the team.",trans:"그는 팀 감독직을 **그만두기로** 결심했다."},
  {id:907,vn:278,verb:"quote",pn:1,pattern:"quote+ 명사",meaning:"인용하다",example:"He usually quotes Shakespeare.",trans:"그는 보통 셰익스피어를 **인용한다**."},
  {id:908,vn:278,verb:"quote",pn:2,pattern:"quote+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’ 에게 ‘D.O’를 인용해주다, 말해주다",example:"He quoted me nice examples.",trans:"그는 나에게 좋은 예를 **들어 주었다**."},
  {id:909,vn:279,verb:"range",pn:1,pattern:"range+ 명사",meaning:"줄 세우다, 정렬시키다",example:"This commander ranged his men along the river bank.",trans:"이 지휘관은 부하들을 강둑을 따라 **배치했다**."},
  {id:910,vn:279,verb:"range",pn:2,pattern:"range from A to B",meaning:"A에서 B까지 걸쳐있다",example:"Prices range from 5 to 100 dollars.",trans:"가격은 5달러에서 100달러까지 **분포한다**."},
  {id:911,vn:280,verb:"realize",pn:1,pattern:"realize+ 명사",meaning:"실현하다, 깨닫다",example:"She has not realized her own mistakes.",trans:"그녀는 자신의 실수를 아직 **깨닫지 못했다**."},
  {id:912,vn:280,verb:"realize",pn:2,pattern:"realize+ that S+ V",meaning:"~을 깨닫다",example:"You will realize how hard the work is.",trans:"당신은 그 일이 얼마나 힘든지 **깨닫게 될 것이다**."},
  {id:913,vn:281,verb:"recognize",pn:1,pattern:"recognize+ 명사",meaning:"알아보다, 인식하다, 인정하다",example:"The receptionist recognized the opera singer at once.",trans:"접수원은 그 오페라 가수를 즉시 **알아보았다**."},
  {id:914,vn:281,verb:"recognize",pn:2,pattern:"recognize+ that S+ V",meaning:"인정하다",example:"I must recognize that I am not qualified for the post.",trans:"나는 내가 그 직책에 적합하지 않다는 것을 **인정해야 한다**."},
  {id:915,vn:282,verb:"refer",pn:1,pattern:"refer A to B",meaning:"A를 B에 보내다, 조회시키다, 돌리다",example:"I was referred to the secretary for more information.",trans:"나는 더 많은 정보를 얻기 위해 비서에게 **안내받았다**."},
  {id:916,vn:282,verb:"refer",pn:2,pattern:"refer to+ 명사",meaning:"언급하다, 부르다, 관련되다, 조회하다",example:"The speaker referred to his own personal experience.",trans:"그 연사는 자신의 개인적인 경험을 **언급했다**."},
  {id:917,vn:283,verb:"refuse",pn:1,pattern:"refuse+ 명사/ to VR",meaning:"거절하다",example:"He refused our offer.",trans:"그는 우리의 제안을 **거절했다**."},
  {id:918,vn:283,verb:"refuse",pn:2,pattern:"refuse+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 불허하다",example:"He refused me help.",trans:"그는 나에게 도움 주기를 **거부했다**."},
  {id:919,vn:284,verb:"regret",pn:1,pattern:"regret+ 명사/ V-ing/ that S+ V",meaning:"후회하다, 유감으로 생각하다",example:"He regrets the follies of his youth.",trans:"그는 젊은 시절의 어리석음을 **후회한다**."},
  {id:920,vn:284,verb:"regret",pn:2,pattern:"regret to VR",meaning:"~하게 되어 유감이다",example:"I regret to say that my fiance is ill in bed.",trans:"유감스럽게도 제 약혼자가 병으로 **누워 있다**고 **말씀드려야** 할 것 같습니다."},
  {id:921,vn:285,verb:"remain",pn:1,pattern:"자동사 remain",meaning:"남다, 잔존하다",example:"He chose to remain.",trans:"그는 **남아 있기로** 선택했다."},
  {id:922,vn:285,verb:"remain",pn:2,pattern:"remain+ 명사/ 형용사",meaning:"~로 남아있다, ~상태로 남아있다",example:"Their motives for the murder remain a mystery.",trans:"그들의 살인 동기는 여전히 수수께끼로 **남아 있다**."},
  {id:923,vn:285,verb:"remain",pn:3,pattern:"remain+ to VR",meaning:"아직도 ~해야 한다, 미완으로 남아 있다",example:"It remains to say a few words on the matter.",trans:"이 문제에 대해 몇 마디 더 **해야 할 말이 남아 있다**."},
  {id:924,vn:285,verb:"remain",pn:4,pattern:"명사",meaning:"잔해, 유해",example:"",trans:""},
  {id:925,vn:286,verb:"remind",pn:1,pattern:"remind + A of B",meaning:"A에게 B를 상기시키다",example:"His eyes remind me of his father.",trans:"그의 눈은 나에게 그의 아버지를 **떠올리게 한다**."},
  {id:926,vn:286,verb:"remind",pn:2,pattern:"remind+ 명사+ to VR",meaning:"‘명사’에게 ~할 것을 상기시키다",example:"Please remind me to take the umbrella back.",trans:"우산을 가져가는 것을 잊지 않도록 나에게 **상기시켜 주세요**."},
  {id:927,vn:286,verb:"remind",pn:3,pattern:"remind+ 명사+ that S+ V",meaning:"‘명사’에게 ~사실을 상기시키다",example:"Don’t forget to remind him that the meeting has been postponed.",trans:"회의가 연기되었다는 것을 그에게 꼭 **상기시켜 주는 것을** 잊지 마세요."},
  {id:928,vn:287,verb:"report",pn:1,pattern:"report+ 명사",meaning:"~을 보도, 보고하다",example:"CNN reported the accident of campus massacre.",trans:"CNN은 캠퍼스 학살 사고를 **보도했다**."},
  {id:929,vn:287,verb:"report",pn:2,pattern:"report+ V-ing",meaning:"~하는 것을 보고하다, 전하다",example:"He reported having seen the man at the meeting.",trans:"그는 그 회의에서 그 남자를 **보았다고 보고했다**."},
  {id:930,vn:287,verb:"report",pn:3,pattern:"report+ that S+ V",meaning:"사실을 전하다",example:"It is reported hat over three hundred people died in the epidemic.",trans:"전염병으로 300명이 넘는 사람들이 **사망했다고 보도되고 있다**."},
  {id:931,vn:287,verb:"report",pn:4,pattern:"report+ 명사+ to VR",meaning:"‘명사’가 ~하다고 보고하다",example:"He has been reported to be the best person for the job.",trans:"그는 그 일에 가장 적합한 사람이라고 **보고되어 왔다**."},
  {id:932,vn:287,verb:"report",pn:5,pattern:"report to + 명사",meaning:"~에 신고하다, 출두하다",example:"He was told to report to the police.",trans:"그는 경찰에 **출두하라는** 지시를 받았다."},
  {id:933,vn:287,verb:"report",pn:6,pattern:"report on+ 명사",meaning:"~에 관해 보도하다",example:"He reported on the war situation.",trans:"그는 전쟁 상황에 대해 **보고했다**."},
  {id:934,vn:287,verb:"report",pn:7,pattern:"report+ A to B",meaning:"A를 B에 고발하다, 신고하다",example:"I will report you to the police for coming a fraud.",trans:"나는 사기를 **저질렀다는** 이유로 당신을 경찰에 **신고할 것이다**."},
  {id:935,vn:288,verb:"resolve",pn:1,pattern:"resolve+ 명사",meaning:"분해하다, 분석하다, 변형시키다, 풀다, 해명하다",example:"The fog was resolved into rain.",trans:"안개가 비로 **바뀌었다**."},
  {id:936,vn:288,verb:"resolve",pn:2,pattern:"resolve+ to VR",meaning:"~하기로 결심하다",example:"He resolved never to go shopping at the stores.",trans:"그는 그 가게에서 다시는 쇼핑하지 않겠다고 **결심했다**."},
  {id:937,vn:288,verb:"resolve",pn:3,pattern:"resolve+ that S+ should+ VR",meaning:"~해야 한다고 결심하다",example:"The committee resolved that the step should be authorized.",trans:"위원회는 그 조치가 승인되어야 한다고 **결의했다**."},
  {id:938,vn:289,verb:"result",pn:1,pattern:"result from",meaning:"~로 부터 생겨나다",example:"Disease often results from poverty.",trans:"질병은 종종 빈곤에서 **기인한다**."},
  {id:939,vn:289,verb:"result",pn:2,pattern:"result in",meaning:"~로 귀착되다",example:"The plan resulted in failure.",trans:"그 계획은 실패로 **끝났다**."},
  {id:940,vn:289,verb:"result",pn:3,pattern:"속어 as a result",meaning:"그 결과로써",example:"He was refused the civil right as a result of his treachery.",trans:"그는 배신 행위의 결과로 시민권을 **박탈당했다**."},
  {id:941,vn:290,verb:"return",pn:1,pattern:"자동사 return",meaning:"돌아가다, 돌아오다, 복귀하다",example:"I hope that he will return to life.",trans:"나는 그가 다시 살아**돌아오기를** **바란다**."},
  {id:942,vn:290,verb:"return",pn:2,pattern:"return+ 명사",meaning:"반환하다, 되돌려주다, 보답하다",example:"The bazzar has returned a fairly good interest.",trans:"그 바자회는 꽤 좋은 수익을 **올렸다**."},
  {id:943,vn:290,verb:"return",pn:3,pattern:"return+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 돌려주다",example:"Please return me the umbrella I lent you.",trans:"내가 빌려준 우산을 **돌려주세요**."},
  {id:944,vn:290,verb:"return",pn:4,pattern:"in return",meaning:"보답으로",example:"He invited me to a nice restaurant in return.",trans:"그는 답례로 나를 멋진 식당에 **초대했다**."},
  {id:945,vn:291,verb:"reveal",pn:1,pattern:"reveal+ 명사",meaning:"드러내다, 폭로하다",example:"He did not reveal his identity.",trans:"그는 자신의 신원을 **밝히지** 않았다."},
  {id:946,vn:291,verb:"reveal",pn:2,pattern:"reveal+ that S+ V",meaning:"사실을 밝히다",example:"Tests revealed that there were no disease microbes in the soil.",trans:"검사 결과 토양에 병원균이 없다는 것이 **밝혀졌다**."},
  {id:947,vn:292,verb:"require",pn:1,pattern:"require+ 명사",meaning:"~을 요구하다, 필요로 하다",example:"The matter requires utmost care.",trans:"그 문제는 최대한의 주의를 **요한다**."},
  {id:948,vn:292,verb:"require",pn:2,pattern:"require+ 명사+ to VR",meaning:"‘명사’에게 ~ 할 것을 요구하다",example:"You are required to report to the police.",trans:"당신은 경찰에 신고하도록 **요구받고 있다**."},
  {id:949,vn:292,verb:"require",pn:3,pattern:"require+ that S+ should + VR",meaning:"~해야 한다고 요구하다",example:"The situation requires that this be done immediately.",trans:"상황상 이것을 즉시 **해야 한다**."},
  {id:950,vn:292,verb:"require",pn:4,pattern:"require+ to VR",meaning:"~할 것을 필요로 하다",example:"He requires to be warned against drinking.",trans:"그는 음주에 대한 경고를 **받을 필요가 있다**."},
  {id:951,vn:292,verb:"require",pn:5,pattern:"require+ V-ing",meaning:"~할 필요가 있다(수동 관계)",example:"The young seedlings require looking after carefully.",trans:"어린 묘목은 세심하게 **돌봐야 한다**."},
  {id:952,vn:293,verb:"run",pn:1,pattern:"자동사 run",meaning:"달리다, 뻗어나가다, 흐르다, 움직이다, 계속되다",example:"Can you run as fast as Mike?",trans:"당신은 마이크만큼 빨리 **달릴 수** 있습니까?"},
  {id:953,vn:293,verb:"run",pn:2,pattern:"run+ 형용사(보어)",meaning:"어떤 상태로 변하다",example:"The sea ran high.",trans:"바다가 거세게 **일렁였다**."},
  {id:954,vn:293,verb:"run",pn:3,pattern:"run+ 명사",meaning:"경영하다, 관리하다, 지휘하다, 부어넣다, 몰다",example:"Oil is important to run various machines.",trans:"석유는 다양한 기계를 **가동하는** 데 중요하다."},
  {id:955,vn:294,verb:"raise",pn:1,pattern:"raise+ 명사",meaning:"세우다, 올리다, 승진시키다, 기르다, 모으다",example:"Raise your right hand if you know the answer.",trans:"답을 알면 오른손을 **드세요**."},
  {id:956,vn:294,verb:"raise",pn:2,pattern:"raise+ 포위, 금지와 관련된 명사",meaning:"해제하다, 풀다",example:"Our soldiers raised the siege of the fort.",trans:"우리 병사들은 요새의 포위를 **풀었다**."},
  {id:957,vn:295,verb:"reach",pn:1,pattern:"reach+ 명사",meaning:"도착하다, 도달하다, 이르다, 뻗다, 내밀다, 연락하다",example:"Have you reached the end of the first chapter?",trans:"첫 번째 챕터의 끝까지 **읽었습니까**?"},
  {id:958,vn:295,verb:"reach",pn:2,pattern:"자동사 reach",meaning:"손을 뻗다, 애쓰다, 범위가 미치다",example:"The boy reached out for the branch.",trans:"소년은 나뭇가지를 향해 손을 **뻗었다**."},
  {id:959,vn:296,verb:"read",pn:1,pattern:"read+ 명사",meaning:"읽다, 풀어내다",example:"She seldom reads newspapers.",trans:"그녀는 신문을 거의 **읽지** 않는다."},
  {id:960,vn:296,verb:"read",pn:2,pattern:"read+ 명사(I.O)+ 명사(D.O)",meaning:"’I.O’에게 ‘D.O’를 읽어주다",example:"He always wants to read us poems.",trans:"그는 항상 우리에게 시를 **읽어주고** 싶어한다."},
  {id:961,vn:296,verb:"read",pn:3,pattern:"read+ 명사",meaning:"읽히다, 파악되다",example:"The thermometer reads 6 degrees.",trans:"온도계가 6도를 **가리키고 있다**."},
  {id:962,vn:296,verb:"read",pn:4,pattern:"자동사 read",meaning:"독서하다, 읽어서 알다, 읽히다, 쓰여 있다",example:"I have no time to read.",trans:"나는 **읽을** 시간이 없다."},
  {id:963,vn:297,verb:"recall",pn:1,pattern:"recall+ 명사",meaning:"소환하다, 취소하다, 상기하다",example:"The story recalled old faces to my mind.",trans:"그 이야기는 내 마음속에 옛 얼굴들을 **떠올리게 했다**."},
  {id:964,vn:297,verb:"recall",pn:2,pattern:"recall+ V-ing/ that S+ V",meaning:"상기하다",example:"I can not recall what was said then.",trans:"나는 그때 무슨 말이 있었는지 **기억할 수 없다**."},
  {id:965,vn:298,verb:"reckon",pn:1,pattern:"reckon+ 명사",meaning:"세다, 계산 하다",example:"Reckon the cost of the trip before you leave.",trans:"떠나기 전에 여행 경비를 **계산해라**."},
  {id:966,vn:298,verb:"reckon",pn:2,pattern:"reckon+ 명사+ 명사(보어)/ to VR(보어)",meaning:"‘명사’를 ~으로 간주하다",example:"I reckon him the best teacher in instructing English.",trans:"나는 그를 영어 교육에서 최고의 선생님으로 **여긴다**."},
  {id:967,vn:298,verb:"reckon",pn:3,pattern:"reckon+ that S+ V",meaning:"생각하다",example:"I reckon that he is well over sixty.",trans:"나는 그가 예순을 훨씬 넘었다고 **생각한다**."},
  {id:968,vn:298,verb:"reckon",pn:4,pattern:"자동사 reckon",meaning:"생각하다, 상상하다, 기대하다",example:"I am not reckoning on his help.",trans:"나는 그의 도움을 **기대하고 있지 않다**."},
  {id:969,vn:299,verb:"recommend",pn:1,pattern:"recommend+ 명사",meaning:"추천하다, 마음에 들게 하다",example:"He recommended the young man to us.",trans:"그는 그 젊은이를 우리에게 **추천했다**."},
  {id:970,vn:299,verb:"recommend",pn:2,pattern:"recommend+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 추천하다",example:"Can you recommend me a nice gardener?",trans:"좋은 정원사를 한 명 **추천해** 줄 수 있나요?"},
  {id:971,vn:299,verb:"recommend",pn:3,pattern:"recommend+ 명사+ to VR",meaning:"‘명사’에게 ~ 할 것을 권고하다",example:"The druggist has recommended me to try this ointment for sunburn.",trans:"약사가 햇볕으로 인한 화상에 이 연고를 써보라고 **권해 주었다**."},
  {id:972,vn:299,verb:"recommend",pn:4,pattern:"recommend+ that S+ should VR",meaning:"~해야 한다고 권하다",example:"The committee recommends that the prisoner be released.",trans:"위원회는 그 죄수를 석방할 것을 **권고한다**."},
  {id:973,vn:300,verb:"reconcile",pn:1,pattern:"reconcile+ 명사",meaning:"화해시키다, 조정하다",example:"The boys were soon reconciled.",trans:"그 소년들은 곧 **화해했다**."},
  {id:974,vn:300,verb:"reconcile",pn:2,pattern:"reconcile A with B",meaning:"A와 B를 화해시키다, 일치시키다",example:"What he said could not be reconciled with what he did.",trans:"그가 한 말은 그가 한 행동과 **일치시킬 수 없었다**."},
  {id:975,vn:301,verb:"recover",pn:1,pattern:"recover+ 명사",meaning:"되찾다, 회복하다, 벌충하다",example:"He is recovering his courage.",trans:"그는 용기를 **되찾고 있다**."},
  {id:976,vn:301,verb:"recover",pn:2,pattern:"자동사 recover",meaning:"회복하다, 되찾다",example:"The patient recovered quickly.",trans:"그 환자는 빨리 **회복했다**."},
  {id:977,vn:302,verb:"reduce",pn:1,pattern:"be reduced to+ 명사/ V-ing",meaning:"할 수 없이 ~상태에 이르다",example:"The rebels were reduced to submission.",trans:"반란군은 굴복하도록 **강요당했다**."},
  {id:978,vn:302,verb:"reduce",pn:2,pattern:"reduce+ 명사",meaning:"줄이다, 축소시키다",example:"We have reduced our expenditure almost to nothing.",trans:"우리는 지출을 거의 없는 수준으로 **줄였다**."},
  {id:979,vn:303,verb:"reflect",pn:1,pattern:"reflect+ 명사",meaning:"반사하다, 반영하다",example:"The pavement reflected the heat.",trans:"포장도로는 열기를 **반사했다**."},
  {id:980,vn:303,verb:"reflect",pn:2,pattern:"reflect+ that S+ V",meaning:"숙고하다",example:"She reflected that she was no longer wanted.",trans:"그녀는 자신이 더 이상 필요 없는 존재가 되었다고 **생각했다**."},
  {id:981,vn:304,verb:"regard",pn:1,pattern:"regard+ 명사",meaning:"간주하다, 보다, 대하다, 고려하다, 참작하다, 관련되다",example:"It did not regard me at all.",trans:"그것은 나와는 전혀 **관계가 없었다**."},
  {id:982,vn:305,verb:"rejoice",pn:1,pattern:"rejoice+ 명사",meaning:"~을 기쁘게 하다",example:"It rejoiced my heart to hear that my son had passed the test.",trans:"아들이 시험에 합격했다는 소식을 듣고 내 마음이 **기뻤다**."},
  {id:983,vn:305,verb:"rejoice",pn:2,pattern:"rejoice+ that S+ V",meaning:"~사실에 기뻐하다",example:"He rejoiced that they had been reconciled.",trans:"그는 그들이 화해했다는 것에 **기뻐했다**."},
  {id:984,vn:305,verb:"rejoice",pn:3,pattern:"rejoice+ to VR",meaning:"~해서 기쁘다",example:"He rejoice to remain.",trans:"그는 머물게 되어 **기뻐했다**."},
  {id:985,vn:305,verb:"rejoice",pn:4,pattern:"rejoice at, over+ 명사",meaning:"~에 기뻐하다",example:"He rejoiced at the news of my victory.",trans:"그는 나의 승리 소식에 **기뻐했다**."},
  {id:986,vn:306,verb:"relate",pn:1,pattern:"relate+ 명사",meaning:"~를 말하다",example:"Tom related to his parents some amusing stories about his classmates.",trans:"톰은 부모님께 반 친구들에 대한 재미있는 이야기 몇 가지를 **들려드렸다**."},
  {id:987,vn:306,verb:"relate",pn:2,pattern:"relate A with(to) B",meaning:"A와 B를 연관시키다",example:"We cannot relate these results with any particular cause.",trans:"우리는 이 결과들을 어떤 특정한 원인과 **연관지을 수 없다**."},
  {id:988,vn:307,verb:"relax",pn:1,pattern:"relax+ 명사",meaning:"~을 늦추다",example:"I relaxed my grip on the rope.",trans:"나는 밧줄을 잡은 손의 힘을 **늦췄다**."},
  {id:989,vn:307,verb:"relax",pn:2,pattern:"자동사 relax",meaning:"누그러지다, 편해지다, 쉬다",example:"You had better take a day or two off and relax.",trans:"하루 이틀 쉬면서 **긴장을 풀어라**."},
  {id:990,vn:308,verb:"remark",pn:1,pattern:"remark+ 명사",meaning:"~을 알아차리다, 주의하여 보다, 말하다",example:"I remarked the unpleasant odor as soon as I entered the barn.",trans:"나는 헛간에 들어서자마자 불쾌한 냄새를 **알아챘다**."},
  {id:991,vn:308,verb:"remark",pn:2,pattern:"remark+ that S+ V",meaning:"알아차리다, 말하다",example:"I remarked that she was bewildered.",trans:"나는 그녀가 당황해하고 있다고 **말했다**."},
  {id:992,vn:309,verb:"remember",pn:1,pattern:"remember+ 명사/ V-ing/ that S+ V",meaning:"기억하다",example:"I don’t remember her nave.",trans:"나는 그녀의 이름이 **기억나지 않는다**."},
  {id:993,vn:309,verb:"remember",pn:2,pattern:"remember+ to VR",meaning:"~해야 할 것을 기억하다",example:"I suppose that you didn’t remember to pay the electric light bill.",trans:"당신이 전기요금 내는 것을 **잊었던** 것 같다."},
  {id:994,vn:310,verb:"render",pn:1,pattern:"render+ 명사+ 형용사",meaning:"‘명사’를 ~한 상태로 만들다",example:"His wealth renders him important.",trans:"그의 재산은 그를 중요한 사람으로 **만든다**."},
  {id:995,vn:310,verb:"render",pn:2,pattern:"render+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 해주다, 치르다, 바치다",example:"What service did he render you?",trans:"그는 당신에게 어떤 도움을 **제공했습니까**?"},
  {id:996,vn:310,verb:"render",pn:3,pattern:"render+ 명사",meaning:"제출하다, 표현하다, 묘사하다",example:"The piece of music was well rendered.",trans:"그 음악은 잘 **연주되었다**."},
  {id:997,vn:311,verb:"repent",pn:1,pattern:"repent+ 명사/ V-ing/ that S+ V",meaning:"후회하다",example:"I repent having offended my sister",trans:"나는 여동생에게 상처를 준 것을 **후회한다**."},
  {id:998,vn:311,verb:"repent",pn:2,pattern:"repent of+ 명사",meaning:"후회하다",example:"He had nothing to repent of.",trans:"그는 후회할 것이 아무것도 **없었다**."},
  {id:999,vn:312,verb:"represent",pn:1,pattern:"represent+ 명사",meaning:"묘사하다, 나타내다, 대표하다",example:"This painting represents a hunting scene.",trans:"이 그림은 사냥 장면을 **묘사하고 있다**."},
  {id:1000,vn:312,verb:"represent",pn:2,pattern:"represent+ 명사/ that S+ V",meaning:"지적하다, 설명하다",example:"I represented that the plan was impracticable.",trans:"나는 그 계획이 실행 불가능하다고 **주장했다**."},
  {id:1001,vn:312,verb:"represent",pn:3,pattern:"request+ 명사",meaning:"요청하다",example:"We request the honor of your company.",trans:"우리는 당신의 참석을 **요청하는** 영광을 바랍니다."},
  {id:1002,vn:312,verb:"represent",pn:4,pattern:"request+ to VR",meaning:"~할 것을 요청하다",example:"I request to be informed of the current affairs.",trans:"나는 현재 상황에 대해 알려주시기를 **요청합니다**."},
  {id:1003,vn:312,verb:"represent",pn:5,pattern:"request+ that S+ should+ VR",meaning:"~해야 한다고 요청하다",example:"He requested that the error be corrected.",trans:"그는 오류를 수정해 달라고 **요청했다**."},
  {id:1004,vn:312,verb:"represent",pn:6,pattern:"request+ 명사+ to VR",meaning:"‘명사’ 에게 ~할 것을 요구하다",example:"I must request you to hold your tongue.",trans:"나는 당신에게 입을 다물어 달라고 **요청해야겠습니다**."},
  {id:1005,vn:313,verb:"resent",pn:1,pattern:"resent+ 명사",meaning:"~에 분개하다",example:"We must resent child abuse.",trans:"우리는 아동 학대에 **분개해야 한다**."},
  {id:1006,vn:313,verb:"resent",pn:2,pattern:"resent+ V-ing",meaning:"~하는 것에 분개하다",example:"Would your husband resent my being with you here?",trans:"당신 남편은 내가 여기서 당신과 함께 있는 것을 **불쾌하게 여기겠습니까**?"},
  {id:1007,vn:314,verb:"reserve",pn:1,pattern:"reserve+ 명사",meaning:"다음 번 용도를 위해 간직하다",example:"Reserve some milk for tomorrow.",trans:"내일을 위해 우유를 조금 **남겨 두어라**."},
  {id:1008,vn:314,verb:"reserve",pn:2,pattern:"reserve+ 명사",meaning:"따로 지정하다, 예약하다, 보류하다, 유보하다",example:"I recommend you to reserve the judgment until next week.",trans:"다음 주까지 판단을 **보류할** 것을 권합니다."},
  {id:1009,vn:314,verb:"reserve",pn:3,pattern:"명사 reserve",meaning:"비축, 예비군, 보호지, 자제",example:"He took another dish of the chicken noodle soup without reserve.",trans:"그는 거리낌 없이 닭고기 국수 수프를 한 그릇 더 **먹었다**."},
  {id:1010,vn:315,verb:"resign",pn:1,pattern:"resign+ 명사",meaning:"사임하다, 단념하다, 양도하다, 맡기다",example:"He resigned his post as headmaster.",trans:"그는 교장직을 **사임했다**."},
  {id:1011,vn:315,verb:"resign",pn:2,pattern:"자동사 resign",meaning:"물러나다",example:"The cabinet has resigned to answer for the misguided policies.",trans:"내각은 잘못된 정책에 책임을 지고 **총사퇴했다**."},
  {id:1012,vn:316,verb:"rest",pn:1,pattern:"자동사 rest",meaning:"쉬다, 죽다, 움직이지 않다, 가만히 있다",example:"We have now let the field rest for its recovery from malnutrition.",trans:"우리는 이제 영양 고갈에서 회복될 수 있도록 그 밭을 **묵혀 두었다**."},
  {id:1013,vn:316,verb:"rest",pn:2,pattern:"rest on",meaning:"기대다, 걸려 있다, 위치하다",example:"I saw a shadow rest on her face.",trans:"나는 그늘이 그녀의 얼굴 위에 **드리우는** 것을 보았다."},
  {id:1014,vn:316,verb:"rest",pn:3,pattern:"rest+ 명사",meaning:"쉬게 하다, 두다, 놓다",example:"He stopped to rest his horse after the long gallop.",trans:"그는 오랜 질주 끝에 말을 **쉬게 하려고** 멈춰 섰다."},
  {id:1015,vn:317,verb:"rid",pn:1,pattern:"rid A of B",meaning:"A에게서 B를 제거하다",example:"We must rid the mill of rats.",trans:"우리는 제분소에서 쥐를 **없애야** 한다."},
  {id:1016,vn:317,verb:"rid",pn:2,pattern:"get rid of",meaning:"~을 면하다, 벗어나다, 제거하다",example:"Patients can hardly get rid of the influenza.",trans:"환자들은 독감을 좀처럼 **떨쳐내지** 못한다."},
  {id:1017,vn:318,verb:"ring",pn:1,pattern:"ring+ 종, 방울",meaning:"울리다, 치다, 마음을 흔들다, 심금을 울리다",example:"His speech could ring bells and everybody donated his or her blood for the wounded soldiers.",trans:"그의 연설은 사람들의 마음을 **울렸고**, 모두가 부상병들을 위해 헌혈을 **했다**."},
  {id:1018,vn:318,verb:"ring",pn:2,pattern:"ring up",meaning:"전화 걸다",example:"I’ll ring you up again tomorrow morning, so don’t give me a ring today.",trans:"내일 아침 다시 전화를 **드릴** 테니 오늘은 저에게 전화하지 마세요."},
  {id:1019,vn:318,verb:"ring",pn:3,pattern:"ring+ 목적어",meaning:"에워싸다, 원을 그리다",example:"The singer was ringed about with the excited girls.",trans:"그 가수는 흥분한 소녀들에게 **둘러싸였다**."},
  {id:1020,vn:318,verb:"ring",pn:4,pattern:"자동사 ring",meaning:"울리다",example:"The morning bell is ringing.",trans:"아침 종이 **울리고** 있다."},
  {id:1021,vn:318,verb:"ring",pn:5,pattern:"ring+ 보어",meaning:"~처럼 들리다",example:"The orator’s words rang hollow.",trans:"연설가의 말은 공허하게 **울렸다**."},
  {id:1022,vn:319,verb:"rise",pn:1,pattern:"자동사 rise",meaning:"오르다, 솟아나다, 부풀다",example:"The curtain rises and the actors and actresses stand hand in hand.",trans:"막이 **오르고** 배우들이 손에 손을 잡고 **서 있다**."},
  {id:1023,vn:319,verb:"rise",pn:2,pattern:"자동사 rise",meaning:"기상하다, 일어나다",example:"I rose to shake hands with him.",trans:"나는 그와 악수를 하려고 **일어섰다**."},
  {id:1024,vn:320,verb:"rob",pn:1,pattern:"rob A of B",meaning:"A에게서 B를 털다, 빼앗다",example:"The shock robbed him of his speech.",trans:"그 충격으로 그는 말문이 **막혔다**."},
  {id:1025,vn:321,verb:"roll",pn:1,pattern:"자동사 roll",meaning:"구르다, 굴러가다, 흔들리다",example:"The coin fell off my hand and rolled under the table.",trans:"동전이 내 손에서 **떨어져** 테이블 아래로 **굴러갔다**."},
  {id:1026,vn:321,verb:"roll",pn:2,pattern:"roll+ 명사",meaning:"굴리다, 말다",example:"The children were rolling a snowball along the playground.",trans:"아이들은 운동장에서 눈덩이를 **굴리고** 있었다."},
  {id:1027,vn:322,verb:"rule",pn:1,pattern:"rule+ 명사",meaning:"지배하다, 다스리다",example:"Don’t be ruled by your passion in this matter.",trans:"이 문제에서 감정에 **휘둘리지** 마라."},
  {id:1028,vn:322,verb:"rule",pn:2,pattern:"rule+ that S+ V",meaning:"판결하다",example:"The supreme court ruled that the evidence was admissible.",trans:"대법원은 그 증거가 증거 능력이 있다고 **판결했다**."},
  {id:1029,vn:322,verb:"rule",pn:3,pattern:"rule out+ 목적어",meaning:"배제하다",example:"Men in military uniform should be ruled out on my property.",trans:"군복을 입은 사람들은 내 소유지에서 **배제되어야** 한다."},
  {id:1030,vn:323,verb:"rush",pn:1,pattern:"자동사 rush",meaning:"돌진하다",example:"Fools rush in where angels fear to tread.",trans:"천사들이 두려워 **꺼리는** 곳에 바보들이 **뛰어든다**."},
  {id:1031,vn:323,verb:"rush",pn:2,pattern:"rush+ 명사",meaning:"돌진시키다, 몰아세우다, 재촉하다, 서둘러 향하다",example:"I don’t want to rush you but this is an important matter.",trans:"재촉하고 싶지는 않지만 이것은 중요한 문제입니다."},
  {id:1032,vn:324,verb:"save",pn:1,pattern:"save+ 명사",meaning:"목숨 등을 구하다, 버리지 않고 모아두다, 절약하다, 수고 등을 덜어주다",example:"The national health system saved him from becoming a cripple.",trans:"국가 의료 제도 덕분에 그는 장애인이 되는 것을 **면했다**."},
  {id:1033,vn:324,verb:"save",pn:2,pattern:"save+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 덜게 해주다",example:"That will save me much trouble.",trans:"그것 덕분에 나는 많은 수고를 **덜게 될** 것이다."},
  {id:1034,vn:325,verb:"say",pn:1,pattern:"say+ 명사/ that S+ V",meaning:"말하다",example:"It says ‘no swimming’.",trans:"'수영 금지'라고 **쓰여** 있다."},
  {id:1035,vn:325,verb:"say",pn:2,pattern:"It is said that S+ V",meaning:"~라고 말해진다",example:"It is said that we are going to have a cool summer.",trans:"올여름은 서늘할 것이라고 **한다**."},
  {id:1036,vn:325,verb:"say",pn:3,pattern:"be said to VR",meaning:"~하다고 말해진다",example:"He is said to have betrayed his friend and deserted his fatherland.",trans:"그는 친구를 **배신하고** 조국을 **버렸다고** 한다."},
  {id:1037,vn:326,verb:"search",pn:1,pattern:"search+ 명사",meaning:"수색하다, 뒤지다",example:"The police searched his house for the knife with which he could possibly kill her.",trans:"경찰은 그녀를 살해하는 데 사용되었을지도 모를 칼을 찾아 그의 집을 **수색했다**."},
  {id:1038,vn:326,verb:"search",pn:2,pattern:"search for",meaning:"~을 찾다 be in search of: ~을 찾다 search into: ~안까지 뒤지다 search after: ~을 찾다 search through: 샅샅이 뒤지다",example:"Birds search for a good breeding ground here every summer.",trans:"새들은 매년 여름 이곳에서 좋은 번식지를 **찾는다**."},
  {id:1039,vn:327,verb:"seek",pn:1,pattern:"seek+ 명사",meaning:"찾으려 하다",example:"I’ve been seeking truth all through my life.",trans:"나는 평생 진리를 **추구해 왔다**."},
  {id:1040,vn:327,verb:"seek",pn:2,pattern:"seek+ to VR",meaning:"~하려고 애쓰다",example:"They seek to eliminate the discrimination among those racial groups.",trans:"그들은 그 인종 집단들 사이의 차별을 **철폐하려 한다**."},
  {id:1041,vn:327,verb:"seek",pn:3,pattern:"seek for, seek after",meaning:"추구하다",example:"He is seeking for money and power alike.",trans:"그는 돈과 권력을 똑같이 **좇고 있다**."},
  {id:1042,vn:328,verb:"serve",pn:1,pattern:"serve+ 명사",meaning:"제공하다, 섬기다, 봉사하다, 충족시키다",example:"This hotel serves meals to residents only.",trans:"이 호텔은 투숙객에게만 식사를 **제공한다**."},
  {id:1043,vn:328,verb:"serve",pn:2,pattern:"served+ 명사",meaning:"음식을 제공하다",example:"Steak is served with potatoes and some sauce.",trans:"스테이크는 감자와 소스와 함께 **제공된다**."},
  {id:1044,vn:328,verb:"serve",pn:3,pattern:"serve+ 명사+ well, ill, right, wrong",meaning:"다루다",example:"It serves him right.",trans:"그것은 그가 **자업자득이다**."},
  {id:1045,vn:328,verb:"serve",pn:4,pattern:"자동사 serve",meaning:"섬기다, 봉사하다, 근무하다, 시중들다, 제 구실을 하다",example:"Robert serves as a clerk in a bank.",trans:"Robert는 은행에서 직원으로 **근무한다**."},
  {id:1046,vn:328,verb:"serve",pn:5,pattern:"serve+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 대접하다",example:"I served him a plate of doughnuts.",trans:"나는 그에게 도넛 한 접시를 **내놓았다**."},
  {id:1047,vn:329,verb:"set",pn:1,pattern:"set+ 명사",meaning:"두다, 놓다, 배치하다, 설치하다, 준비시키다, 정하다",example:"We do not set the price until we are informed of the demand situation.",trans:"우리는 수요 상황을 통보받기 전까지 가격을 **정하지 않는다**."},
  {id:1048,vn:329,verb:"set",pn:2,pattern:"set+ 명사+ 형용사(O.C)",meaning:"어떤 상태로 만들다, 되게 하다",example:"He always tried to send me right and I owe what I am today to him.",trans:"그는 항상 나를 올바른 길로 **이끌어 주려 했고**, 오늘의 내가 있는 것은 그 덕분이다."},
  {id:1049,vn:329,verb:"set",pn:3,pattern:"set+ 명사+ to VR",meaning:"‘명사’ 에게 ~하도록 시키다",example:"I set my children to rake the fallen leaves.",trans:"나는 아이들에게 낙엽을 긁어모으도록 **시켰다**."},
  {id:1050,vn:329,verb:"set",pn:4,pattern:"set+ oneself+ to VR",meaning:"~하려고 힘쓰다",example:"I set myself to serve him.",trans:"나는 그를 섬기기로 **마음먹었다**."},
  {id:1051,vn:329,verb:"set",pn:5,pattern:"자동사 set",meaning:"지다, 가라앉다, 기울다, 응고되다, 굳어지다",example:"The moon will soon set and we can escape under the cover of darkness.",trans:"달이 곧 **질 것이고** 우리는 어둠을 틈타 탈출할 수 있다."},
  {id:1052,vn:329,verb:"set",pn:6,pattern:"set about",meaning:"착수하다, 공격하다, 퍼뜨리다",example:"When will you set about the job?",trans:"그 일을 언제 **시작할** 것입니까?"},
  {id:1053,vn:329,verb:"set",pn:7,pattern:"set apart, set aside",meaning:"따로 떼어놓다, 구별하다",example:"I will set apart some of my income to set about the business.",trans:"나는 그 사업을 시작하기 위해 수입 일부를 **따로 **떼어 놓겠다**."},
  {id:1054,vn:329,verb:"set",pn:8,pattern:"set up",meaning:"세우다, 초래하다",example:"He is determined to set up a school.",trans:"그는 학교를 **설립하기로** 결심했다."},
  {id:1055,vn:329,verb:"set",pn:9,pattern:"set off",meaning:"돋보이게 하다, 출발하다, 상쇄시키다",example:"He wants to set off money against lack of intellect.",trans:"그는 지적 능력의 부족을 돈으로 **메우려 한다**."},
  {id:1056,vn:330,verb:"see",pn:1,pattern:"see+ 명사",meaning:"보다, 이해하다, 만나다",example:"I haven’t seen her since graduation.",trans:"나는 졸업 이후로 그녀를 **보지 못했다**."},
  {id:1057,vn:330,verb:"see",pn:2,pattern:"see+ that S+ V",meaning:"이해하다, 조처하다, 파악하다",example:"See to it that all the doors and windows are shut.",trans:"모든 문과 창문이 닫혀 있도록 **확인해라**."},
  {id:1058,vn:330,verb:"see",pn:3,pattern:"see+ 명사+ VR(V-ing)",meaning:"‘명사’가 ~하는 것을 보다, 인내하며 보다",example:"I can’t see him behaving like that.",trans:"나는 그가 그런 식으로 행동하리라고는 **상상할 수 없다**."},
  {id:1059,vn:330,verb:"see",pn:4,pattern:"see off",meaning:"배웅하다",example:"I have been to the station to see off my boss.",trans:"나는 상사를 **배웅하러** 역에 **갔다 왔다**."},
  {id:1060,vn:330,verb:"see",pn:5,pattern:"see through",meaning:"뚫어 보다, 터득하다, 타개하다",example:"He can see through my mind.",trans:"그는 내 마음속을 **꿰뚫어 볼 수 있다**."},
  {id:1061,vn:330,verb:"see",pn:6,pattern:"see A as B",meaning:"A를 B로 보다",example:"I refused to see him as our representative.",trans:"나는 그를 우리 대표로 **인정하기를 거부했다**."},
  {id:1062,vn:331,verb:"shift",pn:1,pattern:"shift+ 명사",meaning:"옮기다, 바꾸다",example:"I shift heavy bundles between both my hands when I have to carry one.",trans:"나는 무거운 짐을 들고 가야 할 때 양손을 번갈아 가며 **옮겨 잡는다**."},
  {id:1063,vn:331,verb:"shift",pn:2,pattern:"자동사 shift",meaning:"바뀌다, 옮겨지다",example:"He shifted from place to place to get a part time job.",trans:"그는 아르바이트를 구하려고 이곳저곳을 **전전했다**."},
  {id:1064,vn:332,verb:"show",pn:1,pattern:"show+ 명사, 명사절",meaning:"보여주다, 나타내다, 상영하다",example:"What do you say to seeing the movie which is shown at the cinema?",trans:"극장에서 상영 중인 그 영화를 보러 가는 게 어때요?"},
  {id:1065,vn:332,verb:"show",pn:2,pattern:"show+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 보여주다",example:"He showed me a great deal of friendliness.",trans:"그는 나에게 매우 친절하게 **대해 주었다**."},
  {id:1066,vn:332,verb:"show",pn:3,pattern:"show around",meaning:"구경시키다",example:"The headmaster himself will show you around the school.",trans:"교장 선생님께서 직접 학교를 **안내해 드릴 것입니다**."},
  {id:1067,vn:332,verb:"show",pn:4,pattern:"show off",meaning:"자랑하다, 과시하다, 돋보이다",example:"Mothers in the world will show off their children.",trans:"세상의 모든 어머니들은 자기 자녀를 **자랑하려 한다**."},
  {id:1068,vn:332,verb:"show",pn:5,pattern:"show up",meaning:"등장하다, 폭로하다",example:"We invited him to the ceremony but he didn’t show up.",trans:"우리는 그를 행사에 초대했지만 그는 **나타나지 않았다**."},
  {id:1069,vn:332,verb:"show",pn:6,pattern:"자동사 show",meaning:"보이다, 알려지다",example:"His embarrassment showed in his face.",trans:"그의 당혹감이 얼굴에 **드러났다**."},
  {id:1070,vn:333,verb:"sign",pn:1,pattern:"sign+ 명사",meaning:"~에 서명하다",example:"Please sign your name upon the back of the check.",trans:"수표 뒷면에 서명을 **해 주십시오**."},
  {id:1071,vn:333,verb:"sign",pn:2,pattern:"sign+ 명사+ to VR",meaning:"‘명사’ 에게 ~하라고 신호하다",example:"The door keep signed the tramps to get out of the hotel.",trans:"문지기는 부랑자들에게 호텔에서 나가라고 **손짓했다**."},
  {id:1072,vn:333,verb:"sign",pn:3,pattern:"sign+ that S+ V",meaning:"알리다, 신호하다",example:"He signed that he was ready to go.",trans:"그는 떠날 준비가 되었다고 **신호를 보냈다**."},
  {id:1073,vn:333,verb:"sign",pn:4,pattern:"sign up",meaning:"서명하여 가입하다, 참가하다",example:"Sign up now and enjoy your free meal at the rec center.",trans:"지금 **등록하시면** 레크리에이션 센터에서 무료 식사를 즐기실 수 있습니다."},
  {id:1074,vn:334,verb:"spare",pn:1,pattern:"spare+ 명사",meaning:"용서하다, 살려주다, 절약하다, 나누어주다, 없이 지내다",example:"You are so helpful so I can’t spare you.",trans:"당신은 너무 도움이 되기 때문에 나는 당신 없이는 **안 됩니다**."},
  {id:1075,vn:334,verb:"spare",pn:2,pattern:"spare+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 모면하게 하다, 나누어 주다, 할애하다",example:"Can’t you spare me a few minutes?",trans:"잠깐만 시간을 **내 주실 수 없나요**?"},
  {id:1076,vn:335,verb:"spend",pn:1,pattern:"spend+ 명사",meaning:"소비하다, 쓰다",example:"He spends a lot of money on books.",trans:"그는 책에 돈을 많이 **쓴다**."},
  {id:1077,vn:335,verb:"spend",pn:2,pattern:"spend+ 시간+ (in) V-ing",meaning:"~하면서 시간을 보내다",example:"She spends too much time (in) dressing herself.",trans:"그녀는 옷 **입는 데** 시간을 너무 많이 **보낸다**."},
  {id:1078,vn:336,verb:"speak",pn:1,pattern:"speak+ 언어",meaning:"언어를 말하다",example:"I marveled that you speak Bhutanese.",trans:"나는 당신이 부탄어를 **한다는 것에** 놀랐다."},
  {id:1079,vn:336,verb:"speak",pn:2,pattern:"speak to+ 사람",meaning:"말 걸다, 확증하다",example:"I can speak to his having been there.",trans:"나는 그가 거기 있었다는 것을 **보증할 수 있다**."},
  {id:1080,vn:336,verb:"speak",pn:3,pattern:"speak + 명사",meaning:"~를 말하다",example:"His conduct speaks his dishonesty.",trans:"그의 행동은 그의 부정직함을 **드러낸다**."},
  {id:1081,vn:336,verb:"speak",pn:4,pattern:"자동사 speak",meaning:"말로써 전달하다, 연설하다",example:"Do you mind speaking more slowly?",trans:"좀 더 천천히 **말씀해 주시겠어요**?"},
  {id:1082,vn:336,verb:"speak",pn:5,pattern:"speak of, speak about",meaning:"관하여 말하다",example:"Speaking of the devil, he will appear.",trans:"호랑이도 제 말 하면 **온다더니**."},
  {id:1083,vn:336,verb:"speak",pn:6,pattern:"speak of A as B",meaning:"A를 B로 일컫다",example:"Language is often spoken of as a living organism.",trans:"언어는 흔히 살아 있는 유기체로 **일컬어진다**."},
  {id:1084,vn:337,verb:"stand",pn:1,pattern:"자동사 stand",meaning:"서다, 서서 존재하다, 현상을 유지하다",example:"The rule still stands.",trans:"그 규칙은 여전히 **유효하다**."},
  {id:1085,vn:337,verb:"stand",pn:2,pattern:"stand+ 보어",meaning:"상태가 되어 있다",example:"The contract will stand good for another year.",trans:"그 계약은 앞으로 1년 더 **유효할 것이다**."},
  {id:1086,vn:337,verb:"stand",pn:3,pattern:"stand+ 명사",meaning:"세우다, 견뎌내다",example:"She won’t stand cold heat, fatigue and nonsense.",trans:"그녀는 추위, 더위, 피로, 그리고 터무니없는 말을 **참지 못한다**."},
  {id:1087,vn:337,verb:"stand",pn:4,pattern:"stand+ V-ing",meaning:"~하는 것을 견뎌내다",example:"He could not stand being flattered.",trans:"그는 아첨을 **받는 것을** 견디지 **못했다**."},
  {id:1088,vn:337,verb:"stand",pn:5,pattern:"stand+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 한 턱 내다",example:"I will stand you a drink.",trans:"나는 당신에게 술 한 잔을 **사겠다**."},
  {id:1089,vn:338,verb:"start",pn:1,pattern:"start+ 명사/ V-ing/ to VR",meaning:"시작하다",example:"I couldn’t start the engine at the right moment.",trans:"나는 적절한 순간에 엔진을 **시동 걸지** 못했다."},
  {id:1090,vn:338,verb:"start",pn:2,pattern:"자동사 start",meaning:"시작되다, 출발하다, 생기다, 발생하다",example:"How did the quarrel start?",trans:"그 다툼은 어떻게 **시작되었는가**?"},
  {id:1091,vn:339,verb:"state",pn:1,pattern:"state+명사/ that S+ V",meaning:"말하다, 주장하다",example:"State your own view not their opinions.",trans:"그들의 의견이 아닌 자신의 견해를 **말하라**."},
  {id:1092,vn:340,verb:"succeed",pn:1,pattern:"succeed+ 명사",meaning:"뒤를 잇다",example:"A long silence succeeded his words.",trans:"긴 침묵이 그의 말에 **뒤따랐다**."},
  {id:1093,vn:340,verb:"succeed",pn:2,pattern:"succeed to + 명사/ V-ing",meaning:"계승하다, 이어서 행위를 하다",example:"He is sure to succeed to his father’s estate.",trans:"그는 틀림없이 아버지의 재산을 **상속받을** 것이다."},
  {id:1094,vn:340,verb:"succeed",pn:3,pattern:"succeed in+ 명사/ V-ing",meaning:"성공하다",example:"The first man to succeed in swimming across this channel was a little boy.",trans:"이 해협을 수영으로 **횡단하는** 데 최초로 **성공한** 사람은 어린 소년이었다."},
  {id:1095,vn:341,verb:"suffer",pn:1,pattern:"suffer+ from",meaning:"~로 인하여 괴로워 하다",example:"They will suffer from hunger and air pollution.",trans:"그들은 굶주림과 대기 오염으로 **고통받을** 것이다."},
  {id:1096,vn:341,verb:"suffer",pn:2,pattern:"suffer+ 명사",meaning:"~을 겪다",example:"He suffered the capital punishment for his murder.",trans:"그는 살인죄로 사형을 **받았다**."},
  {id:1097,vn:342,verb:"suggest",pn:1,pattern:"suggest+ that S+ V",meaning:"시사하다, 암시하다, 넌지시 알리다 +should VR: 제안하다",example:"When I suggested a drink, she coughed disapprovingly.",trans:"내가 한잔하자고 **제안했을** 때, 그녀는 못마땅한 듯 **기침을 했다**."},
  {id:1098,vn:342,verb:"suggest",pn:2,pattern:"V+ 명사/ V-ing",meaning:"제안하다",example:"Marry suggested taking a nap after the lunch.",trans:"메리는 점심 후에 낮잠을 자자고 **제안했다**."},
  {id:1099,vn:343,verb:"suppose",pn:1,pattern:"suppose+ S+ V",meaning:"S가 V하다고 가정하다",example:"Let’s suppose that what he said it is true.",trans:"그가 말한 것이 사실이라고 **가정해 보자**."},
  {id:1100,vn:343,verb:"suppose",pn:2,pattern:"S+ be supposed to VR",meaning:"S는 ~하기로 되어 있다(예정, 의무)",example:"You are supposed not to drowse during lessons.",trans:"너는 수업 중에 졸면 안 **되기로 되어 있다**."},
  {id:1101,vn:344,verb:"suspect",pn:1,pattern:"suspect",meaning:"아마 ~일 거라고 의심하다",example:"I suspected that he was with her.",trans:"나는 그가 그녀와 함께 있다고 **의심했다**."},
  {id:1102,vn:344,verb:"suspect",pn:2,pattern:"suspect A of B",meaning:"B의 혐의로 A를 의심하다",example:"Several people have been a suspected of the murder.",trans:"몇몇 사람들이 그 살인 사건의 용의자로 **지목되었다**."},
  {id:1103,vn:345,verb:"seem",pn:1,pattern:"It seems that S+V",meaning:"~처럼 보인다",example:"It seems that he is unable to pay off the that.",trans:"그는 그 빚을 **갚을** 수 없는 것 같다."},
  {id:1104,vn:345,verb:"seem",pn:2,pattern:"S seem to VR",meaning:"~처럼 보인다",example:"He seems to have been ill.",trans:"그는 아팠던 것 같다."},
  {id:1105,vn:345,verb:"seem",pn:3,pattern:"S seem like+ 명사",meaning:"명사 처럼 보이다",example:"",trans:"당신은 나를 며칠 **받아줄** 수 있어?"},
  {id:1106,vn:345,verb:"seem",pn:4,pattern:"S seem as if(though) S+ V",meaning:"마치 ~인 것처럼 보이다",example:"It seems as if he was daydreaming.",trans:"그는 마치 공상에 **잠긴** 것 같다."},
  {id:1107,vn:346,verb:"sell",pn:1,pattern:"S+ sell+ O",meaning:"팔다",example:"He sold a watch at a good price.",trans:"그는 시계를 좋은 가격에 **팔았다**."},
  {id:1108,vn:346,verb:"sell",pn:2,pattern:"S+ sell",meaning:"팔리다",example:"Do you think that the idea will sell?",trans:"그 아이디어가 **팔릴** 것이라고 생각하십니까?"},
  {id:1109,vn:347,verb:"send",pn:1,pattern:"S+ send+ 명(I.O)+ 명(D.O)/ 명(D.O) + to+ 명(I.O)",meaning:"I.O 에게 D.O를 보내다",example:"He send some encouraging massages to all the test takers.",trans:"그는 모든 수험생들에게 응원의 메시지를 **보냈다**."},
  {id:1110,vn:347,verb:"send",pn:2,pattern:"S send for O",meaning:"S는 O를 구하기 위해서 사람을 보내다",example:"He sent for a doctor.",trans:"그는 의사를 **불렀다**."},
  {id:1111,vn:348,verb:"shoot",pn:1,pattern:"shoot out",meaning:"쏘아내다 shoot forth: 앞으로 튀어나오다 shoot up: 위로 튀어 오르다",example:"The trees are shooting out buds.",trans:"나무들이 새순을 **틔우고 있다**."},
  {id:1112,vn:349,verb:"smell",pn:1,pattern:"smell+ 명",meaning:"~을 냄새 맡다",example:"Can a camel smell water a mile off?",trans:"낙타는 1마일 밖에서도 물 냄새를 **맡을** 수 있을까?"},
  {id:1113,vn:349,verb:"smell",pn:2,pattern:"smell+ 형",meaning:"~한 냄새가 나다",example:"The seller’s smell the damped.",trans:"판매자에게서 습한 냄새가 **났다**."},
  {id:1114,vn:349,verb:"smell",pn:3,pattern:"smell like+ 명",meaning:"~같은 냄새가 나다",example:"She smells like a man.",trans:"그녀는 남자 냄새가 **난다**."},
  {id:1115,vn:349,verb:"smell",pn:4,pattern:"smell of",meaning:"~의 냄새가 나다",example:"The room smells of smoke.",trans:"그 방에서는 담배 연기 냄새가 **난다**."},
  {id:1116,vn:350,verb:"soak",pn:1,pattern:"soak+ 명사",meaning:"담그다, 적시다, 액체를 빨아 들이다",example:"He soaked up knowledge like sponges readily soak up water.",trans:"그는 스펀지가 물을 쉽게 **흡수하듯** 지식을 **흡수했다**."},
  {id:1117,vn:350,verb:"soak",pn:2,pattern:"자동사 soak",meaning:"젖다, 물에 잠기다",example:"She let the clothes soak in soapy water.",trans:"그녀는 옷을 비눗물에 **담가 두었다**."},
  {id:1118,vn:351,verb:"sound",pn:1,pattern:"sound+ 명사",meaning:"소리 나게 하다",example:"Do not sound’h’ in the word ‘honest’.",trans:"'honest'라는 단어에서 'h'는 **발음하지 마라**."},
  {id:1119,vn:351,verb:"sound",pn:2,pattern:"sound+ 형용사",meaning:"~한 상태로 들리다",example:"That excuse sounds queer and nonsense.",trans:"그 변명은 이상하고 말도 안 되게 **들린다**."},
  {id:1120,vn:351,verb:"sound",pn:3,pattern:"sound like+ 명사/ that S+ V",meaning:"~처럼 들리다, ~하는 것으로 들리다",example:"It sounds like you don’t like it very much.",trans:"당신은 그것을 별로 좋아하지 않는 것 같이 **들린다**."},
  {id:1121,vn:352,verb:"spin",pn:1,pattern:"spin+ 명사",meaning:"실을 잣다, 회전시켜 돌리다",example:"A spider spins a web so beautifully.",trans:"거미는 아주 아름답게 거미줄을 **친다**."},
  {id:1122,vn:352,verb:"spin",pn:2,pattern:"자동사 spin",meaning:"돌다, 고치를 짓다",example:"The wheel began spinning round and round.",trans:"바퀴가 빙글빙글 **돌기 시작했다**."},
  {id:1123,vn:353,verb:"splash",pn:1,pattern:"splash+ 명사",meaning:"물을 튀기다",example:"It splashed about water when it plunged into the river.",trans:"그것이 강으로 뛰어들었을 때 물이 **튀었다**."},
  {id:1124,vn:353,verb:"splash",pn:2,pattern:"자동사 splash",meaning:"물이 튀다, 첨벙 소리를 내며 빠지다",example:"We splashed across the river.",trans:"우리는 강을 철벅거리며 **건넜다**."},
  {id:1125,vn:354,verb:"stay",pn:1,pattern:"자동사 stay",meaning:"머물다",example:"They invited me to stay the night.",trans:"그들은 나를 하룻밤 **머물도록** 초대했다."},
  {id:1126,vn:354,verb:"stay",pn:2,pattern:"stay+ 형용사(보어)",meaning:"상태를 유지하다",example:"If the weather stays fine, I will stay here for another week.",trans:"날씨가 계속 **좋으면**, 나는 여기서 일주일 더 **머물 것이다**."},
  {id:1127,vn:355,verb:"stick",pn:1,pattern:"stick+ 명사",meaning:"찌르다, 꽂아서 고정시키다, 내밀다, 붙이다",example:"He stuck the broken pieces of the china together.",trans:"그는 깨진 도자기 조각들을 **붙였다**."},
  {id:1128,vn:355,verb:"stick",pn:2,pattern:"자동사 stick",meaning:"꽂히다, 들러붙다",example:"The arrow stuck in the tree.",trans:"화살이 나무에 **꽂혔다**."},
  {id:1129,vn:356,verb:"stir",pn:1,pattern:"stir+ 명사",meaning:"움직이다, 휘젓다, 선동하다",example:"She stirred sugar into her coffee.",trans:"그녀는 커피에 설탕을 **넣어 저었다**."},
  {id:1130,vn:356,verb:"stir",pn:2,pattern:"stir+ 명사+ to VR",meaning:"‘명사’를 선동하여 ~하게 하다",example:"Bill stirred the other people to join the misdeed.",trans:"빌은 다른 사람들을 부추겨 나쁜 일에 **가담시켰다**."},
  {id:1131,vn:357,verb:"stock",pn:1,pattern:"stock A with B",meaning:"A에게 B를 비축시키다",example:"They stocked their shop with winter goods.",trans:"그들은 가게에 겨울 상품을 **채워 넣었다**."},
  {id:1132,vn:357,verb:"stock",pn:2,pattern:"자동사 stock",meaning:"사들이다, 구입하다",example:"We must stock up for the winter.",trans:"우리는 겨울을 위해 **비축해 두어야 한다**."},
  {id:1133,vn:358,verb:"strain",pn:1,pattern:"strain+ 명사",meaning:"팽팽하게 하다, 긴장시키다, 겹 지르다, 왜곡하다",example:"Do not strain the rope to the breaking point.",trans:"밧줄이 끊어질 지경까지 **당기지 마라**."},
  {id:1134,vn:359,verb:"strive",pn:1,pattern:"strive+ to VR",meaning:"~하려고 애쓰다",example:"I strove to overcome my physical handicap.",trans:"나는 신체적 장애를 극복하려고 **애썼다**."},
  {id:1135,vn:359,verb:"strive",pn:2,pattern:"strive for, strive after",meaning:"얻으려고 애쓰다",example:"You cannot get all the things that you strive for.",trans:"당신이 **원하는** 모든 것을 얻을 수는 없다."},
  {id:1136,vn:360,verb:"stuff",pn:1,pattern:"stuff A with B",meaning:"A에게 B를 채워 넣다",example:"Mom stuffs boiled chicken with some kind of herbs and rice.",trans:"엄마는 삶은 닭에 허브와 쌀을 **채워 넣는다**."},
  {id:1137,vn:361,verb:"submit",pn:1,pattern:"submit+ 명사",meaning:"복종시키다, 제출하다",example:"We must submit ourselves to God’s will and providence.",trans:"우리는 하나님의 뜻과 섭리에 우리 자신을 **복종시켜야 한다**."},
  {id:1138,vn:361,verb:"submit",pn:2,pattern:"submit to+ 명사",meaning:"감내하다",example:"He was too proud to submit to such treatment.",trans:"그는 너무 자존심이 강해서 그런 대우에 **굴복할** 수 없었다."},
  {id:1139,vn:362,verb:"taste",pn:1,pattern:"taste+ 형용사",meaning:"~한 맛이 나다",example:"Foods with garlic and spices taste good to me.",trans:"마늘과 향신료가 들어간 음식은 나에게 **맛있다**."},
  {id:1140,vn:362,verb:"taste",pn:2,pattern:"taste+ 명사",meaning:"~을 맛보다",example:"Have you ever tasted the sauce made in this restaurant.",trans:"이 식당에서 만든 소스를 **맛본** 적이 있나요?"},
  {id:1141,vn:363,verb:"teach",pn:1,pattern:"teach+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 가르치다",example:"The sufferings taught him the worth of family.",trans:"고난이 그에게 가족의 소중함을 **가르쳐 주었다**."},
  {id:1142,vn:363,verb:"teach",pn:2,pattern:"teach+ 명사+ how to VR",meaning:"~에게 ~하는 법을 가르치다",example:"I am going to teach all of you [how to properly listen to classical music].",trans:"나는 여러분 모두에게 [클래식 음악을 제대로 듣는 방법을] **가르쳐 줄** 것이다."},
  {id:1143,vn:363,verb:"teach",pn:3,pattern:"teach+ 명사+ that S+ V",meaning:"~에게 ~사실을 가르치다",example:"Experience will teach us [that hasty conclusion costs a lot].",trans:"경험이 우리에게 [성급한 결론은 큰 대가를 치른다는 것을] **가르쳐 줄** 것이다."},
  {id:1144,vn:364,verb:"tend",pn:1,pattern:"tend+ 명사",meaning:"보살피다, 돌보다",example:"The shepherd is supposed to tend all the sheep in the flock.",trans:"그 목동은 무리 안의 모든 양들을 **돌보아야** 한다."},
  {id:1145,vn:364,verb:"tend",pn:2,pattern:"tend+ to VR",meaning:"~하는 경향이 있다, ~하는데 도움이 되다",example:"Good health tends to make people cheerful.",trans:"건강하면 사람들이 명랑해지는 **경향이 있다**."},
  {id:1146,vn:364,verb:"tend",pn:3,pattern:"tend+ to 명사",meaning:"~의 경향이 있다, ~의 방향으로 가다",example:"The road tends to the south.",trans:"그 길은 남쪽으로 **뻗어 있다**."},
  {id:1147,vn:365,verb:"tell",pn:1,pattern:"tell+ 명사(I.O)+ 명사(D.O)",meaning:"‘I.O’에게 ‘D.O’를 말하다",example:"She told me her success story.",trans:"그녀는 나에게 자신의 성공담을 **들려주었다**."},
  {id:1148,vn:365,verb:"tell",pn:2,pattern:"tell+ 명사+ to VR",meaning:"~에게 ~하라고 말하다",example:"Tell her to bring in a cup of tea.",trans:"그녀에게 차 한 잔을 가져오라고 **말해라**."},
  {id:1149,vn:365,verb:"tell",pn:3,pattern:"tell+ 명사/ that S+ V",meaning:"제대로 이해하다, 알다",example:"Nobody can tell [what it is].",trans:"아무도 [그것이 무엇인지] **알 수** 없다."},
  {id:1150,vn:365,verb:"tell",pn:4,pattern:"tell A from B",meaning:"A와 B를 구별하다",example:"I can’t tell one twin from the other but their mom can.",trans:"나는 쌍둥이를 서로 **구별할 수** 없지만 그들의 엄마는 **구별할 수** 있다."},
  {id:1151,vn:365,verb:"tell",pn:5,pattern:"자동사 tell",meaning:"말하다, 영향력 있다, 고자질하다, 식별하다, 제대로 알다",example:"He is telling not doing.",trans:"그는 행동하지 않고 말만 **하고 있다**."},
  {id:1152,vn:365,verb:"tell",pn:6,pattern:"tell of, tell about",meaning:"~에 관하여 말하다",example:"The legend tells of the old kingdom which was built on gold hills.",trans:"그 전설은 황금 언덕 위에 세워진 오래된 왕국에 대해 **전하고 있다**."},
  {id:1153,vn:366,verb:"think",pn:1,pattern:"think+ 명사",meaning:"상상하다, 의식하다",example:"They thought no harm in stealing the data.",trans:"그들은 데이터를 훔치는 것을 나쁘다고 **생각하지 않았다**."},
  {id:1154,vn:366,verb:"think",pn:2,pattern:"think+ that S+ V",meaning:"~라고 생각하다",example:"I think [you’re mistaken].",trans:"나는 [당신이 틀렸다고] **생각한다**."},
  {id:1155,vn:366,verb:"think",pn:3,pattern:"think+ 명사+ 명사, 형용사(O.C)",meaning:"‘명사’ 을 ~라고 생각하다",example:"I think him a charming person.",trans:"나는 그가 매력적인 사람이라고 **생각한다**."},
  {id:1156,vn:366,verb:"think",pn:4,pattern:"think+ wh- to VR",meaning:"궁리하다, 생각 하다",example:"I am thinking [what to eat for lunch].",trans:"나는 [점심으로 무엇을 먹을지] **생각하고 있다**."},
  {id:1157,vn:366,verb:"think",pn:5,pattern:"think of, think about",meaning:"~에 대해 생각하다, 생각해 내다",example:"The more she thought about it, the more depressed she became.",trans:"그녀는 그것에 대해 생각하면 할수록 더욱 우울해**졌다**."},
  {id:1158,vn:366,verb:"think",pn:6,pattern:"It is thought that S+ V",meaning:"~라고 생각되다",example:"It was once thought [that the earth was flat and the center of the universe].",trans:"한때 [지구가 평평하고 우주의 중심이라고] **여겨졌다**."},
  {id:1159,vn:366,verb:"think",pn:7,pattern:"be thought to VR",meaning:"~라고 여겨지다",example:"The disease is thought to have originated in the tropics.",trans:"그 병은 열대 지방에서 **발생했다고** **여겨진다**."},
  {id:1160,vn:366,verb:"think",pn:8,pattern:"think of A as B",meaning:"A를 B로 여기다",example:"Sometimes we think of money as everything, which is hardly proven right.",trans:"우리는 때때로 돈이 전부라고 **생각하는데**, 이는 옳다고 **증명되기** 어렵다."},
  {id:1161,vn:367,verb:"try",pn:1,pattern:"try + 명사",meaning:"해보다, 시도하다, 혹사하다, 재판하다, 시험해보다",example:"Try the door and wee whether it’s locked or not.",trans:"문을 **열어 보고** 잠겨 있는지 아닌지 **확인해라**."},
  {id:1162,vn:367,verb:"try",pn:2,pattern:"try to VR",meaning:"~하려고 애쓰다",example:"He is ready to try to behave better.",trans:"그는 더 잘 행동하려고 **노력할** 준비가 되어 있다."},
  {id:1163,vn:367,verb:"try",pn:3,pattern:"try+ V-ing",meaning:"시험 삼아 해보다",example:"He tried setting 2 alarm clocks in order to wake up.",trans:"그는 일어나기 위해 알람시계 2개를 맞춰 **보았다**."},
  {id:1164,vn:367,verb:"try",pn:4,pattern:"try on",meaning:"착용하다",example:"Try a new hat on and wee if it covers your scar properly.",trans:"새 모자를 **써보고** 흉터를 제대로 가리는지 확인해 보세요."},
  {id:1165,vn:368,verb:"turn",pn:1,pattern:"turn 자동사",meaning:"돌다",example:"Eight planets turn around the sun and some have moons turning around them.",trans:"여덟 개의 행성이 태양 주위를 **돌고** 있으며, 일부는 자신 주위를 도는 위성을 **가지고** 있다."},
  {id:1166,vn:368,verb:"turn",pn:2,pattern:"turn+ 명사",meaning:"돌리다",example:"Turn the screw to the left, not to the right when you try to close the valve.",trans:"밸브를 잠그려 할 때 나사를 오른쪽이 아닌 왼쪽으로 **돌려라**."},
  {id:1167,vn:368,verb:"turn",pn:3,pattern:"turn A into B",meaning:"A를 B로 바꾸다",example:"Heat turns ice into water just like cold turns water to ice.",trans:"열이 얼음을 물로 **바꾸듯**, 냉기는 물을 얼음으로 **바꾼다**."},
  {id:1168,vn:368,verb:"turn",pn:4,pattern:"turn to+ 명사",meaning:"~쪽으로 돌다, 선회하다, 방향을 잡다, 의존하다",example:"People turn to organic food when they learn the bad effect of insecticide.",trans:"사람들은 살충제의 해로운 영향을 **알게 되면** 유기농 식품으로 **눈을 돌린다**."},
  {id:1169,vn:368,verb:"turn",pn:5,pattern:"turn+ 나이",meaning:"몇 살로 바뀌다",example:"He will soon turn forty though he looks a lot younger than he really is.",trans:"그는 실제 나이보다 훨씬 젊어 보이지만 곧 마흔이 **될 것이다**."},
  {id:1170,vn:368,verb:"turn",pn:6,pattern:"turn+ 형용사",meaning:"~한 상태가 되다",example:"Leaves turn dry and tallow in autumn.",trans:"나뭇잎은 가을이 되면 바짝 마르고 노랗게 **변한다**."},
  {id:1171,vn:368,verb:"turn",pn:7,pattern:"turn out+ to VR",meaning:"하는 것으로 판명되다",example:"The job turned out to be harder than I thought it would.",trans:"그 일은 내가 생각했던 것보다 훨씬 어렵다는 것이 **드러났다**."},
  {id:1172,vn:368,verb:"turn",pn:8,pattern:"turn out+ 명사",meaning:"생산하다, 해고하다, 폭로하다",example:"Recent economic recession will turn out not a few of irregular workers.",trans:"최근의 경기 침체는 적지 않은 비정규직 노동자들을 **내쫓을 것이다**."},
  {id:1173,vn:368,verb:"turn",pn:9,pattern:"turn off, turn on",meaning:"전열 기구 따위를 켜다, 끄다",example:"Turn off when not in use but turn it on at leave 1 minute before actual use.",trans:"사용하지 않을 때는 **꺼두고**, 실제 사용하기 최소 1분 전에 **켜두어라**."},
  {id:1174,vn:368,verb:"turn",pn:10,pattern:"turn over, turn upside down, turn inside out",meaning:"뒤집다",example:"Don’t turn over my egg and let me have it sunny side up.",trans:"내 달걀은 **뒤집지 말고** 한쪽 면만 익혀 주세요."},
  {id:1175,vn:368,verb:"turn",pn:11,pattern:"turn into",meaning:"~로 바뀌어 가다",example:"He is turning into monster if you turn up the frequency.",trans:"빈도를 **높이면** 그는 괴물로 **변해가고 있다**."},
  {id:1176,vn:368,verb:"turn",pn:12,pattern:"turn+ 명사+ 형용사(보어)",meaning:"‘명사’를 ~한 상태로 변화시키다",example:"The very thought of him turns me sick.",trans:"그를 생각하기만 해도 속이 **메스꺼워진다**."},
  {id:1177,vn:368,verb:"turn",pn:13,pattern:"take turns (in) V-ing",meaning:"번갈아 하다",example:"We can take turn driving so that we may not get fatigued.",trans:"교대로 운전을 **하면** 피로해지지 않을 수 있다."},
  {id:1178,vn:369,verb:"take",pn:1,pattern:"take+ 명사",meaning:"손으로 잡다",example:"Bob took up the receiver and dialed the number.",trans:"밥은 수화기를 **들고** 번호를 **눌렀다**."},
  {id:1179,vn:369,verb:"take",pn:2,pattern:"take+ 명사",meaning:"사로잡다, 포획하다",example:"The thief was taken in the act.",trans:"그 도둑은 현행범으로 **잡혔다**."},
  {id:1180,vn:369,verb:"take",pn:3,pattern:"take+ 명사",meaning:"얻다, 받다",example:"How much will you take for this watch?",trans:"이 시계를 얼마에 **팔겠습니까**?"},
  {id:1181,vn:369,verb:"take",pn:4,pattern:"take+ 명사",meaning:"빼앗다, 허락 없이 가져가다",example:"Someone took my bike yesterday.",trans:"누군가 어제 내 자전거를 **가져갔다**."},
  {id:1182,vn:369,verb:"take",pn:5,pattern:"take+ 명사",meaning:"운반하다, 옮기다, 데려가다",example:"Father often took me to the zoo, which I liked very much.",trans:"아버지는 나를 자주 동물원에 **데려가셨고**, 나는 그것을 매우 **좋아했다**."},
  {id:1183,vn:369,verb:"take",pn:6,pattern:"take+ 교통 수단",meaning:"타다",example:"I am not going to take a taxi during rush hours.",trans:"나는 러시아워에는 택시를 **타지 않을 것이다**."},
  {id:1184,vn:369,verb:"take",pn:7,pattern:"take+ 음식, 약",meaning:"먹다, 복용하다",example:"Take 3 pills after each meal.",trans:"매 식사 후 알약 3개를 **복용하세요**."},
  {id:1185,vn:369,verb:"take",pn:8,pattern:"take+ 시간, 노력",meaning:"필요로 하다, 소요시키다, 걸리게 하다",example:"It only takes ten minutes to walk there.",trans:"걸어서 그곳까지 가는 데 10분밖에 **걸리지 않는다**."},
  {id:1186,vn:369,verb:"take",pn:9,pattern:"take+ 명사+ for+ 명사",meaning:"간주하다",example:"What do you take me for?",trans:"당신은 나를 어떤 사람으로 **생각하는 겁니까**?"},
  {id:1187,vn:369,verb:"take",pn:10,pattern:"take+ 모양, 색깔, 성질, 의견",meaning:"띠다, 취하다",example:"Water takes the shape of the vessel containing it.",trans:"물은 그것을 **담는** 그릇의 모양을 **취한다**."},
  {id:1188,vn:369,verb:"take",pn:11,pattern:"take+ 행위명사",meaning:"행위를 하다",example:"Take a deep breath and relax.",trans:"숨을 깊게 **들이쉬고** 긴장을 **푸세요**."},
  {id:1189,vn:369,verb:"take",pn:12,pattern:"take advantage of",meaning:"이용하다",example:"You should not take advantage of others’ weakness.",trans:"다른 사람의 약점을 **이용하면** 안 된다."},
  {id:1190,vn:369,verb:"take",pn:13,pattern:"take back",meaning:"되찾다",example:"Words cannot be taken back once spoken.",trans:"한번 뱉은 말은 **되돌릴 수** 없다."},
  {id:1191,vn:369,verb:"take",pn:14,pattern:"take in",meaning:"받아들이다, 속이다, 섭취하다",example:"Can you take me in for a few days?",trans:"며칠 동안 저를 **재워 주실 수** 있나요?"},
  {id:1192,vn:369,verb:"take",pn:15,pattern:"take out",meaning:"끄집어내다",example:"Don’t take it out on me.",trans:"나한테 **화풀이하지** 마."},
  {id:1193,vn:369,verb:"take",pn:16,pattern:"take off",meaning:"벗다, 제거하다, 할인하다, 데리고 사라지다, 떼내다",example:"This gum stain is so hard to take off.",trans:"이 껌 얼룩은 정말 **떼어내기가** 너무 힘들다."},
  {id:1194,vn:369,verb:"take",pn:17,pattern:"take to",meaning:"골몰하다, 버릇이 생기다",example:"He took to writing after he retired from the college.",trans:"그는 대학에서 **은퇴한** 후 글쓰기에 **빠져들었다**."},
  {id:1195,vn:369,verb:"take",pn:18,pattern:"take up",meaning:"차지하다, 집어 올리다",example:"You take up two persons’ space.",trans:"당신은 두 사람 분의 공간을 **차지하고 있어요**."},
  {id:1196,vn:370,verb:"talk",pn:1,pattern:"talk",meaning:"말하다, 대화하다, 효력을 발휘하다",example:"I heard him talk on the radio last night.",trans:"나는 어젯밤 라디오에서 그가 **말하는 것을 들었다**."},
  {id:1197,vn:370,verb:"talk",pn:2,pattern:"talk to, talk about",meaning:"~와 대화하다",example:"Can I talk to her now?",trans:"지금 그녀와 **통화할 수** 있을까요?"},
  {id:1198,vn:370,verb:"talk",pn:3,pattern:"talk about",meaning:"~에 관하여 말하다",example:"What are you talking about?",trans:"무슨 말을 **하는 거예요**?"},
  {id:1199,vn:370,verb:"talk",pn:4,pattern:"talk+ 언어, 주제",meaning:"말하다",example:"He talked English fluently.",trans:"그는 영어를 유창하게 **말했다**."},

let aName='', aTel='', aBlog='';

function startApp(){
  aName = document.getElementById('iname').value.trim() || '우리학원';
  aTel  = document.getElementById('itel').value.trim();
  aBlog = document.getElementById('iblog').value.trim();
  document.getElementById('hIni').textContent  = aName[0]||'학';
  document.getElementById('hName').textContent = aName;
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  build();
}

function bold(s){
  return s.replace(/\*\*(.+?)\*\*/g,'<span class="vh">$1</span>');
}
function makeUrl(){
  return `${location.href.split('?')[0]}?n=${encodeURIComponent(aName)}&t=${encodeURIComponent(aTel)}&b=${encodeURIComponent(aBlog)}`;
}

function cardHTML(c, pNum){
  const contact = [aTel,aBlog].filter(Boolean).join(' · ');
  const transHTML = c.trans ? `<div class="ex-kr">${bold(c.trans)}</div>` : '';
  return `<div class="card" id="card-${c.id}">
    <div class="c-head">
      <span class="c-pnum">pattern ${pNum}</span>
      <span class="c-pat">${c.pattern}</span>
    </div>
    <div class="c-body">
      <div class="m-row">
        <span class="m-badge">의미</span>
        <span class="m-text">${c.meaning}</span>
      </div>
      <div class="ex-box">
        <div class="ex-lbl">예문</div>
        <div class="ex-en">${c.example || '—'}</div>
        ${transHTML}
      </div>
    </div>
    <div class="c-foot">
      <span class="f-acad">${aName}</span>
      <span class="f-contact">${contact}</span>
    </div>
  </div>`;
}

function build(){
  const byV={}, byL={};
  CARDS.forEach(c=>{ if(!byV[c.verb]) byV[c.verb]=[]; byV[c.verb].push(c); });
  Object.keys(byV).forEach(v=>{ const l=v[0].toUpperCase(); if(!byL[l]) byL[l]=[]; byL[l].push(v); });
  const letters = Object.keys(byL).sort();

  /* alpha nav */
  const nav = document.getElementById('AN');
  nav.innerHTML='';
  letters.forEach((l,i)=>{
    const b=document.createElement('button');
    b.className='ab'+(i===0?' active':'');
    b.textContent=l; b.id='ab-'+l;
    b.onclick=()=>{
      clearSearch();
      document.querySelectorAll('.ab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      const el=document.getElementById('sec-'+l);
      if(el){
        const hdrH=document.querySelector('.hdr')?.offsetHeight||140;
        const top=el.getBoundingClientRect().top+window.scrollY-hdrH-8;
        window.scrollTo({top,behavior:'smooth'});
      }
    };
    nav.appendChild(b);
  });

  /* content */
  const ct=document.getElementById('CT');
  ct.innerHTML='';

  /* 동사 전체 순서 (알파벳 순) */
  const allVerbs=[];
  letters.forEach(l=>byL[l].forEach(v=>allVerbs.push(v)));

  letters.forEach(letter=>{
    /* 알파벳 섹션 헤더 */
    const sec=document.createElement('div');
    sec.className='sec-hdr'; sec.id='sec-'+letter;
    const verbs=byL[letter];
    const tot=verbs.reduce((s,v)=>s+byV[v].length,0);
    sec.innerHTML=`<div class="sec-letter">${letter}</div><div class="sec-line"></div><div class="sec-info">${verbs.length}개 동사 · ${tot}개 패턴</div>`;
    ct.appendChild(sec);

    verbs.forEach(verb=>{
      const verbIdx = allVerbs.indexOf(verb)+1; // 1-based 동사 번호
      const vg=document.createElement('div');
      vg.className='vg'; vg.id='vg-'+verb;

      const cs=byV[verb];
      vg.innerHTML=
        `<div class="vg-title">
          <span class="vg-num">${verbIdx}.</span>
          <span class="vg-name">${verb}</span>
          <span class="vg-tag">${cs.length}개 패턴</span>
        </div>`
        + cs.map((c,i)=>cardHTML(c, i+1)).join('');
      ct.appendChild(vg);
    });
  });

  /* 스크롤 스파이 — 위/아래 모두 정확하게 */
  let spyTicking = false;
  function updateActiveAlpha(){
    const hdrH = document.querySelector('.hdr')?.offsetHeight || 140;
    let current = letters[0];
    for(const l of letters){
      const el = document.getElementById('sec-'+l);
      if(!el) continue;
      const rect = el.getBoundingClientRect();
      if(rect.top <= hdrH + 24) current = l;
    }
    document.querySelectorAll('.ab').forEach(b=>b.classList.toggle('active', b.textContent===current));
    // 알파벳 버튼 네비 스크롤 (smooth 없이 — 충돌 방지)
    const activeBtn = document.getElementById('ab-'+current);
    if(activeBtn){
      const nav = activeBtn.closest('.alpha-nav');
      if(nav){
        const btnLeft = activeBtn.offsetLeft;
        const btnWidth = activeBtn.offsetWidth;
        const navWidth = nav.offsetWidth;
        const scrollLeft = nav.scrollLeft;
        if(btnLeft < scrollLeft || btnLeft + btnWidth > scrollLeft + navWidth){
          nav.scrollTo({left: btnLeft - navWidth/2 + btnWidth/2, behavior:'smooth'});
        }
      }
    }
    spyTicking = false;
  }
  window.addEventListener('scroll', ()=>{
    if(!spyTicking){ spyTicking=true; requestAnimationFrame(updateActiveAlpha); }
  }, {passive:true});
  updateActiveAlpha();
}

function copyLink(){
  navigator.clipboard.writeText(makeUrl()).then(()=>{
    const btn=document.getElementById('shareHdrBtn');
    if(!btn) return;
    btn.textContent='✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.textContent='🔗 링크 복사'; btn.classList.remove('copied'); },2200);
  });
}

(function autoLoad(){
  const p=new URLSearchParams(location.search);
  const n=p.get('n');
  if(n){
    aName=n; aTel=p.get('t')||''; aBlog=p.get('b')||'';
    document.getElementById('hIni').textContent=aName[0]||'학';
    document.getElementById('hName').textContent=aName;
    document.getElementById('setup').style.display='none';
    document.getElementById('app').style.display='block';
    // 학생 공유링크로 접속 시 링크복사 버튼 숨김
    const shareBtn=document.getElementById('shareHdrBtn');
    if(shareBtn) shareBtn.style.display='none';
    build();
  }
})();

function onSearch(){
  const q=document.getElementById('SI').value.trim();
  document.getElementById('SC').style.display=q?'block':'none';
  if(!q){ document.getElementById('SD').classList.remove('open'); return; }
  const lo=q.toLowerCase();
  const hits=CARDS.filter(c=>
    c.verb.toLowerCase().includes(lo)||
    c.pattern.toLowerCase().includes(lo)||
    c.meaning.includes(q)
  ).slice(0,12);
  const box=document.getElementById('SD');
  if(!hits.length){ box.innerHTML='<div class="sd-none">검색 결과 없음</div>'; box.classList.add('open'); return; }
  box.innerHTML=hits.map(c=>`
    <div class="sd-item" onclick="goCard(${c.id})">
      <div><span class="sd-verb">${c.verb}</span><span class="sd-pat">${c.pattern}</span></div>
      <div class="sd-mean">${c.meaning}</div>
    </div>`).join('');
  box.classList.add('open');
}
function showDrop(){ if(document.getElementById('SI').value.trim()) onSearch(); }
function goCard(id){
  document.getElementById('SD').classList.remove('open');
  document.getElementById('SI').value='';
  document.getElementById('SC').style.display='none';
  const el=document.getElementById('card-'+id);
  if(!el) return;
  const verb=CARDS.find(c=>c.id===id)?.verb;
  if(verb){
    const l=verb[0].toUpperCase();
    document.querySelectorAll('.ab').forEach(b=>b.classList.toggle('active',b.textContent===l));
    const activeBtn=document.getElementById('ab-'+l);
    if(activeBtn){
      const nav=activeBtn.closest('.alpha-nav');
      if(nav) nav.scrollTo({left:activeBtn.offsetLeft-nav.offsetWidth/2+activeBtn.offsetWidth/2,behavior:'smooth'});
    }
  }
  const hdrH=document.querySelector('.hdr')?.offsetHeight||140;
  const top=el.getBoundingClientRect().top+window.scrollY-hdrH-16;
  window.scrollTo({top,behavior:'smooth'});
  el.classList.add('hl');
  setTimeout(()=>el.classList.remove('hl'),1800);
}
function clearSearch(){
  document.getElementById('SI').value='';
  document.getElementById('SC').style.display='none';
  document.getElementById('SD').classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.sw')) document.getElementById('SD').classList.remove('open');
});
</script>
